<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Playground</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #controls { width: 300px; padding: 20px; background: #f4f4f4; border-right: 1px solid #ccc; }
        #preview { flex-grow: 1; padding: 20px; display: flex; border: 2px dashed #aaa; }
        .flex-item { background: #3498db; color: white; padding: 20px; margin: 5px; }
        #controls label { display: block; margin-top: 15px; font-weight: bold; }
        #controls select, #controls input { width: 100%; margin-bottom: 5px; }
        #cssOutput { white-space: pre-wrap; font-size: 14px; border-radius: 4px; }
        @media (max-width: 600px) {
    body { flex-direction: column; }
    #controls { width: 100%; border-right: none; border-bottom: 1px solid #ccc; }
}
    </style>
</head>
<body>
    <div id="controls">
        <h2>Flexbox Controls</h2>
        <label>Number of Items:</label>
        <input type="number" id="itemCount" value="3" min="1" max="15" oninput="updateItems()">
        <label>Flex Direction:</label>

<select id="flexDirection" onchange="updateStyles()">
    <option value="row">Row</option>
    <option value="column">Column</option>
    <option value="row-reverse">Row Reverse</option>
    <option value="column-reverse">Column Reverse</option>
</select>

<label>Align Items:</label>
<select id="alignItems" onchange="updateStyles()">
    <option value="stretch">Stretch</option>
    <option value="center">Center</option>
    <option value="flex-start">Flex Start</option>
    <option value="flex-end">Flex End</option>
</select>

<label>Align Content:</label>
<select id="alignContent" onchange="updateStyles()">
    <option value="stretch">Stretch</option>
    <option value="center">Center</option>
    <option value="flex-start">Flex Start</option>
    <option value="flex-end">Flex End</option>
    <option value="space-between">Space Between</option>
</select>

<button onclick="resetValues()" style="background-color: #e74c3c; margin-top: 10px;">Reset to Default</button>

<label>Flex Wrap:</label>
<select id="flexWrap" onchange="updateStyles()">
    <option value="nowrap">No Wrap</option>
    <option value="wrap">Wrap</option>
</select>

<label>Justify Content:</label>
<select id="justifyContent" onchange="updateStyles()">
    <option value="flex-start">Flex Start</option>
    <option value="center">Center</option>
    <option value="flex-end">Flex End</option>
    <option value="space-between">Space Between</option>
</select>

<label>Gap (px):</label>
<input type="range" id="gap" min="0" max="50" value="10" oninput="updateStyles()">

<div id="cssOutput" style="margin-top: 20px; padding: 10px; background: #eee; font-family: monospace;">
    </div>
<button onclick="copyCSS()">Copy CSS</button>
    </div>
    <div id="preview">
        <div class="flex-item">Item 1</div>
        <div class="flex-item">Item 2</div>
        <div class="flex-item">Item 3</div>
    </div>
    <script>

      function updateStyles() {
    const preview = document.getElementById('preview');
    
    // Get values
    const flexDirection = document.getElementById('flexDirection').value;
    const justifyContent = document.getElementById('justifyContent').value;
    const alignItems = document.getElementById('alignItems').value;
    const alignContent = document.getElementById('alignContent').value; // Added
    const flexWrap = document.getElementById('flexWrap').value;
    const gap = document.getElementById('gap').value + 'px';

    // Apply to preview
    preview.style.flexDirection = flexDirection;
    preview.style.justifyContent = justifyContent;
    preview.style.alignItems = alignItems;
    preview.style.alignContent = alignContent; // Added
    preview.style.flexWrap = flexWrap;
    preview.style.gap = gap;

    // Update CSS string
    const cssText = `display: flex;
flex-direction: ${flexDirection};
justify-content: ${justifyContent};
align-items: ${alignItems};
align-content: ${alignContent};
flex-wrap: ${flexWrap};
gap: ${gap};`;

    document.getElementById('cssOutput').innerText = cssText;
}

function resetValues() {
    document.getElementById('itemCount').value = 3;
    document.getElementById('flexDirection').value = 'row';
    document.getElementById('justifyContent').value = 'flex-start';
    document.getElementById('alignItems').value = 'stretch';
    document.getElementById('alignContent').value = 'stretch';
    document.getElementById('flexWrap').value = 'nowrap';
    document.getElementById('gap').value = 10;
    updateItems(); // This triggers everything
}


// Function to apply styles and update the CSS code output
function updateStyles() {
    const preview = document.getElementById('preview');
    
    // Get values from inputs
    const flexDirection = document.getElementById('flexDirection').value;
    const justifyContent = document.getElementById('justifyContent').value;
    const alignItems = document.getElementById('alignItems').value;
    const flexWrap = document.getElementById('flexWrap').value;
    const gap = document.getElementById('gap').value + 'px';

    // Apply to preview
    preview.style.flexDirection = flexDirection;
    preview.style.justifyContent = justifyContent;
    preview.style.alignItems = alignItems;
    preview.style.flexWrap = flexWrap;
    preview.style.gap = gap;

    // Generate formatted CSS string
    const cssText = `display: flex;
flex-direction: ${flexDirection};
justify-content: ${justifyContent};
align-items: ${alignItems};
flex-wrap: ${flexWrap};
gap: ${gap};`;

    document.getElementById('cssOutput').innerText = cssText;
    window.onload = updateItems;
}

// Function to copy CSS to clipboard
function copyCSS() {
    const text = document.getElementById('cssOutput').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("CSS copied to clipboard!");
    });
}

// Initialize on page load
updateItems();

    </script>
</body>
</html>
