<!--
Git Ignore Generator
Single-file offline Git ignore template generator.
Built for One File Tools.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Ignore Generator - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #f59e0b;
        --accent-hover: #d97706;
        --accent-glow: rgba(245, 158, 11, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 24px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(245, 158, 11, 0.05), transparent 25%),
          radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.05), transparent 25%),
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .app {
        width: 100%;
        max-width: 1000px;
        margin-top: 20px;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(28px, 5vw, 40px);
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
      }

      .grid-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
      }

      @media (max-width: 800px) {
        .grid-layout {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--panel);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        gap: 24px;
        height: 100%;
      }

      .panel-title {
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-title i {
        color: var(--accent);
      }

      /* Search & Tags */
      .search-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .search-wrapper i {
        position: absolute;
        left: 16px;
        color: var(--text-muted);
      }

      .search-input {
        width: 100%;
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px 16px 16px 48px;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 15px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .tag-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        max-height: 400px;
        overflow-y: auto;
        padding-right: 8px;
      }

      /* Custom Scrollbar for tag container */
      .tag-container::-webkit-scrollbar {
        width: 6px;
      }
      .tag-container::-webkit-scrollbar-track {
        background: transparent;
      }
      .tag-container::-webkit-scrollbar-thumb {
        background: var(--panel-border);
        border-radius: 4px;
      }

      .tag {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--panel-border);
        color: var(--text-muted);
        padding: 8px 16px;
        border-radius: 99px;
        font-size: 14px;
        font-family: var(--font-mono);
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .tag:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
      }

      .tag.active {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
        font-weight: 600;
        box-shadow: 0 0 10px var(--accent-glow);
      }

      /* Selected Tags Area */
      .selected-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--panel-border);
      }

      .selected-tags:empty {
        display: none;
      }

      .selected-tag {
        background: rgba(245, 158, 11, 0.15);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 6px 12px;
        border-radius: 99px;
        font-size: 13px;
        font-family: var(--font-mono);
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .selected-tag:hover {
        background: rgba(245, 158, 11, 0.25);
      }

      /* Output Area */
      .output-wrapper {
        display: flex;
        flex-direction: column;
        flex: 1;
        gap: 16px;
      }

      .output-textarea {
        width: 100%;
        flex: 1;
        min-height: 400px;
        background: rgba(3, 7, 18, 0.8);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.6;
        resize: none;
        white-space: pre;
        overflow-wrap: normal;
        overflow-x: auto;
      }

      .output-textarea:focus {
        outline: none;
        border-color: var(--panel-border);
      }

      .btn-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .btn {
        width: 100%;
        background: var(--panel-border);
        color: var(--text);
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        padding: 16px;
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.2s;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .btn-primary {
        background: var(--accent);
        color: var(--bg);
        box-shadow: 0 4px 14px var(--accent-glow);
      }

      .btn-primary:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px var(--accent-glow);
      }

      /* Toast Notification */
      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 24px;
        border-radius: 99px;
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Developer Utilities</div>
        <h1 class="wordmark">Git Ignore Generator</h1>
        <p class="tagline">Generate boilerplate .gitignore files for your stack instantly.</p>
      </header>

      <div class="grid-layout">
        <!-- Left Panel: Selection -->
        <main class="panel">
          <h2 class="panel-title"><i data-feather="layers"></i> Technologies</h2>
          
          <div class="search-wrapper">
            <i data-feather="search" width="18" height="18"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search languages, OS, IDEs..." autocomplete="off">
          </div>

          <div class="selected-tags" id="selectedTagsContainer"></div>

          <div class="tag-container" id="tagContainer">
            <!-- Tags will be dynamically injected here -->
          </div>
        </main>

        <!-- Right Panel: Output -->
        <aside class="panel">
          <h2 class="panel-title"><i data-feather="file-text"></i> .gitignore Preview</h2>
          
          <div class="output-wrapper">
            <textarea id="outputArea" class="output-textarea" readonly placeholder="Select technologies to generate..."></textarea>
            
            <div class="btn-group">
              <button class="btn" id="btnCopy">
                <i data-feather="copy" width="18" height="18"></i>
                Copy to Clipboard
              </button>
              <button class="btn btn-primary" id="btnDownload">
                <i data-feather="download" width="18" height="18"></i>
                Download File
              </button>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
      // Initialize Icons
      feather.replace();

      // Database of common Git Ignore Templates
      const templates = {
        "Node": `# Logs\nlogs\n*.log\nnpm-debug.log*\nyarn-debug.log*\nyarn-error.log*\nlerna-debug.log*\n.pnpm-debug.log*\n\n# Diagnostic reports\nreport.[0-9]*.[0-9]*.[0-9]*.[0-9]*.json\n\n# Runtime data\npids\n*.pid\n*.seed\n*.pid.lock\n\n# Directory for instrumented libs\nlib-cov\n\n# Coverage directory\ncoverage\n*.lcov\n\n# nyc test coverage\n.nyc_output\n\n# Dependency directories\nnode_modules/\njspm_packages/\n\n# Optional npm cache directory\n.npm\n\n# Optional eslint cache\n.eslintcache\n\n# dotenv environment variables\n.env\n.env.test\n.env.production\n\n# parcel-bundler cache\n.cache\n.parcel-cache\n\n# Next.js build output\n.next\nout\n\n# Nuxt.js build / generate output\n.nuxt\ndist\n\n# Gatsby build output\n.nuxt\ndist\n\n# Serverless directories\n.serverless/\n\n# Typescript\n*.tsbuildinfo\n.npmrc`,
        "Python": `# Byte-compiled / optimized / DLL files\n__pycache__/\n*.py[cod]\n*$py.class\n\n# C extensions\n*.so\n\n# Distribution / packaging\n.Python\nbuild/\ndevelop-eggs/\ndist/\ndownloads/\neggs/\n.eggs/\nlib/\nlib64/\nparts/\nsdist/\nvar/\nwheels/\nshare/python-wheels/\n*.egg-info/\n.installed.cfg\n*.egg\nMANIFEST\n\n# Environments\n.env\n.venv\nenv/\nvenv/\nENV/\nenv.bak/\nvenv.bak/\n\n# Jupyter Notebook\n.ipynb_checkpoints\n\n# pytest\n.pytest_cache/\n\n# mypy\n.mypy_cache/\n.dmypy.json\ndmypy.json`,
        "Java": `# Compiled class file\n*.class\n\n# Log file\n*.log\n\n# BlueJ files\n*.ctxt\n\n# Mobile Tools for Java (J2ME)\n.mtj.tmp/\n\n# Package Files #\n*.jar\n*.war\n*.nar\n*.ear\n*.zip\n*.tar.gz\n*.rar\n\n# virtual machine crash logs\nhs_err_pid*`,
        "C++": `# Prerequisites\n*.d\n\n# Compiled Object files\n*.slo\n*.lo\n*.o\n*.obj\n\n# Precompiled Headers\n*.gch\n*.pch\n\n# Compiled Dynamic libraries\n*.so\n*.dylib\n*.dll\n\n# Compiled Static libraries\n*.lay\n*.a\n*.lib\n\n# Executables\n*.exe\n*.out\n*.app`,
        "Go": `# Binaries for programs and plugins\n*.exe\n*.exe~\n*.dll\n*.so\n*.dylib\n\n# Test binary\n*.test\n\n# Output of the go coverage tool\n*.out\n\n# Dependency directories (remove the comment below to include it)\n# vendor/\n\n# Go workspace file\ngo.work`,
        "Ruby": `*.gem\n*.rbc\n/.config\n/coverage/\n/InstalledFiles\n/pkg/\n/spec/reports/\n/spec/examples.txt\n/test/tmp/\n/test/version_tmp/\n/tmp/\n\n# Used by dotenv library\n.env\n\n# RubyMine\n.idea/\n\n# YARD artifacts\n.yardoc/\n_yardoc/\ndoc/\n\n# vcr artifacts\nvcr_cassettes/\nfacets/\n\n# rbenv\n.ruby-version\n.ruby-gemset`,
        "PHP": `vendor/\n.idea\n.env\n.env.*.local\n.env.local\n.phpunit.result.cache\nHomestead.json\nHomestead.yaml\nnpm-debug.log\nyarn-error.log`,
        "React": `# dependencies\n/node_modules\n/.pnp\n.pnp.js\n\n# testing\n/coverage\n\n# production\n/build\n\n# misc\n.DS_Store\n.env.local\n.env.development.local\n.env.test.local\n.env.production.local\n\nnpm-debug.log*\nyarn-debug.log*\nyarn-error.log*`,
        "Vue": `.DS_Store\nnode_modules\n/dist\n\n# local env files\n.env.local\n.env.*.local\n\n# Log files\nnpm-debug.log*\nyarn-debug.log*\nyarn-error.log*\npnpm-debug.log*\n\n# Editor directories and files\n.idea\n.vscode\n*.suo\n*.ntvs*\n*.njsproj\n*.sln\n*.sw?`,
        "Angular": `# dependencies\n/node_modules\n\n# testing\n/out-tsc/spec/\n/bazel-out\n\n# output\n/dist\n/tmp\n/out-tsc\n\n# misc\n/.angular/cache\n.idea/\n.project\n.vscode/\n*.launch\n*.sublime-workspace`,
        "Rust": `target/\n**/*.rs.bk\nCargo.lock`,
        "macOS": `*.DS_Store\n.AppleDouble\n.LSOverride\n\n# Icon must end with two \\r\nIcon\n\n# Thumbnails\n._*\n\n# Files that might appear in the root of a volume\n.DocumentRevisions-V100\n.fseventsd\n.Spotlight-V100\n.TemporaryItems\n.Trashes\n.VolumeIcon.icns\n.com.apple.timemachine.donotpresent\n\n# Directories potentially created on remote AFP share\n.AppleDB\n.AppleDesktop\nNetwork Trash Folder\nTemporary Items\n.apdisk`,
        "Windows": `# Windows thumbnail cache files\nThumbs.db\nThumbs.db:encryptable\nehthumbs.db\nehthumbs_vista.db\n\n# Dump file\n*.stackdump\n\n# Folder config file\n[Dd]esktop.ini\n\n# Recycle Bin used on file shares\n$RECYCLE.BIN/\n\n# Windows Installer files\n*.cab\n\n# Windows Shortcuts\n*.lnk`,
        "Linux": `*~\n\n# Temporary files which can be created if a process still has a handle open of a deleted file\n.fuse_hidden*\n\n# KDE directory preferences\n.directory\n\n# Linux trash folder which might appear on any partition or disk\n.Trash-*\n\n# .nfs files are created when an open file is removed\n.nfs*`,
        "VSCode": `.vscode/*\n!.vscode/settings.json\n!.vscode/tasks.json\n!.vscode/launch.json\n!.vscode/extensions.json\n*.code-workspace\n\n# Local History for Visual Studio Code\n.history/`,
        "IntelliJ": `# Covers JetBrains IDEs: IntelliJ, RubyMine, PhpStorm, AppCode, PyCharm, CLion, Android Studio, WebStorm and Rider\n# Reference: https://intellij-support.jetbrains.com/hc/en-us/articles/206544839\n\n# User-specific stuff\n.idea/**/workspace.xml\n.idea/**/tasks.xml\n.idea/**/usage.statistics.xml\n.idea/**/dictionaries\n.idea/**/shelf\n\n# Generated files\n.idea/**/contentModel.xml\n\n# Sensitive or high-churn files\n.idea/**/dataSources/\n.idea/**/dataSources.ids\n.idea/**/dataSources.local.xml\n.idea/**/sqlDataSources.xml\n.idea/**/dynamic.xml\n.idea/**/uiDesigner.xml\n.idea/**/dbnavigator.xml\n\n# Gradle\n.idea/**/gradle.xml\n.idea/**/libraries\n\n# CMake\ncmake-build-*/\n\n# Mongo Explorer plugin\n.idea/**/mongoSettings.xml\n\n# File-based project format\n*.iws\n\n# IntelliJ\nout/\n\n# mpeltonen/sbt-idea plugin\n.idea_modules/\n\n# JIRA plugin\natlassian-ide-plugin.xml\n\n# Cursive/Objective-C\n.idea/replstate.xml\n\n# Crashlytics plugin (for Android Studio and IntelliJ)\ncom_crashlytics_export_strings.xml\ncrashlytics.properties\ncrashlytics-build.properties\nfabric.properties`,
        "Vim": `# Swap\n[._]*.s[a-v][a-z]\n!*.svg  # comment out if you don't need vector graphics\n[._]*.sw[a-p]\n[._]s[a-rt-v][a-z]\n[._]ss[a-z]\n*.un~\n\n# Session\nSession.vim\nSessionx.vim\n\n# Temporary\n.netrwhist\n*~\n# Auto-generated tag files\ntags\n\n# Persistent undo\n[._]*.un~`,
        "Android": `# Built application files\n*.apk\n*.aar\n*.ap_\n*.aab\n\n# Files for the ART/Dalvik VM\n*.dex\n\n# Java class files\n*.class\n\n# Generated files\nbin/\ngen/\nout/\n\n# Gradle files\n.gradle/\nbuild/\n\n# Local configuration file (sdk path, etc)\nlocal.properties\n\n# Proguard folder created by Eclipse\nproguard/\n\n# Log Files\n*.log\n\n# Android Studio Navigation editor temp files\n.navigation/`,
        "iOS": `# Xcode\nbuild/\n*.pbxuser\n!default.pbxuser\n*.mode1v3\n!default.mode1v3\n*.mode2v3\n!default.mode2v3\n*.perspectivev3\n!default.perspectivev3\nxcuserdata/\n*.xccheckout\n*.moved-aside\nDerivedData/\n*.hmap\n*.ipa\n*.xcuserstate\nproject.xcworkspace\n\n# CocoaPods\nPods/\n!Podfile.lock\n\n# Carthage\nCarthage/Build/\n\n# fastlane\nfastlane/report.xml\nfastlane/Preview.html\nfastlane/screenshots/**/*.png\nfastlane/test_output\n\n# Code Injection\nInjectionProject/`
      };

      // State
      const activeTags = new Set();
      const tagsList = Object.keys(templates).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));

      // DOM Elements
      const searchInput = document.getElementById("searchInput");
      const tagContainer = document.getElementById("tagContainer");
      const selectedTagsContainer = document.getElementById("selectedTagsContainer");
      const outputArea = document.getElementById("outputArea");
      const btnCopy = document.getElementById("btnCopy");
      const btnDownload = document.getElementById("btnDownload");
      const toast = document.getElementById("toast");

      // Render tags
      function renderTags(filter = "") {
        tagContainer.innerHTML = "";
        
        tagsList.forEach(tag => {
          if (tag.toLowerCase().includes(filter.toLowerCase())) {
            const el = document.createElement("div");
            el.className = "tag" + (activeTags.has(tag) ? " active" : "");
            el.textContent = tag;
            el.onclick = () => toggleTag(tag, el);
            tagContainer.appendChild(el);
          }
        });
      }

      function renderSelectedTags() {
        selectedTagsContainer.innerHTML = "";
        
        Array.from(activeTags).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase())).forEach(tag => {
          const el = document.createElement("div");
          el.className = "selected-tag";
          el.innerHTML = `<span>${tag}</span><i data-feather="x" width="14" height="14"></i>`;
          el.onclick = () => {
            activeTags.delete(tag);
            renderSelectedTags();
            renderTags(searchInput.value);
            updateOutput();
            feather.replace();
          };
          selectedTagsContainer.appendChild(el);
        });
      }

      function toggleTag(tag, element) {
        if (activeTags.has(tag)) {
          activeTags.delete(tag);
          if (element) element.classList.remove("active");
        } else {
          activeTags.add(tag);
          if (element) element.classList.add("active");
        }
        renderSelectedTags();
        updateOutput();
        feather.replace();
      }

      function updateOutput() {
        if (activeTags.size === 0) {
          outputArea.value = "";
          return;
        }

        let output = "";
        
        Array.from(activeTags).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase())).forEach(tag => {
          output += `# ==========================================\n`;
          output += `# ${tag}\n`;
          output += `# ==========================================\n`;
          output += templates[tag] + "\n\n";
        });

        outputArea.value = output.trim();
      }

      // Search functionality
      searchInput.addEventListener("input", (e) => {
        renderTags(e.target.value);
      });

      // Copy Functionality
      btnCopy.addEventListener("click", () => {
        if (!outputArea.value) return;
        navigator.clipboard.writeText(outputArea.value).then(() => {
          showToast();
        });
      });

      // Download Functionality
      btnDownload.addEventListener("click", () => {
        if (!outputArea.value) return;
        const blob = new Blob([outputArea.value], { type: 'text/plain' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = ".gitignore";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      });

      function showToast() {
        toast.classList.add("show");
        setTimeout(() => {
          toast.classList.remove("show");
        }, 2500);
      }

      // Initial Render
      renderTags();
      renderSelectedTags();
    </script>
  </body>
</html>
