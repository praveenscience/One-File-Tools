<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern GitHub Token Validator</title>
    <style>
        /* CSS Variables for Light/Dark Mode Automation */
        :root {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e5e7eb;
            --input-bg: #f9fafb;
            --error-bg: #fef2f2;
            --error-text: #ef4444;
            --error-border: #fca5a5;
            --success-bg: #f0fdf4;
            --success-border: #86efac;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #0f172a;
                --bg-card: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border: #334155;
                --input-bg: #0f172a;
                --error-bg: #450a0a;
                --error-text: #f87171;
                --error-border: #7f1d1d;
                --success-bg: #052e16;
                --success-border: #14532d;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background-color: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .toggle-btn {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn:hover {
            color: var(--text-main);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 1.25rem;
            height: 1.25rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Result Area */
        #result-area {
            margin-top: 1.5rem;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-alert {
            background-color: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .profile-card {
            background-color: var(--success-bg);
            border: 1px solid var(--success-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--success-border);
            margin-bottom: 1rem;
        }

        .profile-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .profile-login {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            border-top: 1px solid var(--success-border);
            padding-top: 1rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.125rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>GitHub Token Validator</h1>
            <p>Securely verify your Personal Access Token</p>
        </div>

        <form id="token-form">
            <div class="input-group">
                <label for="token">Personal Access Token (Classic or Fine-grained)</label>
                <div class="input-wrapper">
                    <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx..." required autocomplete="off">
                    <button type="button" class="toggle-btn" id="toggle-visibility" aria-label="Toggle token visibility" title="Show/Hide">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span id="btn-text">Validate Token</span>
                <svg class="spinner" id="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" stroke-opacity="0.25"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="result-area"></div>
    </div>

    <script>
        // DOM Elements
        const form = document.getElementById('token-form');
        const tokenInput = document.getElementById('token');
        const toggleBtn = document.getElementById('toggle-visibility');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        const resultArea = document.getElementById('result-area');

        // Toggle Password Visibility
        toggleBtn.addEventListener('click', () => {
            const type = tokenInput.getAttribute('type') === 'password' ? 'text' : 'password';
            tokenInput.setAttribute('type', type);
            
            // Update SVG Icon
            if (type === 'text') {
                toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>`;
            } else {
                toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            }
        });

        // Validation Logic
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = tokenInput.value.trim();
            if (!token) return;

            // Set Loading State
            submitBtn.disabled = true;
            btnText.textContent = 'Validating...';
            spinner.style.display = 'block';
            resultArea.style.display = 'none';
            resultArea.innerHTML = '';

            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github+json',
                        'X-GitHub-Api-Version': '2022-11-28'
                    }
                });

                if (!response.ok) {
                    throw new Error(response.status === 401 ? 'Invalid Token or Expired.' : `Error: ${response.status} ${response.statusText}`);
                }

                const userData = await response.json();
                
                // Render Success Profile Card
                resultArea.innerHTML = `
                    <div class="profile-card">
                        <img src="${userData.avatar_url}" alt="Profile Avatar" class="profile-avatar">
                        <div class="profile-name">${userData.name || userData.login}</div>
                        <div class="profile-login"><a href="${userData.html_url}" target="_blank" style="color: inherit; text-decoration: none;">@${userData.login}</a></div>
                        <div class="profile-stats">
                            <div class="stat-item">
                                <span class="stat-value">${userData.public_repos}</span>
                                <span class="stat-label">Repos</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">${userData.followers}</span>
                                <span class="stat-label">Followers</span>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                // Render Error Alert
                resultArea.innerHTML = `
                    <div class="error-alert">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <span>Validation Failed: ${error.message}</span>
                    </div>
                `;
            } finally {
                // Reset Loading State
                submitBtn.disabled = false;
                btnText.textContent = 'Validate Token';
                spinner.style.display = 'none';
                resultArea.style.display = 'block';
            }
        });
    </script>
</body>
</html>
