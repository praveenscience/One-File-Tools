<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Command Step Loader</title>
    <style>
      :root {
        --g: #33ff33;
        --bg: #000;
        --p: #0a0a0a;
      }
      * {
        box-sizing: border-box;
        font-family: Consolas, monospace;
      }
      body {
        margin: 0;
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: var(--g);
      }
      .crt {
        width: min(900px, 95vw);
        background: var(--p);
        border: 14px solid #222;
        border-radius: 18px;
        padding: 20px;
        box-shadow:
          0 0 20px rgba(51, 255, 51, 0.2),
          inset 0 0 60px #000;
        position: relative;
      }
      .crt:before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.06) 2px);
      }
      header {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid var(--g);
        padding-bottom: 8px;
        margin-bottom: 15px;
      }
      textarea {
        width: 100%;
        height: 120px;
        background: #000;
        color: var(--g);
        border: 1px solid var(--g);
        padding: 10px;
      }
      button {
        background: var(--g);
        color: #000;
        border: 0;
        padding: 8px 14px;
        margin: 6px;
        cursor: pointer;
        font-weight: bold;
      }
      #cmd {
        border: 1px solid var(--g);
        padding: 18px;
        min-height: 70px;
        white-space: pre-wrap;
        margin: 12px 0;
      }
      .small {
        opacity: 0.8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="crt">
      <header><span>COMMAND_STEP_LOADER v1.0</span><span id="status">READY</span></header>
      <textarea id="input" placeholder="Paste commands here, one per line..."></textarea><br />
      <button id="load">LOAD LINES</button>
      <div class="small" id="progress">0 / 0</div>
      <div id="cmd">No command loaded.</div>
      <button id="prev">PREVIOUS</button>
      <button id="copy">COPY</button>
      <button id="next">NEXT</button>
      <div class="small" id="msg">Paste commands and click LOAD LINES.</div>
    </div>
    <script>
      let lines = [],
        i = 0;
      const $ = (id) => document.getElementById(id);
      function render() {
        if (!lines.length) {
          $("cmd").textContent = "No command loaded.";
          $("progress").textContent = "0 / 0";
          return;
        }
        $("cmd").textContent = lines[i];
        $("progress").textContent = i + 1 + " / " + lines.length;
        $("status").textContent = "ACTIVE";
      }
      $("load").onclick = () => {
        lines = $("input")
          .value.split(/\r?\n/)
          .map((x) => x.trim())
          .filter(Boolean);
        i = 0;
        $("msg").textContent = lines.length ? "Commands loaded." : "No commands found.";
        render();
      };
      $("next").onclick = () => {
        if (i < lines.length - 1) {
          i++;
          render();
        }
      };
      $("prev").onclick = () => {
        if (i > 0) {
          i--;
          render();
        }
      };
      $("copy").onclick = async () => {
        if (!lines.length) return;
        await navigator.clipboard.writeText(lines[i]);
        $("msg").textContent = "Copied!";
        setTimeout(() => ($("msg").textContent = "Ready"), 1000);
      };
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") $("next").click();
        if (e.key === "ArrowLeft") $("prev").click();
      });
    </script>
  </body>
</html>
