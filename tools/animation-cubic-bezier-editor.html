<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation Cubic-Bezier Editor | One File Tools</title>
    <style>
      /* Design Tokens */
      :root {
        --bg-base: #fafafa;
        --bg-surface: #ffffff;
        --border: #e4e4e7;
        --border-focus: #3b82f6;
        --text-main: #18181b;
        --text-muted: #71717a;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --handle-1: #ec4899;
        --handle-2: #06b6d4;
        --radius: 12px;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --graph-size: 300px;
      }

      [data-theme="dark"] {
        --bg-base: #09090b;
        --bg-surface: #18181b;
        --border: #27272a;
        --text-main: #f4f4f5;
        --text-muted: #a1a1aa;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--bg-base);
        color: var(--text-main);
        min-height: 100vh;
        transition: 0.2s;
      }

      /* Layout Structure */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.4rem 1.5rem;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
      }
      .brand {
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .workspace {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2rem;
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1.5rem;
      }
      @media (max-width: 800px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }

      /* Graph Editor */
      .editor-card {
        background: var(--bg-surface);
        padding: 1.5rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        display: inline-block;
      }
      .graph-container {
        position: relative;
        width: var(--graph-size);
        height: var(--graph-size);
        margin: 1rem 0;
        background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 10% 10%;
        border: 1px solid var(--border);
        border-radius: 4px;
      }

      svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }
      .curve {
        fill: none;
        stroke: var(--text-main);
        stroke-width: 5;
        stroke-linecap: round;
      }
      .handle-line {
        fill: none;
        stroke-width: 3;
        stroke-dasharray: 4;
      }
      .line-1 {
        stroke: var(--handle-1);
      }
      .line-2 {
        stroke: var(--handle-2);
      }

      .axis-label {
        fill: var(--text-muted);
        font-size: 12px;
        font-family: var(--font-sans);
        user-select: none;
        pointer-events: none;
      }
      .tick {
        stroke: var(--border);
        stroke-width: 1;
      }

      .control-point {
        position: absolute;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        border: 3px solid var(--bg-surface);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
        z-index: 10;
        transition: box-shadow 0.15s, transform 0.15s;
      }
      .control-point:active {
        cursor: grabbing;
      }
      .control-point.active {
        transform: translate(-50%, -50%) scale(1.3);
        z-index: 20;
      }
      .point-1 {
        background: var(--handle-1);
      }
      .point-1.active {
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--handle-1) 40%, transparent), 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .point-2 {
        background: var(--handle-2);
      }
      .point-2.active {
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--handle-2) 40%, transparent), 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .coord-display {
        position: absolute;
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        background: var(--bg-surface);
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid var(--border);
        pointer-events: none;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 30;
      }
      .coord-display.visible {
        opacity: 1;
      }

      /* Controls & Preview */
      .controls-panel {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .preview-card {
        background: var(--bg-surface);
        padding: 1.5rem;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }
      .track {
        width: 100%;
        height: 60px;
        background: var(--bg-base);
        border-radius: 30px;
        position: relative;
        border: 1px solid var(--border);
        margin: 1rem 0;
      }
      .box {
        width: 60px;
        height: 60px;
        background: var(--accent);
        border-radius: 50%;
        position: absolute;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: var(--shadow);
      }
      .animate-btn {
        padding: 0.75rem 1.5rem;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        width: 100%;
      }
      .animate-btn:hover {
        background: var(--accent-hover);
      }

      /* Output & Presets */
      .section-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }

      .code-output {
        display: flex;
        align-items: flex-start;
        background: var(--bg-base);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.75rem;
        font-family: var(--font-mono);
        font-size: 0.875rem;
        color: var(--accent);
        font-weight: 600;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .output-lines {
        display: flex;
        flex-direction: column;
        gap: 4px;
        overflow-x: auto;
        flex: 1;
      }
      .output-line {
        white-space: nowrap;
      }
      .output-line .keyword {
        color: var(--text-muted);
        font-weight: 400;
      }
      .copy-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
      }
      .copy-btn:hover {
        color: var(--text-main);
      }

      .preset-group {
        margin-bottom: 0.5rem;
      }
      .preset-group:last-child {
        margin-bottom: 0;
      }
      .preset-group-label {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .presets {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .preset-btn {
        padding: 0.35rem 0.85rem;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        color: var(--text-main);
        border-radius: 20px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: 0.15s;
        font-family: var(--font-sans);
      }
      .preset-btn:hover {
        border-color: var(--border-focus);
        background: var(--bg-base);
      }

      /* Utilities */
      .theme-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 0.5rem;
        border-radius: 6px;
        cursor: pointer;
      }
      #toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        padding: 12px 20px;
        border-radius: 6px;
        box-shadow: var(--shadow);
        font-weight: 500;
        transform: translateY(100px);
        opacity: 0;
        transition: 0.3s;
        z-index: 100;
      }
      #toast.show {
        transform: translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0z" />
          <path d="M12 8v8" />
          <path d="M8 12h8" />
        </svg>
        Cubic-Bezier Editor
      </div>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle Theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <main class="workspace">
      <section class="editor-card">
        <div class="section-title">Curve Editor</div>
        <div class="graph-container" id="graph">
          <svg>
            <line class="handle-line line-1" id="line1" x1="0" y1="300" x2="75" y2="270" />
            <line class="handle-line line-2" id="line2" x1="75" y1="0" x2="300" y2="0" />
            <path class="curve" id="bezierCurve" d="M 0,300 C 75,270 75,0 300,0" />
            <line class="tick" x1="0" y1="300" x2="300" y2="300" />
            <line class="tick" x1="0" y1="0" x2="0" y2="300" />
            <circle cx="0" cy="300" r="3" fill="var(--text-muted)" />
            <text class="axis-label" x="290" y="294">x</text>
            <text class="axis-label" x="6" y="14">y</text>
          </svg>
          <div class="control-point point-1" id="p1"></div>
          <div class="control-point point-2" id="p2"></div>
          <div class="coord-display" id="coordDisplay"></div>
        </div>
      </section>

      <section class="controls-panel">
        <div class="preview-card">
          <div class="section-title">Live Preview</div>
          <div class="track">
            <div class="box" id="demoBox">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />
                <path d="M12 8h.01" />
              </svg>
            </div>
          </div>
          <button class="animate-btn" id="goBtn">▶ Preview Animation</button>
        </div>

        <div class="preview-card">
          <div class="section-title">CSS Output</div>
          <div class="code-output">
            <div class="output-lines">
              <span class="output-line" id="bezierOutput">cubic-bezier(0.25, 0.10, 0.25, 1.00)</span>
              <span class="output-line" id="transitionOutput"><span class="keyword">transition:</span> all 400ms cubic-bezier(0.25, 0.10, 0.25, 1.00)</span>
            </div>
            <button class="copy-btn" id="copyBtn" aria-label="Copy to clipboard">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
              </svg>
            </button>
          </div>
        </div>

        <div class="preview-card">
          <div class="section-title">Presets</div>
          <div class="preset-group">
            <div class="preset-group-label">Standard</div>
            <div class="presets">
              <button class="preset-btn" data-bezier="0.25, 0.1, 0.25, 1">ease</button>
              <button class="preset-btn" data-bezier="0.42, 0, 1, 1">ease-in</button>
              <button class="preset-btn" data-bezier="0, 0, 0.58, 1">ease-out</button>
              <button class="preset-btn" data-bezier="0.42, 0, 0.58, 1">ease-in-out</button>
              <button class="preset-btn" data-bezier="0, 0, 1, 1">linear</button>
            </div>
          </div>
          <div class="preset-group">
            <div class="preset-group-label">Smooth</div>
            <div class="presets">
              <button class="preset-btn" data-bezier="0.25, 0.46, 0.45, 0.94">ease-out-quad</button>
              <button class="preset-btn" data-bezier="0.55, 0.085, 0.68, 0.53">ease-in-quad</button>
              <button class="preset-btn" data-bezier="0.455, 0.03, 0.515, 0.955">ease-in-out-quad</button>
              <button class="preset-btn" data-bezier="0.215, 0.61, 0.355, 1">ease-out-cubic</button>
              <button class="preset-btn" data-bezier="0.645, 0.045, 0.355, 1">ease-in-out-cubic</button>
              <button class="preset-btn" data-bezier="0.165, 0.84, 0.44, 1">ease-out-quart</button>
              <button class="preset-btn" data-bezier="0.895, 0.03, 0.685, 0.22">ease-in-quart</button>
            </div>
          </div>
          <div class="preset-group">
            <div class="preset-group-label">Elastic &amp; Bounce</div>
            <div class="presets">
              <button class="preset-btn" data-bezier="0.5, -0.75, 0.2, 1.75" style="border-color: var(--accent)">bouncy</button>
              <button class="preset-btn" data-bezier="0.175, 0.885, 0.32, 1.275">ease-out-back</button>
              <button class="preset-btn" data-bezier="0.68, -0.55, 0.265, 1.55">ease-in-out-back</button>
              <button class="preset-btn" data-bezier="0.6, -0.28, 0.735, 0.045">ease-in-back</button>
              <button class="preset-btn" data-bezier="0.5, 1.2, 0.3, 1.4">spring</button>
              <button class="preset-btn" data-bezier="0.7, -0.3, 0.3, 1.6">snap</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="toast">Copied to clipboard!</div>

    <script>
      /**
       * State Architecture for SVG DOM plotting
       */
      const size = 300;
      let p1 = { x: 0.25, y: 0.1 };
      let p2 = { x: 0.25, y: 1.0 };

      let activePoint = null;

      // DOM Elements
      const els = {
        graph: document.getElementById("graph"),
        p1Btn: document.getElementById("p1"),
        p2Btn: document.getElementById("p2"),
        line1: document.getElementById("line1"),
        line2: document.getElementById("line2"),
        curve: document.getElementById("bezierCurve"),
        bezierOutput: document.getElementById("bezierOutput"),
        transitionOutput: document.getElementById("transitionOutput"),
        coordDisplay: document.getElementById("coordDisplay"),
        demoBox: document.getElementById("demoBox"),
        goBtn: document.getElementById("goBtn"),
        toast: document.getElementById("toast"),
        themeBtn: document.getElementById("themeToggle")
      };

      // Theme Setup
      const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (isDark) document.documentElement.setAttribute("data-theme", "dark");

      els.themeBtn.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        document.documentElement.setAttribute("data-theme", current === "dark" ? "light" : "dark");
      });

      // Math Logic: Convert [0,1] domain to pixel space for SVG rendering
      function updateUI(dragging) {
        // P1 Math (Bottom-Left origin)
        const p1Px = { x: p1.x * size, y: (1 - p1.y) * size };
        els.p1Btn.style.left = `${p1Px.x}px`;
        els.p1Btn.style.top = `${p1Px.y}px`;
        els.line1.setAttribute("x2", p1Px.x);
        els.line1.setAttribute("y2", p1Px.y);

        // P2 Math (Top-Right origin)
        const p2Px = { x: p2.x * size, y: (1 - p2.y) * size };
        els.p2Btn.style.left = `${p2Px.x}px`;
        els.p2Btn.style.top = `${p2Px.y}px`;
        els.line2.setAttribute("x1", p2Px.x);
        els.line2.setAttribute("y1", p2Px.y);

        // Draw Curve (M: Move to start, C: Cubic Bezier parameters)
        els.curve.setAttribute("d", `M 0,${size} C ${p1Px.x},${p1Px.y} ${p2Px.x},${p2Px.y} ${size},0`);

        // Update Output Lines
        const val = `${p1.x.toFixed(2)}, ${p1.y.toFixed(2)}, ${p2.x.toFixed(2)}, ${p2.y.toFixed(2)}`;
        const compact = `${+p1.x.toFixed(2)}, ${+p1.y.toFixed(2)}, ${+p2.x.toFixed(2)}, ${+p2.y.toFixed(2)}`;
        const cssString = `cubic-bezier(${val})`;
        const compactString = `cubic-bezier(${compact})`;
        els.bezierOutput.textContent = cssString;
        els.transitionOutput.innerHTML = `<span class="keyword">transition:</span> all 400ms ${compactString}`;
        els.demoBox.style.transition = `left 1s ${cssString}`;

        // Update coordinate display when dragging
        if (dragging && activePoint) {
          const point = activePoint === els.p1Btn ? p1 : p2;
          const px = activePoint === els.p1Btn ? p1Px : p2Px;
          els.coordDisplay.textContent = `(${point.x.toFixed(2)}, ${point.y.toFixed(2)})`;
          els.coordDisplay.style.left = `${Math.min(px.x + 14, size - 80)}px`;
          els.coordDisplay.style.top = `${Math.max(px.y - 28, 2)}px`;
          els.coordDisplay.classList.add("visible");
        }
      }

      // Drag Logic
      function getPointerPos(e) {
        return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
      }

      function handleDrag(e) {
        if (!activePoint) return;
        e.preventDefault();

        const rect = els.graph.getBoundingClientRect();
        const pos = getPointerPos(e);
        let x = (pos.x - rect.left) / size;
        let y = 1 - (pos.y - rect.top) / size;

        // Constrain X bounds (0 to 1 as per CSS spec)
        x = Math.max(0, Math.min(1, x));

        // Note: Y bounds are intentionally unconstrained to allow bouncy/overflow easings

        if (activePoint === els.p1Btn) {
          p1 = { x, y };
        } else {
          p2 = { x, y };
        }
        updateUI(true);
      }

      function startDrag(e) {
        activePoint = e.currentTarget;
        activePoint.classList.add("active");
        updateUI(true);
        e.preventDefault();
      }

      function endDrag() {
        if (activePoint) activePoint.classList.remove("active");
        els.coordDisplay.classList.remove("visible");
        activePoint = null;
      }

      els.p1Btn.addEventListener("mousedown", startDrag);
      els.p2Btn.addEventListener("mousedown", startDrag);
      els.p1Btn.addEventListener("touchstart", startDrag, { passive: false });
      els.p2Btn.addEventListener("touchstart", startDrag, { passive: false });
      window.addEventListener("mousemove", handleDrag);
      window.addEventListener("touchmove", handleDrag, { passive: false });
      window.addEventListener("mouseup", endDrag);
      window.addEventListener("touchend", endDrag);

      // Preview Animation Logic
      let toggle = false;
      els.goBtn.addEventListener("click", () => {
        toggle = !toggle;
        els.demoBox.style.left = toggle ? "calc(100% - 60px)" : "0";
      });

      // Presets Logic
      document.querySelectorAll(".preset-btn").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          const vals = e.currentTarget.dataset.bezier.split(",").map(Number);
          p1 = { x: vals[0], y: vals[1] };
          p2 = { x: vals[2], y: vals[3] };
          updateUI();
        });
      });

      // Copy Logic — copies both lines
      document.getElementById("copyBtn").addEventListener("click", () => {
        const text = `${els.bezierOutput.textContent}\n${els.transitionOutput.textContent}`;
        navigator.clipboard.writeText(text).then(() => {
          els.toast.classList.add("show");
          setTimeout(() => els.toast.classList.remove("show"), 2000);
        });
      });

      // Init
      updateUI();
    </script>
  </body>
</html>
