<!--
Password Generator
Single-file secure client-side password generator.
Built for One File Tools.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #10b981;
        --accent-hover: #059669;
        --accent-glow: rgba(16, 185, 129, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 24px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;

        --color-weak: #ef4444;
        --color-fair: #f59e0b;
        --color-good: #3b82f6;
        --color-strong: #10b981;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.05), transparent 25%), radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.05), transparent 25%), linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size:
          100% 100%,
          100% 100%,
          32px 32px,
          32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .app {
        width: 100%;
        max-width: 640px;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(28px, 5vw, 40px);
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
      }

      .studio {
        background: var(--panel);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
      }

      /* Result Area */
      .result-container {
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 32px;
        position: relative;
        overflow: hidden;
      }

      .password-display {
        font-family: var(--font-mono);
        font-size: 24px;
        font-weight: 500;
        color: var(--text);
        word-break: break-all;
        letter-spacing: 1px;
        flex: 1;
        transition: color 0.2s;
      }

      .password-display.copied {
        color: var(--accent);
      }

      .action-btns {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .icon-btn {
        background: rgba(31, 41, 55, 0.5);
        border: 1px solid var(--panel-border);
        color: var(--text-muted);
        width: 44px;
        height: 44px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .icon-btn:hover {
        background: rgba(55, 65, 81, 0.8);
        color: var(--text);
        border-color: var(--text-dim);
      }

      /* Strength Meter */
      .strength-section {
        margin-bottom: 32px;
      }

      .strength-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .strength-text {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: color 0.3s ease;
      }

      .strength-bars {
        display: flex;
        gap: 6px;
        height: 8px;
      }

      .strength-bar {
        flex: 1;
        background: var(--panel-border);
        border-radius: 99px;
        transition: all 0.3s ease;
      }

      /* Controls */
      .control-group {
        margin-bottom: 32px;
      }

      .length-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .length-value {
        font-family: var(--font-mono);
        font-size: 20px;
        font-weight: 600;
        color: var(--accent);
      }

      /* Custom Range Slider */
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
        height: 40px;
        margin: 0;
      }

      input[type="range"]:focus {
        outline: none;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: var(--panel-border);
        border-radius: 99px;
      }

      input[type="range"]::-webkit-slider-thumb {
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        -webkit-appearance: none;
        margin-top: -9px;
        box-shadow: 0 0 15px var(--accent-glow);
        transition: transform 0.1s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
      }

      input[type="range"]::-moz-range-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: var(--panel-border);
        border-radius: 99px;
      }

      input[type="range"]::-moz-range-thumb {
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: none;
        box-shadow: 0 0 15px var(--accent-glow);
      }

      /* Checkbox Grid */
      .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        background: rgba(3, 7, 18, 0.3);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .checkbox-group:hover {
        background: rgba(31, 41, 55, 0.4);
        border-color: var(--text-dim);
      }

      .checkbox-group input {
        display: none;
      }

      .custom-checkbox {
        width: 20px;
        height: 20px;
        border: 2px solid var(--text-dim);
        border-radius: 6px;
        margin-right: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }

      .custom-checkbox i {
        opacity: 0;
        color: var(--bg);
        transform: scale(0.5);
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .checkbox-group input:checked + .custom-checkbox {
        background: var(--accent);
        border-color: var(--accent);
      }

      .checkbox-group input:checked + .custom-checkbox i {
        opacity: 1;
        transform: scale(1);
      }

      .checkbox-label {
        font-size: 15px;
        font-weight: 500;
        color: var(--text);
      }

      /* Generate Button */
      .btn-generate {
        width: 100%;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: var(--radius-sm);
        padding: 18px;
        font-family: var(--font-sans);
        font-size: 16px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        margin-top: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.2s;
        box-shadow: 0 4px 14px var(--accent-glow);
      }

      .btn-generate:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px var(--accent-glow);
      }

      .btn-generate:active {
        transform: translateY(0);
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 24px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 600px) {
        .options-grid {
          grid-template-columns: 1fr;
        }
        .studio {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Developer Utilities</div>
        <h1 class="wordmark">Password Generator</h1>
        <p class="tagline">Generate highly secure, cryptographic random passwords instantly. 100% offline, privacy guaranteed.</p>
      </header>

      <main class="studio">
        <div class="result-container">
          <div class="password-display" id="passwordDisplay">Generating...</div>
          <div class="action-btns">
            <button class="icon-btn" id="btnCopy" title="Copy to clipboard">
              <i data-feather="copy" width="20" height="20"></i>
            </button>
            <button class="icon-btn" id="btnRefresh" title="Generate new password">
              <i data-feather="refresh-cw" width="20" height="20"></i>
            </button>
          </div>
        </div>

        <div class="strength-section">
          <div class="strength-header">
            <span class="section-label">Password Strength</span>
            <span class="strength-text" id="strengthText">Good</span>
          </div>
          <div class="strength-bars" id="strengthBars">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
        </div>

        <div class="control-group">
          <div class="length-header">
            <span class="section-label">Character Length</span>
            <span class="length-value" id="lengthValue">16</span>
          </div>
          <input type="range" id="lengthSlider" min="4" max="64" value="16" />
        </div>

        <div class="control-group">
          <span class="section-label" style="display: block; margin-bottom: 16px">Characters Used</span>
          <div class="options-grid">
            <label class="checkbox-group">
              <input type="checkbox" id="chkUpper" checked />
              <div class="custom-checkbox">
                <i data-feather="check" width="14" height="14"></i>
              </div>
              <span class="checkbox-label">Uppercase (A-Z)</span>
            </label>

            <label class="checkbox-group">
              <input type="checkbox" id="chkLower" checked />
              <div class="custom-checkbox">
                <i data-feather="check" width="14" height="14"></i>
              </div>
              <span class="checkbox-label">Lowercase (a-z)</span>
            </label>

            <label class="checkbox-group">
              <input type="checkbox" id="chkNumbers" checked />
              <div class="custom-checkbox">
                <i data-feather="check" width="14" height="14"></i>
              </div>
              <span class="checkbox-label">Numbers (0-9)</span>
            </label>

            <label class="checkbox-group">
              <input type="checkbox" id="chkSymbols" checked />
              <div class="custom-checkbox">
                <i data-feather="check" width="14" height="14"></i>
              </div>
              <span class="checkbox-label">Symbols (!@#$)</span>
            </label>

            <!-- NEW: Exclude Ambiguous Characters -->
            <label class="checkbox-group" style="grid-column: 1 / -1;">
              <input type="checkbox" id="chkAmbiguous" />
              <div class="custom-checkbox">
                <i data-feather="check" width="14" height="14"></i>
              </div>
              <span class="checkbox-label">Exclude Ambiguous Characters (i, l, 1, L, o, 0, O)</span>
            </label>
          </div>
        </div>

        <button class="btn-generate" id="btnGenerate">
          <i data-feather="zap" width="20" height="20"></i>
          Generate Password
        </button>
      </main>
    </div>

    <div class="toast" id="toast">
      <i data-feather="check" width="16" height="16"></i>
      <span id="toastText">Copied to clipboard!</span>
    </div>

    <script>
      // Initialize Icons
      feather.replace();

      // DOM Elements
      const passwordDisplay = document.getElementById("passwordDisplay");
      const lengthSlider = document.getElementById("lengthSlider");
      const lengthValue = document.getElementById("lengthValue");
      const btnCopy = document.getElementById("btnCopy");
      const btnRefresh = document.getElementById("btnRefresh");
      const btnGenerate = document.getElementById("btnGenerate");
      const strengthText = document.getElementById("strengthText");
      const strengthBars = document.getElementById("strengthBars").children;
      const toast = document.getElementById("toast");

      const chkUpper = document.getElementById("chkUpper");
      const chkLower = document.getElementById("chkLower");
      const chkNumbers = document.getElementById("chkNumbers");
      const chkSymbols = document.getElementById("chkSymbols");
      const chkAmbiguous = document.getElementById("chkAmbiguous"); // NEW Element

      const checkboxes = [chkUpper, chkLower, chkNumbers, chkSymbols];

      // Character Sets
      const UPPER_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const LOWER_CHARS = "abcdefghijklmnopqrstuvwxyz";
      const NUMBER_CHARS = "0123456789";
      const SYMBOL_CHARS = "!@#$%^&*()_+~`|}{[]:;?><,./-=";
      const AMBIGUOUS_REGEX = /[il1Lo0O]/g; // NEW: Regex for filtering

      // Event Listeners
      lengthSlider.addEventListener("input", (e) => {
        lengthValue.textContent = e.target.value;
        generatePassword();
      });

      checkboxes.forEach((chk) => {
        chk.addEventListener("change", () => {
          // Prevent unchecking the last option
          const activeChecks = checkboxes.filter((c) => c.checked).length;
          if (activeChecks === 0) {
            chk.checked = true;
            return;
          }
          generatePassword();
        });
      });

      // Regenerate password when ambiguous filter is toggled
      chkAmbiguous.addEventListener("change", generatePassword);

      btnGenerate.addEventListener("click", generatePassword);
      btnRefresh.addEventListener("click", generatePassword);

      btnCopy.addEventListener("click", () => {
        if (!passwordDisplay.textContent || passwordDisplay.textContent === "Generating...") return;

        navigator.clipboard.writeText(passwordDisplay.textContent).then(() => {
          passwordDisplay.classList.add("copied");
          showToast("Password copied to clipboard!");
          setTimeout(() => passwordDisplay.classList.remove("copied"), 1500);
        });
      });

      // Generation Logic
      function generatePassword() {
        const length = parseInt(lengthSlider.value);
        let chars = "";
        let requiredChars = [];

        // Determine active character pools
        let poolUpper = UPPER_CHARS;
        let poolLower = LOWER_CHARS;
        let poolNumber = NUMBER_CHARS;
        let poolSymbol = SYMBOL_CHARS;

        // Apply ambiguous character filter if checked
        if (chkAmbiguous.checked) {
          poolUpper = poolUpper.replace(AMBIGUOUS_REGEX, "");
          poolLower = poolLower.replace(AMBIGUOUS_REGEX, "");
          poolNumber = poolNumber.replace(AMBIGUOUS_REGEX, "");
        }

        if (chkUpper.checked) {
          chars += poolUpper;
          requiredChars.push(getRandomChar(poolUpper));
        }
        if (chkLower.checked) {
          chars += poolLower;
          requiredChars.push(getRandomChar(poolLower));
        }
        if (chkNumbers.checked) {
          chars += poolNumber;
          requiredChars.push(getRandomChar(poolNumber));
        }
        if (chkSymbols.checked) {
          chars += poolSymbol;
          requiredChars.push(getRandomChar(poolSymbol));
        }

        let password = "";

        // Fill the rest with random characters from the combined pool
        const remainingLength = length - requiredChars.length;
        for (let i = 0; i < remainingLength; i++) {
          password += getRandomChar(chars);
        }

        // Add the required characters and shuffle
        password = password + requiredChars.join("");
        password = shuffleString(password);

        passwordDisplay.textContent = password;
        calculateStrength(length, chars.length);
      }

      // Cryptographically secure random character selection
      function getRandomChar(str) {
        const array = new Uint32Array(1);
        window.crypto.getRandomValues(array);
        return str[array[0] % str.length];
      }

      // Cryptographically secure shuffle (Fisher-Yates)
      function shuffleString(str) {
        let arr = str.split("");
        for (let i = arr.length - 1; i > 0; i--) {
          const randArray = new Uint32Array(1);
          window.crypto.getRandomValues(randArray);
          const j = randArray[0] % (i + 1);

          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr.join("");
      }

      // Strength Calculation
      function calculateStrength(length, poolSize) {
        // Entropy = L * log2(R)
        const entropy = length * Math.log2(poolSize);

        let score = 0;
        let color = "";
        let text = "";

        if (entropy < 35) {
          score = 1;
          color = "var(--color-weak)";
          text = "Weak";
        } else if (entropy < 60) {
          score = 2;
          color = "var(--color-fair)";
          text = "Fair";
        } else if (entropy < 90) {
          score = 3;
          color = "var(--color-good)";
          text = "Good";
        } else {
          score = 4;
          color = "var(--color-strong)";
          text = "Strong";
        }

        // Update UI
        strengthText.textContent = text;
        strengthText.style.color = color;

        for (let i = 0; i < strengthBars.length; i++) {
          if (i < score) {
            strengthBars[i].style.background = color;
            strengthBars[i].style.boxShadow = `0 0 8px ${color}40`;
          } else {
            strengthBars[i].style.background = "var(--panel-border)";
            strengthBars[i].style.boxShadow = "none";
          }
        }
      }

      function showToast(msg) {
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
      }

      // Initial generation
      generatePassword();
    </script>
  </body>
</html>
