<!--
Radii - Border Radius Generator
Single-file CSS border-radius playground.
Built for One File Tools.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radii - Border Radius Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0E1A2B;
    --grid-line:#16263D;
    --panel:#142440;
    --panel-border:#23385C;
    --accent:#FF6B35;
    --accent-dim:#C2410C;
    --accent-soft:rgba(255,107,53,.16);
    --cyan:#5EEAD4;
    --text:#E9EFF7;
    --text-muted:#8AA0C2;
    --text-dim:#4F6388;
    --radius-sm:8px;
    --radius-md:14px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',system-ui,sans-serif;
    background-color:var(--bg);
    background-image:
        linear-gradient(var(--grid-line) 1px,transparent 1px),
        linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
    background-size:28px 28px;
    color:var(--text);
    padding:48px 20px 64px;
    min-height:100vh;
}

.app{max-width:880px;margin:0 auto;}

/* ---------- Header / title block ---------- */
.hero{text-align:center;margin-bottom:40px;}

.eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.18em;
    color:var(--cyan);
    text-transform:uppercase;
    margin-bottom:14px;
}

.wordmark{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(40px,7vw,58px);
    letter-spacing:-.01em;
    line-height:1;
}

.tagline{
    color:var(--text-muted);
    font-size:15px;
    margin-top:10px;
}

.title-block{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:22px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:.04em;
}
.title-block span{position:relative;padding-right:18px;}
.title-block span:not(:last-child)::after{
    content:'';
    position:absolute;
    right:0;top:1px;bottom:1px;
    width:1px;
    background:var(--panel-border);
}
.title-block b{color:var(--text-muted);font-weight:500;}

.hero-controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-top:26px;
    flex-wrap:wrap;
}

.unit-toggle{
    display:inline-flex;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:999px;
    padding:3px;
}
.unit-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:500;
    letter-spacing:.04em;
    border:none;
    background:transparent;
    color:var(--text-muted);
    padding:7px 16px;
    border-radius:999px;
    cursor:pointer;
}
.unit-btn.active{background:var(--accent);color:#1a0f08;}

.link-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    color:var(--text-muted);
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:999px;
    padding:9px 16px;
    cursor:pointer;
}
.link-btn svg{width:15px;height:15px;stroke:var(--text-muted);}
.link-btn.active{color:var(--cyan);border-color:var(--cyan);}
.link-btn.active svg{stroke:var(--cyan);}

/* ---------- Studio ---------- */
.studio{
    display:grid;
    grid-template-columns:minmax(150px,190px) minmax(220px,300px) minmax(150px,190px);
    grid-template-areas:
        "tl stage tr"
        "bl stage br";
    align-items:center;
    justify-content:center;
    gap:18px 22px;
    margin-bottom:36px;
}

.corner-control{display:flex;flex-direction:column;gap:8px;}
.corner-control[data-corner="tl"]{grid-area:tl;justify-self:end;align-items:flex-end;}
.corner-control[data-corner="tr"]{grid-area:tr;justify-self:start;align-items:flex-start;}
.corner-control[data-corner="bl"]{grid-area:bl;justify-self:end;align-items:flex-end;}
.corner-control[data-corner="br"]{grid-area:br;justify-self:start;align-items:flex-start;}

.corner-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--text-dim);
}

.corner-inputs{display:flex;align-items:center;gap:10px;}
.corner-control[data-corner="tl"] .corner-inputs,
.corner-control[data-corner="bl"] .corner-inputs{flex-direction:row-reverse;}

input[type="range"]{
    width:110px;
    height:4px;
    -webkit-appearance:none;
    background:var(--panel-border);
    border-radius:3px;
    outline-offset:6px;
}
input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:16px;height:16px;
    border-radius:50%;
    background:var(--accent);
    border:2px solid #0E1A2B;
    cursor:pointer;
}
input[type="range"]::-moz-range-thumb{
    width:16px;height:16px;
    border-radius:50%;
    background:var(--accent);
    border:2px solid #0E1A2B;
    cursor:pointer;
}

.corner-num{
    width:50px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text);
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-sm);
    padding:6px 4px;
    text-align:center;
}
.corner-num:focus-visible,
input[type="range"]:focus-visible,
button:focus-visible{
    outline:2px solid var(--cyan);
    outline-offset:2px;
}

/* ---------- Preview stage ---------- */
.preview-stage{
    grid-area:stage;
    position:relative;
    width:240px;
    height:240px;
    margin:0 auto;
}

#preview{
    position:absolute;
    inset:20px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dim));
    box-shadow:0 24px 48px -14px rgba(255,107,53,.4),
               inset 0 1px 0 rgba(255,255,255,.18);
    transition:border-radius .15s ease;
}

.bracket{
    position:absolute;
    width:20px;height:20px;
    border-color:var(--text-dim);
    transition:border-color .2s ease, transform .2s ease;
}
.bracket-tl{top:13px;left:13px;border-top:2px solid;border-left:2px solid;border-radius:3px 0 0 0;}
.bracket-tr{top:13px;right:13px;border-top:2px solid;border-right:2px solid;border-radius:0 3px 0 0;}
.bracket-bl{bottom:13px;left:13px;border-bottom:2px solid;border-left:2px solid;border-radius:0 0 0 3px;}
.bracket-br{bottom:13px;right:13px;border-bottom:2px solid;border-right:2px solid;border-radius:0 0 3px 0;}
.bracket.lit{border-color:var(--accent);transform:scale(1.25);}

.corner-tag{
    position:absolute;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--cyan);
    background:var(--bg);
    border:1px solid var(--panel-border);
    border-radius:5px;
    padding:2px 6px;
    opacity:0;
    transform:translateY(2px);
    transition:opacity .15s ease, transform .15s ease;
    white-space:nowrap;
    pointer-events:none;
}
.corner-tag.show{opacity:1;transform:translateY(0);}
.tag-tl{top:-10px;left:-10px;}
.tag-tr{top:-10px;right:-10px;}
.tag-bl{bottom:-10px;left:-10px;}
.tag-br{bottom:-10px;right:-10px;}

/* ---------- Output panel ---------- */
.output-panel{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-md);
    padding:20px 22px;
}

.output-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
}

.output-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.12em;
    color:var(--text-dim);
    flex-shrink:0;
}

#cssOutput{
    flex:1;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--cyan);
    background:var(--bg);
    border:1px solid var(--panel-border);
    border-radius:var(--radius-sm);
    padding:10px 12px;
    overflow-x:auto;
    white-space:nowrap;
}

.copy-btn{
    display:inline-flex;
    align-items:center;
    gap:7px;
    flex-shrink:0;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    color:#1a0f08;
    background:var(--accent);
    border:none;
    border-radius:var(--radius-sm);
    padding:10px 16px;
    cursor:pointer;
}
.copy-btn svg{width:14px;height:14px;}

.presets{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    color:var(--text-muted);
    background:var(--bg);
    border:1px solid var(--panel-border);
    border-radius:999px;
    padding:8px 14px;
    cursor:pointer;
}
.chip:hover{color:var(--text);border-color:var(--text-dim);}
.chip.reset{margin-left:auto;color:var(--accent);border-color:var(--accent);transition:transform .12s ease, opacity .15s ease;}
.chip.reset:active{transform:scale(.92);}

button{transition:background .15s ease,color .15s ease,border-color .15s ease,opacity .15s ease;}
button:hover{opacity:.92;}

/* ---------- Load-in ---------- */
.hero,.studio,.output-panel{animation:rise .5s ease both;}
.studio{animation-delay:.06s;}
.output-panel{animation-delay:.12s;}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

@media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important;}
}

/* ---------- Mobile ---------- */
@media (max-width:680px){
    .studio{
        grid-template-columns:1fr 1fr;
        grid-template-areas:
            "stage stage"
            "tl tr"
            "bl br";
    }
    .corner-control[data-corner="tl"],
    .corner-control[data-corner="bl"]{justify-self:center;align-items:center;}
    .corner-control[data-corner="tr"],
    .corner-control[data-corner="br"]{justify-self:center;align-items:center;}
    .corner-control[data-corner="tl"] .corner-inputs,
    .corner-control[data-corner="bl"] .corner-inputs{flex-direction:row;}
    .preview-stage{transform:scale(.92);margin-bottom:-10px;}
    .title-block{flex-wrap:wrap;gap:10px 18px;}
    .output-row{flex-wrap:wrap;}
    #cssOutput{width:100%;order:3;}
    .chip.reset{margin-left:0;}
}
</style>
</head>

<body>

<div class="app">

    <header class="hero">
        <div class="eyebrow">CSS · border-radius</div>
        <h1 class="wordmark">Radii</h1>
        <p class="tagline">Shape every corner, then copy the CSS.</p>
        <div class="title-block">
            <span><b>DWG</b> RADII-04</span>
            <span><b>SCALE</b> 1:1</span>
            <span><b>CORNERS</b> 4</span>
        </div>

        <div class="hero-controls">
            <div class="unit-toggle" role="group" aria-label="Unit">
                <button class="unit-btn active" data-unit="px">PX</button>
                <button class="unit-btn" data-unit="%">%</button>
            </div>
            <button class="link-btn" id="linkBtn" type="button" aria-pressed="false">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                <span>Link corners</span>
            </button>
        </div>
    </header>

    <main class="studio">

        <div class="corner-control" data-corner="tl">
            <span class="corner-label" id="lbl-tl">Top-left</span>
            <div class="corner-inputs">
                <input type="range" id="tl-range" min="0" max="100" value="20" aria-labelledby="lbl-tl">
                <input type="number" id="tl-num" min="0" max="100" value="20" class="corner-num" aria-labelledby="lbl-tl">
            </div>
        </div>

        <div class="corner-control" data-corner="tr">
            <span class="corner-label" id="lbl-tr">Top-right</span>
            <div class="corner-inputs">
                <input type="range" id="tr-range" min="0" max="100" value="20" aria-labelledby="lbl-tr">
                <input type="number" id="tr-num" min="0" max="100" value="20" class="corner-num" aria-labelledby="lbl-tr">
            </div>
        </div>

        <div class="preview-stage">
            <div class="bracket bracket-tl" id="b-tl"></div>
            <div class="bracket bracket-tr" id="b-tr"></div>
            <div class="bracket bracket-bl" id="b-bl"></div>
            <div class="bracket bracket-br" id="b-br"></div>
            <span class="corner-tag tag-tl" id="tag-tl">20px</span>
            <span class="corner-tag tag-tr" id="tag-tr">20px</span>
            <span class="corner-tag tag-bl" id="tag-bl">20px</span>
            <span class="corner-tag tag-br" id="tag-br">20px</span>
            <div id="preview"></div>
        </div>

        <div class="corner-control" data-corner="bl">
            <span class="corner-label" id="lbl-bl">Bottom-left</span>
            <div class="corner-inputs">
                <input type="range" id="bl-range" min="0" max="100" value="20" aria-labelledby="lbl-bl">
                <input type="number" id="bl-num" min="0" max="100" value="20" class="corner-num" aria-labelledby="lbl-bl">
            </div>
        </div>

        <div class="corner-control" data-corner="br">
            <span class="corner-label" id="lbl-br">Bottom-right</span>
            <div class="corner-inputs">
                <input type="range" id="br-range" min="0" max="100" value="20" aria-labelledby="lbl-br">
                <input type="number" id="br-num" min="0" max="100" value="20" class="corner-num" aria-labelledby="lbl-br">
            </div>
        </div>

    </main>

    <section class="output-panel">
        <div class="output-row">
            <span class="output-label">OUTPUT</span>
            <code id="cssOutput">border-radius: 20px 20px 20px 20px;</code>
            <button class="copy-btn" id="copyBtn" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"/></svg>
                <span id="copyLabel">Copy</span>
            </button>
        </div>
        <div class="presets">
            <button class="chip" data-preset="sharp">Sharp</button>
            <button class="chip" data-preset="soft">Soft</button>
            <button class="chip" data-preset="circle">Circle</button>
            <button class="chip" data-preset="leaf">Leaf</button>
            <button class="chip" data-preset="drop">Drop</button>
            <button class="chip" data-preset="random">Shuffle</button>
            <button class="chip reset" id="resetBtn" type="button">Reset</button>
        </div>
    </section>

</div>


<script>
const corners = ['tl','tr','bl','br'];
const els = {};
corners.forEach(c=>{
    els[c] = {
        range: document.getElementById(`${c}-range`),
        num: document.getElementById(`${c}-num`),
        bracket: document.getElementById(`b-${c}`),
        tag: document.getElementById(`tag-${c}`)
    };
});

const preview = document.getElementById('preview');
const cssOutput = document.getElementById('cssOutput');
const copyBtn = document.getElementById('copyBtn');
const copyLabel = document.getElementById('copyLabel');
const linkBtn = document.getElementById('linkBtn');
const unitBtns = document.querySelectorAll('.unit-btn');

let unit = 'px';
let linked = false;

const maxFor = u => u === 'px' ? 100 : 50;

function clamp(v, max){
    v = Math.round(Number(v));
    if(isNaN(v)) v = 0;
    return Math.min(Math.max(v, 0), max);
}

function setCorner(key, value, skipLink){
    const max = maxFor(unit);
    value = clamp(value, max);
    els[key].range.value = value;
    els[key].num.value = value;
    els[key].tag.textContent = `${value}${unit}`;

    if(linked && !skipLink){
        corners.forEach(c=>{
            if(c !== key) setCorner(c, value, true);
        });
    }
    updateOutput();
}

function updateOutput(){
    const v = c => `${els[c].range.value}${unit}`;
    const radius = `${v('tl')} ${v('tr')} ${v('br')} ${v('bl')}`;
    preview.style.borderRadius = radius;
    cssOutput.textContent = `border-radius: ${radius};`;
}

corners.forEach(c=>{
    els[c].range.addEventListener('input', () => setCorner(c, els[c].range.value));
    els[c].num.addEventListener('input', () => setCorner(c, els[c].num.value));

    [els[c].range, els[c].num].forEach(input=>{
        input.addEventListener('focus', () => {
            els[c].bracket.classList.add('lit');
            els[c].tag.classList.add('show');
        });
        input.addEventListener('blur', () => {
            els[c].bracket.classList.remove('lit');
            els[c].tag.classList.remove('show');
        });
    });
});

linkBtn.addEventListener('click', () => {
    linked = !linked;
    linkBtn.classList.toggle('active', linked);
    linkBtn.setAttribute('aria-pressed', String(linked));
    if(linked){
        setCorner('tl', els.tl.range.value);
    }
});

unitBtns.forEach(btn=>{
    btn.addEventListener('click', () => {
        const newUnit = btn.dataset.unit;
        if(newUnit === unit) return;

        const oldMax = maxFor(unit);
        const newMax = maxFor(newUnit);

        corners.forEach(c=>{
            const scaled = Math.round((Number(els[c].range.value) / oldMax) * newMax);
            els[c].range.max = newMax;
            els[c].num.max = newMax;
            els[c].range.value = scaled;
            els[c].num.value = scaled;
            els[c].tag.textContent = `${scaled}${newUnit}`;
        });

        unit = newUnit;
        unitBtns.forEach(b => b.classList.toggle('active', b === btn));
        updateOutput();
    });
});

const presets = {
    sharp: max => ({tl:0, tr:0, bl:0, br:0}),
    soft:  max => ({tl:Math.round(max*0.4), tr:Math.round(max*0.4), bl:Math.round(max*0.4), br:Math.round(max*0.4)}),
    circle: max => ({tl:max, tr:max, bl:max, br:max}),
    leaf: max => ({tl:max, tr:0, bl:0, br:max}),
    drop: max => ({tl:max, tr:max, bl:0, br:max}),
    random: max => ({
        tl:Math.floor(Math.random()*(max+1)),
        tr:Math.floor(Math.random()*(max+1)),
        bl:Math.floor(Math.random()*(max+1)),
        br:Math.floor(Math.random()*(max+1))
    })
};

document.querySelectorAll('.presets .chip').forEach(btn=>{
    btn.addEventListener('click', () => {
        const name = btn.dataset.preset;
        if(!name) return;
        const values = presets[name](maxFor(unit));
        const wasLinked = linked;
        linked = false;
        corners.forEach(c => setCorner(c, values[c], true));
        linked = wasLinked;
    });
});

document.getElementById('resetBtn').addEventListener('click', () => {
    const value = Math.round(maxFor(unit) * 0.2);
    const wasLinked = linked;
    linked = false;
    corners.forEach(c => setCorner(c, value, true));
    linked = wasLinked;
});

copyBtn.addEventListener('click', async () => {
    try{
        await navigator.clipboard.writeText(cssOutput.textContent.trim());
        copyLabel.textContent = 'Copied';
    }catch(err){
        copyLabel.textContent = 'Press ⌘/Ctrl+C';
    }
    setTimeout(() => { copyLabel.textContent = 'Copy'; }, 1500);
});

updateOutput();
</script>

</body>
</html>
