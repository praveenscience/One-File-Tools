<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favicon Generator - One File Tools</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      /* Light mode (default) */
      :root {
        --bg: #f4f6fa;
        --grid-line: #dde3ee;
        --panel: #ffffff;
        --panel-border: #d0d8ea;
        --accent: #e85d2f;
        --cyan: #0d9488;
        --text: #111827;
        --text-muted: #4b5e7e;
        --text-dim: #8fa3c2;
        --radius-sm: 8px;
        --radius-md: 14px;
      }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1a2b;
          --grid-line: #16263d;
          --panel: #142440;
          --panel-border: #23385c;
          --accent: #ff6b35;
          --cyan: #5eead4;
          --text: #e9eff7;
          --text-muted: #8aa0c2;
          --text-dim: #4f6388;
        }
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 28px 28px;
        color: var(--text);
        padding: 48px 20px 64px;
        min-height: 100vh;
      }

      .app {
        max-width: 760px;
        margin: 0 auto;
      }

      /* ── Hero ── */
      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .wordmark {
        font-family: "Space Grotesk", -apple-system, sans-serif;
        font-weight: 700;
        font-size: clamp(40px, 7vw, 58px);
        line-height: 1;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        margin-top: 10px;
      }

      /* ── Studio card ── */
      .studio {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -14px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* ── Drop Zone ── */
      .drop-zone {
        border: 2px dashed var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 32px 20px;
        text-align: center;
        cursor: pointer;
        background: var(--bg);
        transition: border-color 0.2s, background-color 0.2s;
        position: relative;
      }

      .drop-zone.drag-over {
        border-color: var(--cyan);
        background: rgba(13, 148, 136, 0.05);
      }

      .drop-zone input[type="file"] {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
      }

      .drop-zone-text {
        font-size: 15px;
        color: var(--text-muted);
      }

      .drop-zone-text strong {
        color: var(--accent);
      }

      .drop-zone-hint {
        font-size: 12px;
        color: var(--text-dim);
        margin-top: 6px;
      }

      /* ── Layout Panels ── */
      .workspace {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
      }

      @media (min-width: 640px) {
        .workspace {
          grid-template-columns: 200px 1fr;
        }
      }

      .preview-pane {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 16px;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        height: max-content;
      }

      .preview-pane label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .source-preview {
        width: 120px;
        height: 120px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--panel-border);
        object-fit: contain;
        background: repeating-conic-gradient(#fff 0% 25%, #f0f0f0 0% 50%) 0 0 / 16px 16px;
      }

      @media (prefers-color-scheme: dark) {
        .source-preview {
          background: repeating-conic-gradient(#142440 0% 25%, #0e1a2b 0% 50%) 0 0 / 16px 16px;
        }
      }

      /* ── Asset Grid ── */
      .assets-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .assets-header {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .assets-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
      }

      .asset-card {
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
      }

      .asset-thumb-container {
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: repeating-conic-gradient(#fff 0% 25%, #f0f0f0 0% 50%) 0 0 / 10px 10px;
        border: 1px solid var(--panel-border);
        border-radius: 4px;
        overflow: hidden;
      }

      @media (prefers-color-scheme: dark) {
        .asset-thumb-container {
          background: repeating-conic-gradient(#142440 0% 25%, #0e1a2b 0% 50%) 0 0 / 10px 10px;
        }
      }

      .asset-thumb {
        max-width: 100%;
        max-height: 100%;
        image-rendering: pixelated;
      }

      .asset-info {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--text-muted);
      }

      .asset-size {
        font-weight: 600;
        color: var(--text);
        margin-bottom: 2px;
      }

      .btn-mini {
        border: 1px solid var(--panel-border);
        background: var(--panel);
        color: var(--text);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        width: 100%;
      }

      .btn-mini:hover {
        border-color: var(--cyan);
        color: var(--cyan);
      }

      /* ── HTML Tags Area ── */
      .output-area {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .output-area label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .output-area textarea {
        width: 100%;
        min-height: 140px;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 13px;
        color: var(--cyan);
        line-height: 1.6;
        resize: none;
      }

      /* ── Controls / Actions ── */
      .controls {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 12px;
      }

      .btn {
        border: none;
        border-radius: var(--radius-sm);
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-secondary {
        background: var(--bg);
        border: 1px solid var(--panel-border);
        color: var(--text);
      }

      .btn:disabled, .btn-mini:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      input:focus-visible,
      button:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--cyan);
        outline-offset: 2px;
      }

      .error-msg {
        font-size: 13px;
        color: var(--accent);
        min-height: 18px;
        font-family: "JetBrains Mono", monospace;
      }

      /* ── Footer ── */
      footer {
        text-align: center;
        margin-top: 32px;
        font-size: 13px;
        color: var(--text-dim);
      }

      footer a {
        color: var(--cyan);
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 600px) {
        .controls {
          flex-direction: column;
          width: 100%;
        }
        .btn {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Image Tools</div>
        <h1 class="wordmark">Favicon Generator</h1>
        <p class="tagline">Generate client-side favicon packs and integration tags instantly.</p>
      </header>

      <main class="studio">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg, image/webp" aria-label="Upload source image" />
          <div class="drop-zone-text">
            Drop your image here or <strong>browse</strong>
          </div>
          <div class="drop-zone-hint">Supports PNG, JPG, JPEG, WebP (Square layout recommended)</div>
        </div>

        <p class="error-msg" id="errorMsg" role="alert" aria-live="polite"></p>

        <div id="workspace" class="workspace hidden">
          <div class="preview-pane">
            <label>Source Preview</label>
            <img id="sourcePreview" class="source-preview" src="" alt="Source preview" />
          </div>

          <div class="assets-section">
            <div class="assets-header">
              <span>Generated Sizes</span>
            </div>
            <div class="assets-grid" id="assetsGrid">
              </div>
          </div>
        </div>

        <div class="output-area">
          <label for="htmlOutput">HTML Integration Tags</label>
          <textarea id="htmlOutput" readonly aria-label="Generated HTML markup for layout implementation"></textarea>
        </div>

        <div class="controls">
          <button class="btn btn-secondary" id="copyBtn" aria-label="Copy HTML integration snippets">Copy Code</button>
          <button class="btn btn-primary" id="downloadAllBtn" aria-label="Download all items inside a ZIP archive" disabled>Download All (.ZIP)</button>
        </div>
      </main>

      <footer>
        <p>Part of <a href="https://github.com/praveenscience/One-File-Tools" target="_blank" rel="noopener">One File Tools</a></p>
      </footer>
    </div>

    <script>
      // Configuration specifications for sizes
      const targets = [
        { size: 16, name: "favicon-16x16.png", label: "Favicon Small" },
        { size: 32, name: "favicon-32x32.png", label: "Favicon Medium" },
        { size: 48, name: "favicon-48x48.png", label: "Favicon Legacy" },
        { size: 64, name: "favicon-64x64.png", label: "Favicon Large" },
        { size: 180, name: "apple-touch-icon.png", label: "Apple Touch" },
        { size: 192, name: "android-chrome-192x192.png", label: "Android Manifest" },
        { size: 512, name: "android-chrome-512x512.png", label: "Android Splash" },
      ];

      // UI Elements
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const errorMsg = document.getElementById("errorMsg");
      const workspace = document.getElementById("workspace");
      const sourcePreview = document.getElementById("sourcePreview");
      const assetsGrid = document.getElementById("assetsGrid");
      const htmlOutput = document.getElementById("htmlOutput");
      const copyBtn = document.getElementById("copyBtn");
      const downloadAllBtn = document.getElementById("downloadAllBtn");

      let generatedAssets = [];
      let sourceImgElement = null;

      // HTML Integration snippet builder Template
      const generateHTMLSnippet = () => {
        return `<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
<link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png">

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
`;
      };

      // Drag and Drop Event listeners
      ["dragenter", "dragover"].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
          e.preventDefault();
          dropZone.classList.add("drag-over");
        }, false);
      });

      ["dragleave", "drop"].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
          e.preventDefault();
          dropZone.classList.remove("drag-over");
        }, false);
      });

      dropZone.addEventListener("drop", (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length) handleFile(files[0]);
      });

      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
      });

      function handleFile(file) {
        if (!file.type.startsWith("image/")) {
          errorMsg.textContent = "Please upload a valid image asset file.";
          return;
        }
        errorMsg.textContent = "";
        
        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
            sourceImgElement = img;
            sourcePreview.src = event.target.result;
            workspace.classList.remove("hidden");
            generateAllFavicons();
          };
          img.onerror = function() {
            errorMsg.textContent = "Could not read this image. Try a different file.";
          };
          img.src = event.target.result;
        };
        reader.onerror = function() {
          errorMsg.textContent = "Failed to read the file from disk.";
        };
        reader.readAsDataURL(file);
      }

      // Process and generate targets using Offscreen Canvas scaling methods
      function generateAllFavicons() {
        assetsGrid.innerHTML = "";
        generatedAssets = [];

        targets.forEach(target => {
          const canvas = document.createElement("canvas");
          canvas.width = target.size;
          canvas.height = target.size;
          const ctx = canvas.getContext("2d");

          // High quality scaling parameters configurations
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";

          // Perform square center cropping logic parameters metrics
          const minDim = Math.min(sourceImgElement.width, sourceImgElement.height);
          const sx = (sourceImgElement.width - minDim) / 2;
          const sy = (sourceImgElement.height - minDim) / 2;

          ctx.drawImage(sourceImgElement, sx, sy, minDim, minDim, 0, 0, target.size, target.size);

          const dataUrl = canvas.toDataURL("image/png");
          generatedAssets.push({ name: target.name, dataUrl: dataUrl });

          // Render operational items visually into UI grid columns interface
          const card = document.createElement("div");
          card.className = "asset-card";
          card.innerHTML = `
            <div class="asset-thumb-container">
              <img src="${dataUrl}" class="asset-thumb" alt="${target.label}" />
            </div>
            <div class="asset-info">
              <div class="asset-size">${target.size} × ${target.size}</div>
              <div>PNG</div>
            </div>
            <button class="btn-mini" data-index="${generatedAssets.length - 1}">Download</button>
          `;
          
          card.querySelector(".btn-mini").addEventListener("click", function() {
            const index = this.getAttribute("data-index");
            downloadSingleAsset(generatedAssets[index]);
          });

          assetsGrid.appendChild(card);
        });

        // Initialize output markup scripts boxes elements area configs text templates
        htmlOutput.value = generateHTMLSnippet();
        downloadAllBtn.disabled = false;
      }

      function downloadSingleAsset(asset) {
        const link = document.createElement("a");
        link.href = asset.dataUrl;
        link.download = asset.name;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      // Action Handles Copy logic scripts functions runtime engine variables
      let copyTimeout;
      copyBtn.addEventListener("click", async () => {
        if (!htmlOutput.value) return;
        try {
          await navigator.clipboard.writeText(htmlOutput.value);
          copyBtn.textContent = "Copied!";
        } catch {
          copyBtn.textContent = "Error";
        }
        clearTimeout(copyTimeout);
        copyTimeout = setTimeout(() => {
          copyBtn.textContent = "Copy Code";
        }, 2000);
      });

      // Master zip action downloader setup using inline binary dynamic buffer engine configurations
      downloadAllBtn.addEventListener("click", () => {
        if (!generatedAssets.length) return;
        
        const zip = new fzip();
        generatedAssets.forEach(asset => {
          const rawBinaryStr = atob(asset.dataUrl.split(",")[1]);
          const u8Array = new Uint8Array(rawBinaryStr.length);
          for (let i = 0; i < rawBinaryStr.length; i++) {
            u8Array[i] = rawBinaryStr.charCodeAt(i);
          }
          zip.addFile(asset.name, u8Array);
        });

        const zipBlob = zip.exportBlob();
        const link = document.createElement("a");
        link.href = URL.createObjectURL(zipBlob);
        link.download = "favicon-pack.zip";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });

      /**
       * Minimal micro implementation of a standard non-compressed ZIP container standard formatting profile.
       * Runs natively client-side inside standard browser context arrays buffers operations.
       */
      function fzip() {
        this.files = [];
      }
      fzip.prototype.addFile = function(filename, uint8Data) {
        this.files.push({ name: filename, data: uint8Data });
      };
      fzip.prototype.exportBlob = function() {
        let segments = [];
        let centralDirectory = [];
        let currentOffset = 0;

        function getCRC32(uint8arr) {
          let table = [];
          for (let i = 0; i < 256; i++) {
            let c = i;
            for (let j = 0; j < 8; j++) {
              c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
            }
            table[i] = c;
          }
          let crc = 0 ^ (-1);
          for (let i = 0; i < uint8arr.length; i++) {
            crc = (crc >>> 8) ^ table[(crc ^ uint8arr[i]) & 0xFF];
          }
          return (crc ^ (-1)) >>> 0;
        }

        for (let i = 0; i < this.files.length; i++) {
          const file = this.files[i];
          const nameBytes = new TextEncoder().encode(file.name);
          const crc = getCRC32(file.data);
          const size = file.data.length;

          // Build Local File Header Block Structure array buffer items profiles
          const lfh = new ArrayBuffer(30 + nameBytes.length);
          const lfhView = new DataView(lfh);
          lfhView.setUint32(0, 0x04034b50, true); // signature
          lfhView.setUint16(4, 10, true);         // version needed
          lfhView.setUint16(6, 0, true);          // general flags
          lfhView.setUint16(8, 0, true);          // compression standard (store)
          lfhView.setUint16(10, 0x5000, true);    // modification standard time constant
          lfhView.setUint16(12, 0x5000, true);    // modification date constant
          lfhView.setUint32(14, crc, true);       // CRC-32
          lfhView.setUint32(18, size, true);      // compressed size
          lfhView.setUint32(22, size, true);      // uncompressed size
          lfhView.setUint16(26, nameBytes.length, true); // length filename bytes array
          lfhView.setUint16(28, 0, true);         // extra field items width parameters

          const lfhUint8 = new Uint8Array(lfh);
          lfhUint8.set(nameBytes, 30);

          segments.push(lfhUint8);
          segments.push(file.data);

          // Central Directory record item structural arrays definitions
          const cdf = new ArrayBuffer(46 + nameBytes.length);
          const cdfView = new DataView(cdf);
          cdfView.setUint32(0, 0x02014b50, true); // signature
          cdfView.setUint16(4, 20, true);         // version made by code
          cdfView.setUint16(6, 10, true);         // version needed profile specification
          cdfView.setUint16(8, 0, true);          // general flags metrics bit
          cdfView.setUint16(10, 0, true);         // compression identity parameter metrics (store)
          cdfView.setUint16(12, 0x5000, true);    // mod time structure info constant
          cdfView.setUint16(14, 0x5000, true);    // mod calendar date info constant
          cdfView.setUint32(16, crc, true);       // CRC hash check index
          cdfView.setUint32(20, size, true);      // tracking size compression bounds
          cdfView.setUint32(24, size, true);      // raw standard uncompressed layout bounds size
          cdfView.setUint16(28, nameBytes.length, true);
          cdfView.setUint16(30, 0, true);         // extra attributes description field arrays
          cdfView.setUint16(32, 0, true);         // comment field text bounds size limits
          cdfView.setUint16(34, 0, true);         // starting track disk index channel
          cdfView.setUint16(36, 0, true);         // internal operational attributes flag indicators
          cdfView.setUint32(38, 0, true);         // external target structure storage configurations tags
          cdfView.setUint32(42, currentOffset, true); // relative metrics offset mapping header array position

          const cdfUint8 = new Uint8Array(cdf);
          cdfUint8.set(nameBytes, 46);
          centralDirectory.push(cdfUint8);

          currentOffset += lfh.byteLength + size;
        }

        let cdLength = 0;
        centralDirectory.forEach(b => cdLength += b.length);

        // End of Central Directory metadata layout structure map configs
        const eocd = new ArrayBuffer(22);
        const eocdView = new DataView(eocd);
        eocdView.setUint32(0, 0x06054b50, true); // signature tag configuration marker index
        eocdView.setUint16(4, 0, true);          // number of this layout disk channel index
        eocdView.setUint16(6, 0, true);          // disk tracking directory profile data maps offset positions
        eocdView.setUint16(8, this.files.length, true); // files records inside total counts map context
        eocdView.setUint16(10, this.files.length, true); // total files inside sequence container limits profile
        eocdView.setUint32(12, cdLength, true);  // length byte metrics boundaries inside context arrays
        eocdView.setUint32(16, currentOffset, true); // absolute location header start point tracking data maps
        eocdView.setUint16(20, 0, true);         // index offset comment field width sizes context tags

        segments.push(...centralDirectory);
        segments.push(new Uint8Array(eocd));

        return new Blob(segments, { type: "application/zip" });
      };

      // Set empty default text string layouts elements values configs on initial loading runtime
      htmlOutput.value = "Upload an image to generate integration code snippets.";
    </script>
  </body>
</html>
