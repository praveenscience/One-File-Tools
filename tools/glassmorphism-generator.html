<!--
Glassmorphism Generator
Single-file CSS glassmorphism generator.
Built for One File Tools.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glassmorphism Generator - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #0b0f19;
        --grid-line: #131c2d;
        --panel: #111827;
        --panel-border: #1e293b;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --accent-glow: rgba(59, 130, 246, 0.2);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --radius-sm: 8px;
        --radius-md: 14px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 28px 28px;
        color: var(--text);
        padding: 48px 20px 64px;
        min-height: 100vh;
      }

      .app {
        max-width: 1000px;
        margin: 0 auto;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(36px, 6vw, 52px);
        letter-spacing: -0.01em;
        line-height: 1.1;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 16px;
        margin-top: 12px;
      }

      .studio {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -14px rgba(0, 0, 0, 0.5);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 32px;
      }

      /* Workspace */
      .editor-pane {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .workspace {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 400px;
        background: #0f172a;
        border-radius: var(--radius-sm);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Animated Background Blobs for Preview */
      .blob {
        position: absolute;
        filter: blur(40px);
        opacity: 0.8;
        animation: rotate 20s infinite linear;
      }

      .blob-1 {
        top: -10%; left: -10%;
        width: 60%; height: 60%;
        background: radial-gradient(circle, #f43f5e 0%, transparent 70%);
      }

      .blob-2 {
        bottom: -10%; right: -10%;
        width: 60%; height: 60%;
        background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
        animation-duration: 25s;
        animation-direction: reverse;
      }

      .blob-3 {
        bottom: 20%; left: 20%;
        width: 40%; height: 40%;
        background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
        animation-duration: 15s;
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Glass Target */
      .glass-target {
        position: relative;
        width: 60%;
        height: 60%;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 32px;
        z-index: 10;
        /* Dynamic Styles will be applied via inline CSS */
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      .glass-content {
        font-family: var(--font-display);
        color: #fff;
      }
      
      .glass-content h3 {
        font-size: 24px;
        margin-bottom: 8px;
        font-weight: 600;
        letter-spacing: 1px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      }

      .glass-content p {
        font-family: var(--font-sans);
        font-size: 14px;
        opacity: 0.8;
        max-width: 250px;
        line-height: 1.5;
        text-shadow: 0 1px 4px rgba(0,0,0,0.2);
      }

      /* Controls */
      .controls-pane {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .section-title {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 16px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .control-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .control-label {
        font-size: 13px;
        color: var(--text);
        font-weight: 500;
      }

      .control-value {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-muted);
        background: #0f172a;
        padding: 2px 6px;
        border-radius: 4px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }
      
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        margin-top: -6px;
        box-shadow: 0 0 10px var(--accent-glow);
      }
      
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: var(--panel-border);
        border-radius: 2px;
      }

      input[type="color"] {
        -webkit-appearance: none;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        cursor: pointer;
        background: transparent;
      }

      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      input[type="color"]::-webkit-color-swatch {
        border: 1px solid var(--panel-border);
        border-radius: 6px;
      }

      .output-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      textarea {
        flex: 1;
        min-height: 160px;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--accent);
        resize: none;
        outline: none;
        transition: border-color 0.2s;
        line-height: 1.5;
        white-space: pre;
      }

      textarea:focus {
        border-color: var(--accent);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-sm);
        padding: 12px 24px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 24px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 800px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">CSS Tools</div>
        <h1 class="wordmark">Glassmorphism</h1>
        <p class="tagline">Generate sleek, frosted-glass UI effects for your components.</p>
      </header>

      <main class="studio">
        <div class="layout">
          <!-- Workspace -->
          <div class="editor-pane">
            <div class="section-title">Preview Area</div>
            <div class="workspace" id="workspace">
              <!-- Animated background -->
              <div class="blob blob-1"></div>
              <div class="blob blob-2"></div>
              <div class="blob blob-3"></div>
              
              <!-- Target -->
              <div class="glass-target" id="glassTarget">
                <div class="glass-content">
                  <h3>Glass Card</h3>
                  <p>Adjust the sliders on the right to change the frosted glass properties.</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls-pane">
            <div>
              <div class="section-title">Properties</div>
              
              <div class="control-group">
                <div class="control-header">
                  <label class="control-label" for="blurRange">Blur Radius</label>
                  <span class="control-value" id="blurVal">16px</span>
                </div>
                <input type="range" id="blurRange" min="0" max="40" value="16" step="1">
              </div>

              <div class="control-group">
                <div class="control-header">
                  <label class="control-label" for="opacityRange">Transparency</label>
                  <span class="control-value" id="opacityVal">0.10</span>
                </div>
                <input type="range" id="opacityRange" min="0" max="1" value="0.10" step="0.01">
              </div>

              <div class="control-group">
                <div class="control-header">
                  <label class="control-label" for="colorPicker">Glass Tint</label>
                  <input type="color" id="colorPicker" value="#ffffff">
                </div>
              </div>

              <div class="control-group">
                <div class="control-header">
                  <label class="control-label" for="borderOpacityRange">Border Opacity</label>
                  <span class="control-value" id="borderOpacityVal">0.20</span>
                </div>
                <input type="range" id="borderOpacityRange" min="0" max="1" value="0.20" step="0.01">
              </div>
              
              <div class="control-group">
                <div class="control-header">
                  <label class="control-label" for="shadowRange">Shadow Depth</label>
                  <span class="control-value" id="shadowVal">32px</span>
                </div>
                <input type="range" id="shadowRange" min="0" max="60" value="32" step="1">
              </div>
            </div>

            <div class="output-area">
              <div class="section-title">CSS Output</div>
              <textarea id="cssOutput" readonly></textarea>
              <button class="btn btn-primary" id="copyBtn">Copy CSS Code</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
      const glassTarget = document.getElementById("glassTarget");
      const cssOutput = document.getElementById("cssOutput");
      
      const blurRange = document.getElementById("blurRange");
      const blurVal = document.getElementById("blurVal");
      
      const opacityRange = document.getElementById("opacityRange");
      const opacityVal = document.getElementById("opacityVal");
      
      const colorPicker = document.getElementById("colorPicker");
      
      const borderOpacityRange = document.getElementById("borderOpacityRange");
      const borderOpacityVal = document.getElementById("borderOpacityVal");
      
      const shadowRange = document.getElementById("shadowRange");
      const shadowVal = document.getElementById("shadowVal");

      const copyBtn = document.getElementById("copyBtn");
      const toast = document.getElementById("toast");

      // Convert HEX to RGB
      function hexToRgb(hex) {
        let shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
        hex = hex.replace(shorthandRegex, function(m, r, g, b) {
          return r + r + g + g + b + b;
        });

        let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
          r: parseInt(result[1], 16),
          g: parseInt(result[2], 16),
          b: parseInt(result[3], 16)
        } : { r: 255, g: 255, b: 255 };
      }

      function updateGlass() {
        const blur = blurRange.value;
        const opacity = opacityRange.value;
        const borderOpacity = borderOpacityRange.value;
        const shadow = shadowRange.value;
        
        const rgb = hexToRgb(colorPicker.value);
        
        blurVal.textContent = `${blur}px`;
        opacityVal.textContent = parseFloat(opacity).toFixed(2);
        borderOpacityVal.textContent = parseFloat(borderOpacity).toFixed(2);
        shadowVal.textContent = `${shadow}px`;

        const bgColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;
        const borderColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${borderOpacity})`;
        
        // Update DOM Styles
        glassTarget.style.backdropFilter = `blur(${blur}px)`;
        glassTarget.style.webkitBackdropFilter = `blur(${blur}px)`;
        glassTarget.style.backgroundColor = bgColor;
        glassTarget.style.border = `1px solid ${borderColor}`;
        glassTarget.style.boxShadow = `0 8px ${shadow}px 0 rgba(0, 0, 0, 0.37)`;

        // Generate CSS Code
        const cssCode = `/* Glassmorphism card effect */
background: ${bgColor};
box-shadow: 0 8px ${shadow}px 0 rgba(0, 0, 0, 0.37);
backdrop-filter: blur(${blur}px);
-webkit-backdrop-filter: blur(${blur}px);
border: 1px solid ${borderColor};
border-radius: 20px;`;

        cssOutput.value = cssCode;
      }

      // Add event listeners to all inputs
      const inputs = [blurRange, opacityRange, colorPicker, borderOpacityRange, shadowRange];
      inputs.forEach(input => {
        input.addEventListener("input", updateGlass);
      });

      // Copy Button
      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(cssOutput.value);
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 2500);
        } catch (err) {
          console.error("Failed to copy", err);
        }
      });

      // Initial Call
      updateGlass();

    </script>
  </body>
</html>
