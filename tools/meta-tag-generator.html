<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meta Tag Generator — One File Tools</title>

    <style>
      /* ========================================
       Reset & Base
       ======================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
        background: #fafafa;
        color: #1a1a1a;
      }

      small {
        display: block;
        margin-top: 4px;
        color: #666;
        font-size: 12px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #aaa;
        }
      }

      /* ========================================
       Layout
       ======================================== */

      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      h1 {
        margin-bottom: 0.5rem;
      }

      header p {
        color: #666;
      }

      @media (prefers-color-scheme: dark) {
        header p {
          color: #aaa;
        }
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      .panel {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 1.5rem;
        background: white;
      }

      .preview-box {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        background: #fafafa;
      }

      .preview-box h3 {
        margin: 0 0 0.5rem;
      }

      .preview-box p {
        margin-bottom: 0.5rem;
      }

      .preview-box small {
        color: #666;
      }

      @media (prefers-color-scheme: dark) {
        .preview-box {
          background: #1d1d1d;
          border-color: #333;
        }

        .preview-box small {
          color: #aaa;
        }
      }

      @media (prefers-color-scheme: dark) {
        .panel {
          background: #161616;
          border-color: #333;
        }
      }

      h2 {
        margin-bottom: 1rem;
      }

      h3 {
        margin: 1.5rem 0 0.75rem;
        font-size: 1rem;
        color: #1d9bf0;
      }

      label {
        display: block;
        margin-top: 1rem;
        margin-bottom: 0.35rem;
        font-weight: 600;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px solid #bbb;
        font-size: 15px;
      }

      textarea {
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: 2px solid #1d9bf0;
        outline-offset: 2px;
      }

      #output {
        height: 400px;
        font-family: Consolas, monospace;
      }

      .buttons {
        margin-top: 1rem;
        display: flex;
        gap: 0.75rem;
      }

      button {
        padding: 0.8rem 1.2rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #1d9bf0;
        color: white;
        font-size: 15px;
      }

      button:hover {
        opacity: 0.9;
      }

      #resetBtn {
        background: #666;
      }

      footer {
        margin-top: 2rem;
        text-align: center;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }

        #output {
          height: 300px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Meta Tag Generator</h1>
      <p>Generate essential HTML meta tags for your web pages instantly.</p>
    </header>

    <main>
      <div class="container">
        <!-- LEFT PANEL -->

        <section class="panel">
          <h2>Inputs</h2>

          <h3>Basic Information</h3>

          <label for="title">Page Title</label>
          <input id="title" type="text" placeholder="My Awesome Website" />
          <small id="titleCount">0 / 60</small>

          <label for="description">Description</label>
          <textarea id="description" rows="3" placeholder="Short description of your website"></textarea>
          <small id="descriptionCount">0 / 160</small>

          <label for="keywords">Keywords</label>
          <input id="keywords" type="text" placeholder="seo, html, meta tags" />

          <label for="author">Author</label>
          <input id="author" type="text" placeholder="John Doe" />

          <h3>SEO</h3>

          <label for="robots">Robots</label>

          <select id="robots">
            <option>index, follow</option>
            <option>index, nofollow</option>
            <option>noindex, follow</option>
            <option>noindex, nofollow</option>
          </select>

          <h3>Technical</h3>

          <label for="charset">Charset</label>

          <select id="charset">
            <option>UTF-8</option>
          </select>

          <label for="viewport">Viewport</label>

          <input id="viewport" value="width=device-width, initial-scale=1.0" />

          <label for="themeColor">Theme Color</label>

          <input id="themeColor" type="color" value="#1d9bf0" />
        </section>

        <!-- RIGHT PANEL -->

        <section class="panel">
          <h2>Preview Information</h2>

          <div class="preview-box">
            <h3 id="previewTitle">My Awesome Website</h3>

            <p id="previewDescription">A short description of your website.</p>

            <small id="previewAuthor"> Your Name </small>
          </div>

          <h2>Generated HTML</h2>

          <textarea id="output" readonly aria-label="Generated HTML meta tags"></textarea>

          <div class="buttons">
            <button id="copyBtn">Copy Meta Tags</button>
            <button id="resetBtn">Reset</button>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <p>
        Part of
        <a href="https://github.com/praveenscience/One-File-Tools" target="_blank" rel="noopener noreferrer"> One File Tools </a>
      </p>
    </footer>

    <script>
            const titleInput = document.getElementById("title");
            const descriptionInput = document.getElementById("description");
            const keywordsInput = document.getElementById("keywords");
            const authorInput = document.getElementById("author");
            const robotsInput = document.getElementById("robots");
            const charsetInput = document.getElementById("charset");
            const viewportInput = document.getElementById("viewport");
            const themeColorInput = document.getElementById("themeColor");

            const output = document.getElementById("output");
            const previewTitle = document.getElementById("previewTitle");

            const previewDescription = document.getElementById("previewDescription");

            const previewAuthor = document.getElementById("previewAuthor");
            const copyBtn = document.getElementById("copyBtn");
            const resetBtn = document.getElementById("resetBtn");

            function generateMetaTags() {
              const title = titleInput.value.trim() || "My Awesome Website";

              const description = descriptionInput.value.trim() || "A short description of your website.";

              const keywords = keywordsInput.value.trim() || "seo, html, meta tags";

              const author = authorInput.value.trim() || "Your Name";

              const robots = robotsInput.value;
              const charset = charsetInput.value;
              const viewport = viewportInput.value.trim();
              const themeColor = themeColorInput.value;
              previewTitle.textContent = title;
              previewDescription.textContent = description;
              previewAuthor.textContent = `Author: ${author}`;
              const titleCounter = document.getElementById("titleCount");
              titleCounter.textContent = `${titleInput.value.length} / 60`;
              titleCounter.style.color = titleInput.value.length > 60 ? "#ef4444" : "inherit";

              const descriptionCounter = document.getElementById("descriptionCount");
              descriptionCounter.textContent = `${descriptionInput.value.length} / 160`;
              descriptionCounter.style.color = descriptionInput.value.length > 160 ? "#ef4444" : "inherit";
           output.value = `<title>${title}</title>
      <meta charset="${charset}">
      <meta name="viewport" content="${viewport}">
      <meta name="description" content="${description}">
      <meta name="keywords" content="${keywords}">
      <meta name="author" content="${author}">
      <meta name="robots" content="${robots}">
      <meta name="theme-color" content="${themeColor}">`;
            }

            [titleInput, descriptionInput, keywordsInput, authorInput, robotsInput, charsetInput, viewportInput, themeColorInput].forEach((element) => {
              element.addEventListener("input", generateMetaTags);
              element.addEventListener("change", generateMetaTags);
            });

            copyBtn.addEventListener("click", async () => {
              try {
                await navigator.clipboard.writeText(output.value);

                const originalText = copyBtn.textContent;
                const originalColor = copyBtn.style.backgroundColor;

                copyBtn.textContent = "Copied!";
                copyBtn.style.backgroundColor = "#16a34a";

                setTimeout(() => {
                  copyBtn.textContent = originalText;
                  copyBtn.style.backgroundColor = originalColor || "#1d9bf0";
                }, 2000);
              } catch {
                alert("Failed to copy meta tags.");
              }
            });

            resetBtn.addEventListener("click", () => {
              titleInput.value = "";
              descriptionInput.value = "";
              keywordsInput.value = "";
              authorInput.value = "";

              robotsInput.value = "index, follow";
              charsetInput.value = "UTF-8";
              viewportInput.value = "width=device-width, initial-scale=1.0";
              themeColorInput.value = "#1d9bf0";

              generateMetaTags();
            });

            generateMetaTags();
    </script>
  </body>
</html>
