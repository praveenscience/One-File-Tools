<!--
Clip Path Generator
Single-file CSS clip-path generator.
Built for One File Tools.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clip Path Generator - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #0b0f19;
        --grid-line: #131c2d;
        --panel: #111827;
        --panel-border: #1e293b;
        --accent: #f43f5e;
        --accent-hover: #e11d48;
        --accent-glow: rgba(244, 63, 94, 0.2);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --radius-sm: 8px;
        --radius-md: 14px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 28px 28px;
        color: var(--text);
        padding: 48px 20px 64px;
        min-height: 100vh;
      }

      .app {
        max-width: 1000px;
        margin: 0 auto;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(36px, 6vw, 52px);
        letter-spacing: -0.01em;
        line-height: 1.1;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 16px;
        margin-top: 12px;
      }

      .studio {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -14px rgba(0, 0, 0, 0.5);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 32px;
      }

      /* Workspace */
      .editor-pane {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .workspace {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        background: #1e293b;
        border-radius: var(--radius-sm);
        overflow: hidden;
        background-image: 
          linear-gradient(45deg, #0f172a 25%, transparent 25%, transparent 75%, #0f172a 75%, #0f172a), 
          linear-gradient(45deg, #0f172a 25%, transparent 25%, transparent 75%, #0f172a 75%, #0f172a);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        touch-action: none; /* Prevent scrolling when dragging */
        cursor: crosshair;
      }

      .preview-target {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #f43f5e 0%, #8b5cf6 100%);
        transition: clip-path 0.1s ease-out;
        pointer-events: none;
      }

      .handles-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .connecting-lines {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .connecting-lines polygon, .connecting-lines path {
        fill: rgba(244, 63, 94, 0.1);
        stroke: var(--accent);
        stroke-width: 2;
        stroke-dasharray: 4 4;
      }

      .handle {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #fff;
        border: 3px solid var(--accent);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        pointer-events: auto;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        transition: transform 0.1s, box-shadow 0.1s;
      }

      .handle:hover {
        transform: translate(-50%, -50%) scale(1.2);
        box-shadow: 0 4px 12px rgba(244, 63, 94, 0.4);
      }

      .handle:active {
        cursor: grabbing;
        transform: translate(-50%, -50%) scale(0.9);
      }

      /* Controls */
      .controls-pane {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .section-title {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 12px;
      }

      .presets-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }

      .preset-btn {
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 10px;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }

      .preset-btn:hover {
        border-color: var(--accent);
        background: rgba(244, 63, 94, 0.05);
      }

      .preset-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 600;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .control-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .control-label {
        font-size: 13px;
        color: var(--text);
        font-weight: 500;
      }

      .control-value {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-muted);
        background: #0f172a;
        padding: 2px 6px;
        border-radius: 4px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }
      
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        margin-top: -6px;
        box-shadow: 0 0 10px var(--accent-glow);
      }
      
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: var(--panel-border);
        border-radius: 2px;
      }

      .toggle-switch {
        display: flex;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }
      .toggle-btn {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-family: var(--font-sans);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .toggle-btn.active {
        background: var(--panel-border);
        color: var(--text);
        font-weight: 600;
      }

      .output-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      textarea {
        flex: 1;
        min-height: 120px;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--accent);
        resize: none;
        outline: none;
        transition: border-color 0.2s;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      textarea:focus {
        border-color: var(--accent);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-sm);
        padding: 12px 24px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 24px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .helper-text {
        font-size: 12px;
        color: var(--text-dim);
        margin-top: -4px;
        margin-bottom: 16px;
        line-height: 1.4;
      }

      @media (max-width: 800px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .workspace {
          max-height: 60vh;
        }
        .presets-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      @media (max-width: 500px) {
        .presets-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <!-- Hidden SVG definition for responsive curved clipping -->
    <svg width="0" height="0">
      <defs>
        <clipPath id="custom-curve-clip" clipPathUnits="objectBoundingBox">
          <path id="svgCurvePathUnit" d=""></path>
        </clipPath>
      </defs>
    </svg>

    <div class="app">
      <header class="hero">
        <div class="eyebrow">CSS Tools</div>
        <h1 class="wordmark">Clip Path Generator</h1>
        <p class="tagline">Visually create complex CSS clip-path shapes and copy the code.</p>
      </header>

      <main class="studio">
        <div class="layout">
          <!-- Workspace -->
          <div class="editor-pane">
            <div class="section-title">Visual Editor</div>
            <div class="workspace" id="workspace">
              <div class="preview-target" id="previewTarget"></div>
              <svg class="connecting-lines" id="connectingLines">
                <polygon id="svgPolygon" points=""></polygon>
                <path id="svgDisplayPath" d="" fill="none" style="display:none;"></path>
              </svg>
              <div class="handles-layer" id="handlesLayer"></div>
            </div>
            <div class="helper-text">
              <strong>Tip:</strong> Double-click canvas to add a point. Double-click a handle to remove it.
            </div>
          </div>

          <!-- Controls -->
          <div class="controls-pane">
            <div>
              <div class="section-title">Shape Settings</div>
              
              <div class="control-group">
                <div class="control-header">
                  <label class="control-label">Path Type</label>
                </div>
                <div class="toggle-switch">
                  <button class="toggle-btn active" id="btnPolygon">Polygon (Straight)</button>
                  <button class="toggle-btn" id="btnCurve">Curve (Smooth)</button>
                </div>
              </div>

              <div class="control-group" style="margin-top:20px;">
                <div class="control-header">
                  <label class="control-label" for="verticesRange">Regular Polygon Vertices</label>
                  <span class="control-value" id="verticesVal">3</span>
                </div>
                <input type="range" id="verticesRange" min="3" max="20" value="3" step="1">
              </div>

              <div class="section-title" style="margin-top:24px;">Presets</div>
              <div class="presets-grid" id="presetsGrid">
                <!-- Injected via JS -->
              </div>
            </div>

            <div class="output-area">
              <div class="section-title">Output Code</div>
              <textarea id="cssOutput" readonly></textarea>
              <button class="btn btn-primary" id="copyBtn">Copy Code</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
      const workspace = document.getElementById("workspace");
      const previewTarget = document.getElementById("previewTarget");
      const handlesLayer = document.getElementById("handlesLayer");
      const svgPolygon = document.getElementById("svgPolygon");
      const svgDisplayPath = document.getElementById("svgDisplayPath");
      const svgCurvePathUnit = document.getElementById("svgCurvePathUnit");
      
      const cssOutput = document.getElementById("cssOutput");
      const copyBtn = document.getElementById("copyBtn");
      const presetsGrid = document.getElementById("presetsGrid");
      const toast = document.getElementById("toast");
      
      const btnPolygon = document.getElementById("btnPolygon");
      const btnCurve = document.getElementById("btnCurve");
      const verticesRange = document.getElementById("verticesRange");
      const verticesVal = document.getElementById("verticesVal");

      // Modes
      let isCurveMode = false;

      // Presets definition
      const presets = {
        Triangle: [
          { x: 50, y: 0 },
          { x: 0, y: 100 },
          { x: 100, y: 100 }
        ],
        Trapezoid: [
          { x: 20, y: 0 },
          { x: 80, y: 0 },
          { x: 100, y: 100 },
          { x: 0, y: 100 }
        ],
        Parallelogram: [
          { x: 25, y: 0 },
          { x: 100, y: 0 },
          { x: 75, y: 100 },
          { x: 0, y: 100 }
        ],
        Rhombus: [
          { x: 50, y: 0 },
          { x: 100, y: 50 },
          { x: 50, y: 100 },
          { x: 0, y: 50 }
        ],
        Pentagon: [
          { x: 50, y: 0 },
          { x: 100, y: 38 },
          { x: 82, y: 100 },
          { x: 18, y: 100 },
          { x: 0, y: 38 }
        ],
        Hexagon: [
          { x: 50, y: 0 },
          { x: 100, y: 25 },
          { x: 100, y: 75 },
          { x: 50, y: 100 },
          { x: 0, y: 75 },
          { x: 0, y: 25 }
        ],
        Star: [
          { x: 50, y: 0 },
          { x: 61, y: 35 },
          { x: 98, y: 35 },
          { x: 68, y: 57 },
          { x: 79, y: 91 },
          { x: 50, y: 70 },
          { x: 21, y: 91 },
          { x: 32, y: 57 },
          { x: 2, y: 35 },
          { x: 39, y: 35 }
        ],
        Chevron: [
          { x: 100, y: 50 },
          { x: 75, y: 100 },
          { x: 0, y: 100 },
          { x: 25, y: 50 },
          { x: 0, y: 0 },
          { x: 75, y: 0 }
        ],
        Cross: [
          { x: 35, y: 0 },
          { x: 65, y: 0 },
          { x: 65, y: 35 },
          { x: 100, y: 35 },
          { x: 100, y: 65 },
          { x: 65, y: 65 },
          { x: 65, y: 100 },
          { x: 35, y: 100 },
          { x: 35, y: 65 },
          { x: 0, y: 65 },
          { x: 0, y: 35 },
          { x: 35, y: 35 }
        ]
      };

      let points = [];
      let draggedPointIndex = null;
      let isDragging = false;

      function initPresets() {
        Object.keys(presets).forEach((key, index) => {
          const btn = document.createElement("button");
          btn.className = "preset-btn";
          if (index === 0) btn.classList.add("active");
          btn.textContent = key;
          btn.onclick = () => {
            document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            loadPreset(key);
          };
          presetsGrid.appendChild(btn);
        });
      }

      function generateRegularPolygon(numPoints) {
        points = [];
        for (let i = 0; i < numPoints; i++) {
          const angle = (i * 2 * Math.PI) / numPoints - Math.PI / 2;
          const x = 50 + 50 * Math.cos(angle);
          const y = 50 + 50 * Math.sin(angle);
          points.push({ x, y });
        }
        document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
        renderHandles();
        updateClipPath();
      }

      verticesRange.addEventListener("input", (e) => {
        verticesVal.textContent = e.target.value;
        generateRegularPolygon(parseInt(e.target.value));
      });

      function loadPreset(name) {
        points = presets[name].map(p => ({ ...p }));
        verticesRange.value = points.length;
        verticesVal.textContent = points.length;
        renderHandles();
        updateClipPath();
      }

      function renderHandles() {
        handlesLayer.innerHTML = "";
        points.forEach((point, i) => {
          const handle = document.createElement("div");
          handle.className = "handle";
          handle.style.left = `${point.x}%`;
          handle.style.top = `${point.y}%`;
          
          handle.addEventListener("pointerdown", (e) => startDrag(e, i));
          handle.addEventListener("dblclick", (e) => {
            e.stopPropagation(); // prevent workspace dblclick
            if (points.length > 3) {
              points.splice(i, 1);
              renderHandles();
              updateClipPath();
            }
          });
          handlesLayer.appendChild(handle);
        });
      }

      // Spline Math for Curve Mode
      function getSmoothPath(pts, scaleX, scaleY, isUnit = false) {
        if (pts.length < 3) return "";
        const d = [];
        const tension = 0.2;
        
        for (let i = 0; i < pts.length; i++) {
            const p0 = pts[(i - 1 + pts.length) % pts.length];
            const p1 = pts[i];
            const p2 = pts[(i + 1) % pts.length];
            const p3 = pts[(i + 2) % pts.length];
            
            const cp1x = (p1.x + (p2.x - p0.x) * tension) * scaleX;
            const cp1y = (p1.y + (p2.y - p0.y) * tension) * scaleY;
            
            const cp2x = (p2.x - (p3.x - p1.x) * tension) * scaleX;
            const cp2y = (p2.y - (p3.y - p1.y) * tension) * scaleY;
            
            if (i === 0) d.push(`M ${p1.x * scaleX} ${p1.y * scaleY}`);
            d.push(`C ${cp1x.toFixed(4)} ${cp1y.toFixed(4)}, ${cp2x.toFixed(4)} ${cp2y.toFixed(4)}, ${(p2.x * scaleX).toFixed(4)} ${(p2.y * scaleY).toFixed(4)}`);
        }
        return d.join(" ") + " Z";
      }

      function updateClipPath() {
        const rect = workspace.getBoundingClientRect();

        if (!isCurveMode) {
          // Polygon Mode
          const polyString = points.map(p => `${Math.round(p.x)}% ${Math.round(p.y)}%`).join(", ");
          const clipVal = `polygon(${polyString})`;
          
          previewTarget.style.clipPath = clipVal;
          cssOutput.value = `clip-path: ${clipVal};`;
          
          const svgPoints = points.map(p => `${(p.x / 100) * rect.width},${(p.y / 100) * rect.height}`).join(" ");
          svgPolygon.setAttribute("points", svgPoints);
          
          svgPolygon.style.display = "block";
          svgDisplayPath.style.display = "none";
          
        } else {
          // Curve Mode
          previewTarget.style.clipPath = `url(#custom-curve-clip)`;
          
          // 1. Generate path for actual SVG clipPath (Units: objectBoundingBox from 0 to 1)
          const unitPath = getSmoothPath(points, 0.01, 0.01);
          svgCurvePathUnit.setAttribute("d", unitPath);

          // 2. Generate path for the visual dotted line overlay (Units: Absolute pixels of workspace)
          const absPath = getSmoothPath(points, rect.width / 100, rect.height / 100);
          svgDisplayPath.setAttribute("d", absPath);
          
          svgPolygon.style.display = "none";
          svgDisplayPath.style.display = "block";

          // 3. Generate HTML/CSS Output
          cssOutput.value = `/* 1. Add this SVG block anywhere in your HTML body */
<svg width="0" height="0" style="position:absolute;">
  <defs>
    <clipPath id="custom-curve-clip" clipPathUnits="objectBoundingBox">
      <path d="${unitPath}"></path>
    </clipPath>
  </defs>
</svg>

/* 2. Apply this CSS to your element */
.my-element {
  clip-path: url(#custom-curve-clip);
}`;
        }
      }

      // Add point on canvas double click
      workspace.addEventListener("dblclick", (e) => {
        if (e.target.classList.contains("handle")) return; // handled separately
        
        const rect = workspace.getBoundingClientRect();
        let x = ((e.clientX - rect.left) / rect.width) * 100;
        let y = ((e.clientY - rect.top) / rect.height) * 100;
        
        x = Math.max(0, Math.min(100, x));
        y = Math.max(0, Math.min(100, y));
        
        // Find closest edge to insert the point
        let insertIndex = points.length;
        // Simple append for now
        points.push({x, y});
        renderHandles();
        updateClipPath();
      });

      // Resize observer to keep SVG lines accurate when window resizes
      const resizeObserver = new ResizeObserver(() => {
        updateClipPath();
      });
      resizeObserver.observe(workspace);

      function startDrag(e, index) {
        e.preventDefault();
        e.stopPropagation();
        isDragging = true;
        draggedPointIndex = index;
        document.body.style.cursor = "grabbing";
      }

      function onPointerMove(e) {
        if (!isDragging || draggedPointIndex === null) return;
        
        document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
        
        const rect = workspace.getBoundingClientRect();
        
        let x = ((e.clientX - rect.left) / rect.width) * 100;
        let y = ((e.clientY - rect.top) / rect.height) * 100;
        
        x = Math.max(0, Math.min(100, x));
        y = Math.max(0, Math.min(100, y));

        points[draggedPointIndex].x = x;
        points[draggedPointIndex].y = y;

        const handle = handlesLayer.children[draggedPointIndex];
        handle.style.left = `${x}%`;
        handle.style.top = `${y}%`;

        updateClipPath();
      }

      function onPointerUp() {
        if (isDragging) {
          isDragging = false;
          draggedPointIndex = null;
          document.body.style.cursor = "default";
        }
      }

      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);

      // Mode Toggles
      btnPolygon.addEventListener("click", () => {
        isCurveMode = false;
        btnCurve.classList.remove("active");
        btnPolygon.classList.add("active");
        updateClipPath();
      });
      btnCurve.addEventListener("click", () => {
        isCurveMode = true;
        btnPolygon.classList.remove("active");
        btnCurve.classList.add("active");
        updateClipPath();
      });

      // Copy Button
      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(cssOutput.value);
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 2500);
        } catch (err) {
          console.error("Failed to copy", err);
        }
      });

      // Init
      initPresets();
      loadPreset("Triangle");

    </script>
  </body>
</html>
