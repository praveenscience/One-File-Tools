<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Token Validator</title>

  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #222;
      --primary: #24292e;
      --border: #ddd;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --text: #f0f6fc;
        --border: #30363d;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 12px;
      padding: 12px 20px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
    }

    footer {
      margin-top: 40px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>GitHub Token Validator</h1>

      <p>
        Validate GitHub Personal Access Tokens and inspect available information.
      </p>

      <label for="token">
        GitHub Token
      </label>

      <textarea
        id="token"
        placeholder="Paste your GitHub token here">
      </textarea>

      <button id="validateBtn">
        Validate Token
      </button>

      <div id="result" class="result"></div>

    </div>

    <footer>
      Part of
      <a href="https://github.com/praveenscience/One-File-Tools">
        One File Tools
      </a>
    </footer>

  </div>

  <script>
  const validateBtn = document.getElementById("validateBtn");
  const tokenInput = document.getElementById("token");
  const resultDiv = document.getElementById("result");

  validateBtn.addEventListener("click", async () => {

    const token = tokenInput.value.trim();

    if (!token) {
      resultDiv.innerHTML = `
        <p>Please enter a GitHub token.</p>
      `;
      return;
    }

    resultDiv.innerHTML = `
      <p>Checking token...</p>
    `;

    try {

      const response = await fetch(
        "https://api.github.com/user",
        {
          headers: {
            Authorization: `Bearer ${token}`
          }
        }
      );

      if (!response.ok) {
        resultDiv.innerHTML = `
          <p>❌ Invalid Token</p>
        `;
        return;
      }

      const userData = await response.json();

      const scopes =
        response.headers.get("x-oauth-scopes") ||
        "Not Available";

      resultDiv.innerHTML = `
        <h3>Validation Successful</h3>

        <p>
          <strong>Status:</strong>
          Valid
        </p>

        <p>
          <strong>Owner:</strong>
          ${userData.login}
        </p>

        <p>
          <strong>Scopes:</strong>
          ${scopes}
        </p>

        <p>
          <strong>Expiry:</strong>
          Not Available from GitHub API
        </p>
      `;

    } catch (error) {

      resultDiv.innerHTML = `
        <p>
          ❌ Could not connect to GitHub.
        </p>
      `;

      console.error(error);
    }

  });
</script>
</body>
</html>
