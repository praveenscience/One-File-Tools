<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robots.txt Generator | One File Tools</title>
    <style>
      /* ==========================================================================
           Design System Tokens (Linear & Vercel Inspired)
           ========================================================================== */
      :root {
        /* Light Theme */
        --bg-base: #f9fafb;
        --bg-surface: #ffffff;
        --bg-surface-hover: #f3f4f6;
        --border-color: #e5e7eb;
        --border-focus: #3b82f6;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --text-tertiary: #9ca3af;
        --accent-primary: #000000;
        --accent-primary-text: #ffffff;
        --accent-blue: #2563eb;
        --accent-blue-bg: #eff6ff;
        --accent-red: #dc2626;
        --accent-red-bg: #fef2f2;
        --accent-green: #059669;

        /* Syntax Highlighting (Light) */
        --sh-directive: #2563eb;
        --sh-value: #059669;
        --sh-comment: #9ca3af;
        --sh-asterisk: #d97706;

        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

        --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --transition-speed: 0.2s;
      }

      [data-theme="dark"] {
        /* Dark Theme (Premium Developer Console) */
        --bg-base: #030712;
        --bg-surface: #111827;
        --bg-surface-hover: #1f2937;
        --border-color: #374151;
        --border-focus: #60a5fa;
        --text-primary: #f9fafb;
        --text-secondary: #9ca3af;
        --text-tertiary: #6b7280;
        --accent-primary: #ffffff;
        --accent-primary-text: #000000;
        --accent-blue: #3b82f6;
        --accent-blue-bg: rgba(59, 130, 246, 0.1);
        --accent-red: #ef4444;
        --accent-red-bg: rgba(239, 68, 68, 0.1);
        --accent-green: #10b981;

        /* Syntax Highlighting (Dark) */
        --sh-directive: #60a5fa;
        --sh-value: #34d399;
        --sh-comment: #6b7280;
        --sh-asterisk: #fbbf24;

        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      }

      /* ==========================================================================
           Reset & Base Styles
           ========================================================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg-base);
        color: var(--text-primary);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition:
          background-color var(--transition-speed) ease,
          color var(--transition-speed) ease;
      }

      /* ==========================================================================
           Layout Structure
           ========================================================================== */
      .app-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.5rem;
        background-color: var(--bg-surface);
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 600;
        font-size: 1.125rem;
        letter-spacing: -0.025em;
      }

      .brand-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background-color: var(--accent-primary);
        color: var(--accent-primary-text);
        border-radius: var(--radius-md);
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr;
        flex: 1;
        overflow: hidden;
        height: calc(100vh - 65px);
      }

      @media (max-width: 1024px) {
        .workspace {
          grid-template-columns: 1fr;
          height: auto;
          overflow: visible;
        }
      }

      /* ==========================================================================
           Left Panel: Controls & Builders
           ========================================================================== */
      .panel-controls {
        padding: 2rem;
        overflow-y: auto;
        border-right: 1px solid var(--border-color);
        background-color: var(--bg-base);
      }

      .section-header {
        margin-bottom: 1.5rem;
      }

      .section-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        letter-spacing: -0.025em;
      }

      .section-description {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      /* Cards */
      .card {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: var(--shadow-sm);
        transition: border-color var(--transition-speed) ease;
      }

      .card:focus-within {
        border-color: var(--border-focus);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 0.75rem;
      }

      .card-title {
        font-size: 0.875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* Form Elements */
      .form-group {
        margin-bottom: 1rem;
      }

      .form-group:last-child {
        margin-bottom: 0;
      }

      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--text-primary);
      }

      .form-input {
        width: 100%;
        padding: 0.625rem 0.875rem;
        background-color: var(--bg-base);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: 0.875rem;
        transition: all var(--transition-speed) ease;
        outline: none;
      }

      .form-input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px var(--accent-blue-bg);
      }

      .form-input::placeholder {
        color: var(--text-tertiary);
      }

      .input-with-icon {
        position: relative;
      }

      .input-with-icon svg {
        position: absolute;
        left: 0.875rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-tertiary);
      }

      .input-with-icon .form-input {
        padding-left: 2.5rem;
      }

      /* Dynamic Lists (Allow/Disallow/Sitemaps) */
      .dynamic-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .dynamic-list-item {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .dynamic-list-item .form-input {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
      }

      /* Presets Toolbar */
      .presets-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }

      .preset-badge {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        padding: 0.375rem 0.75rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--transition-speed) ease;
      }

      .preset-badge:hover {
        background-color: var(--bg-surface-hover);
        color: var(--text-primary);
        border-color: var(--text-tertiary);
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-speed) ease;
        border: 1px solid transparent;
        font-family: var(--font-sans);
        outline: none;
      }

      .btn-primary {
        background-color: var(--accent-primary);
        color: var(--accent-primary-text);
      }

      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .btn-secondary {
        background-color: var(--bg-surface);
        color: var(--text-primary);
        border-color: var(--border-color);
      }

      .btn-secondary:hover {
        background-color: var(--bg-surface-hover);
      }

      .btn-danger-icon {
        background-color: transparent;
        color: var(--text-tertiary);
        border: none;
        padding: 0.5rem;
        border-radius: var(--radius-md);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-danger-icon:hover {
        background-color: var(--accent-red-bg);
        color: var(--accent-red);
      }

      .btn-add {
        width: 100%;
        background-color: transparent;
        border: 1px dashed var(--border-color);
        color: var(--text-secondary);
        padding: 0.75rem;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 500;
        transition: all var(--transition-speed) ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .btn-add:hover {
        border-color: var(--border-focus);
        color: var(--accent-blue);
        background-color: var(--accent-blue-bg);
      }

      /* Type Toggles */
      .type-toggle {
        display: flex;
        background-color: var(--bg-base);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        overflow: hidden;
        min-width: 140px;
        flex-shrink: 0;
        margin-bottom: 0.5rem;
      }

      .type-toggle button {
        flex: 1;
        padding: 0.375rem 0;
        font-size: 0.75rem;
        font-weight: 600;
        background: transparent;
        border: none;
        cursor: pointer;
        color: var(--text-secondary);
        transition: all var(--transition-speed) ease;
      }

      .type-toggle button.active-allow {
        background-color: var(--accent-green);
        color: white;
      }

      .type-toggle button.active-disallow {
        background-color: var(--accent-red);
        color: white;
      }

      /* ==========================================================================
           Right Panel: Live Preview & Export
           ========================================================================== */
      .panel-preview {
        background-color: var(--bg-surface);
        display: flex;
        flex-direction: column;
        border-left: 1px solid var(--border-color);
      }

      .preview-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border-color);
        background-color: var(--bg-surface);
      }

      .preview-title {
        font-family: var(--font-mono);
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .preview-actions {
        display: flex;
        gap: 0.5rem;
      }

      .preview-content {
        flex: 1;
        padding: 1.5rem;
        overflow-y: auto;
        background-color: var(--bg-base);
        position: relative;
      }

      /* Code Editor Simulation */
      .code-container {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        min-height: 100%;
        padding: 1.5rem;
        box-shadow: var(--shadow-sm);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        line-height: 1.7;
        color: var(--text-primary);
        white-space: pre-wrap;
        word-wrap: break-word;
        tab-size: 4;
      }

      /* Syntax Highlighting Classes */
      .sh-directive {
        color: var(--sh-directive);
        font-weight: 600;
      }
      .sh-value {
        color: var(--sh-value);
      }
      .sh-comment {
        color: var(--sh-comment);
        font-style: italic;
      }
      .sh-asterisk {
        color: var(--sh-asterisk);
        font-weight: bold;
      }

      /* Empty State */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-tertiary);
        text-align: center;
      }

      .empty-state svg {
        width: 48px;
        height: 48px;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      /* Theme Toggle Button */
      .theme-toggle {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        width: 36px;
        height: 36px;
        border-radius: var(--radius-md);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition-speed) ease;
      }

      .theme-toggle:hover {
        background-color: var(--bg-surface-hover);
        color: var(--text-primary);
      }

      /* Toast Notification */
      .toast-container {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        pointer-events: none;
      }

      .toast {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.75rem 1.25rem;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-lg);
        font-size: 0.875rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        transform: translateY(100%);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .toast svg {
        color: var(--accent-green);
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Application Header -->
      <header class="header">
        <div class="header-brand">
          <div class="brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" />
              <path d="M5 8h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2z" />
              <line x1="9" y1="13" x2="9" y2="17" />
              <line x1="15" y1="13" x2="15" y2="17" />
            </svg>
          </div>
          Robots.txt Generator
        </div>
        <div class="header-actions">
          <button class="theme-toggle" id="themeToggleBtn" aria-label="Toggle Dark Mode" title="Toggle Theme">
            <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
            <svg id="iconSun" style="display: none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <!-- Left Column: Controls & Input Builder -->
        <section class="panel-controls">
          <div class="section-header">
            <h1 class="section-title">Configure Directives</h1>
            <p class="section-description">Define crawling rules for search engine bots visually.</p>
          </div>

          <!-- Presets Toolbar -->
          <div class="presets-toolbar">
            <button class="preset-badge" data-preset="allow-all">Allow All</button>
            <button class="preset-badge" data-preset="disallow-all">Disallow All</button>
            <button class="preset-badge" data-preset="seo-standard">Standard SEO</button>
            <button class="preset-badge" data-preset="wordpress">WordPress Base</button>
            <button class="preset-badge" data-preset="clear-all" style="color: var(--accent-red); border-color: var(--accent-red-bg)">Clear All</button>
          </div>

          <!-- Global Rules Card -->
          <div class="card" id="globalRulesCard">
            <div class="card-header">
              <div class="card-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <line x1="2" y1="12" x2="22" y2="12" />
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
                Global Configurations
              </div>
            </div>
            <div class="card-body">
              <!-- Host Input -->
              <div class="form-group">
                <label class="form-label">Primary Host (Optional)</label>
                <div class="input-with-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                  </svg>
                  <input type="text" id="globalHostInput" class="form-input" placeholder="e.g., www.example.com" />
                </div>
              </div>

              <!-- Sitemaps List -->
              <div class="form-group" style="margin-top: 1.5rem">
                <label class="form-label">XML Sitemaps</label>
                <div class="dynamic-list" id="sitemapsContainer">
                  <!-- Sitemap items rendered here -->
                </div>
                <button type="button" class="btn-add" id="addSitemapBtn" style="margin-top: 0.5rem; padding: 0.5rem; font-size: 0.8125rem">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                  </svg>
                  Add Sitemap URL
                </button>
              </div>
            </div>
          </div>

          <!-- User Agent Groups Container -->
          <div id="agentGroupsContainer">
            <!-- Agent Group Cards rendered here via JavaScript -->
          </div>

          <!-- Add New Group Button -->
          <button type="button" class="btn-add" id="addAgentGroupBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add New User-Agent Group
          </button>
        </section>

        <!-- Right Column: Live Output & Export -->
        <section class="panel-preview">
          <div class="preview-header">
            <div class="preview-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
                <polyline points="10 9 9 9 8 9" />
              </svg>
              robots.txt
            </div>
            <div class="preview-actions">
              <button class="btn btn-secondary" id="copyCodeBtn" title="Copy to clipboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                Copy
              </button>
              <button class="btn btn-primary" id="downloadCodeBtn" title="Download file">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Download
              </button>
            </div>
          </div>
          <div class="preview-content">
            <div class="code-container" id="codeOutput">
              <!-- Live syntax highlighted code rendered here -->
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Interactive JavaScript Core -->
    <script>
      /**
       * State Management Architecture
       * Stores the entire application state to ensure robust UI re-rendering
       * and clean data extraction for file generation.
       */
      const AppState = {
        global: {
          host: "",
          sitemaps: []
        },
        groups: [
          {
            id: generateId(),
            userAgent: "*",
            crawlDelay: "",
            rules: [{ id: generateId(), type: "allow", path: "/" }]
          }
        ]
      };

      // Utility: Generate Unique ID
      function generateId() {
        return Math.random().toString(36).substr(2, 9);
      }

      // Common Bot Data List for Autocomplete
      const COMMON_BOTS = ["*", "Googlebot", "Googlebot-Image", "Googlebot-News", "Bingbot", "Slurp", "DuckDuckBot", "Baiduspider", "YandexBot", "Applebot", "ChatGPT-User"];

      /* ==========================================================================
           DOM Elements Caching
           ========================================================================== */
      const els = {
        themeToggle: document.getElementById("themeToggleBtn"),
        iconSun: document.getElementById("iconSun"),
        iconMoon: document.getElementById("iconMoon"),
        globalHost: document.getElementById("globalHostInput"),
        sitemapsContainer: document.getElementById("sitemapsContainer"),
        addSitemapBtn: document.getElementById("addSitemapBtn"),
        agentGroupsContainer: document.getElementById("agentGroupsContainer"),
        addAgentGroupBtn: document.getElementById("addAgentGroupBtn"),
        codeOutput: document.getElementById("codeOutput"),
        copyBtn: document.getElementById("copyCodeBtn"),
        downloadBtn: document.getElementById("downloadCodeBtn"),
        toastContainer: document.getElementById("toastContainer"),
        presetBadges: document.querySelectorAll(".preset-badge")
      };

      /* ==========================================================================
           Theme Management (Dark/Light Mode)
           ========================================================================== */
      function initTheme() {
        const savedTheme = localStorage.getItem("robots-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
          setTheme("dark");
        } else {
          setTheme("light");
        }

        els.themeToggle.addEventListener("click", () => {
          const isDark = document.documentElement.getAttribute("data-theme") === "dark";
          setTheme(isDark ? "light" : "dark");
        });
      }
      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("robots-theme", theme);
        els.iconSun.style.display = theme === "dark" ? "block" : "none";
        els.iconMoon.style.display = theme === "dark" ? "none" : "block";
      }

      /* ==========================================================================
           Toast Notifications
           ========================================================================== */
      function showToast(message, icon = "check") {
        const iconSVG = icon === "check" ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `${iconSVG} ${message}`;
        els.toastContainer.appendChild(toast);

        requestAnimationFrame(() => {
          requestAnimationFrame(() => toast.classList.add("show"));
        });

        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 300);
        }, 2800);
      }

      /* ==========================================================================
           Sitemap Rendering & Management
           ========================================================================== */
      function renderSitemaps() {
        els.sitemapsContainer.innerHTML = "";
        AppState.global.sitemaps.forEach((url, index) => {
          const item = document.createElement("div");
          item.className = "dynamic-list-item";
          item.innerHTML = `
                    <input type="text" class="form-input" placeholder="https://example.com/sitemap.xml"
                        value="${escapeHtml(url)}" data-sitemap-index="${index}" />
                    <button type="button" class="btn-danger-icon" data-remove-sitemap="${index}" title="Remove sitemap">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>`;
          els.sitemapsContainer.appendChild(item);
        });

        // Bind sitemap input changes
        els.sitemapsContainer.querySelectorAll("[data-sitemap-index]").forEach((input) => {
          input.addEventListener("input", (e) => {
            AppState.global.sitemaps[+e.target.dataset.sitemapIndex] = e.target.value;
            renderOutput();
          });
        });

        // Bind remove buttons
        els.sitemapsContainer.querySelectorAll("[data-remove-sitemap]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const idx = +e.currentTarget.dataset.removeSitemap;
            AppState.global.sitemaps.splice(idx, 1);
            renderSitemaps();
            renderOutput();
          });
        });
      }

      /* ==========================================================================
           Agent Group Rendering & Management
           ========================================================================== */
      function renderAgentGroups() {
        els.agentGroupsContainer.innerHTML = "";
        AppState.groups.forEach((group, gIndex) => {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.groupId = group.id;

          const rulesHTML = group.rules
            .map(
              (rule, rIndex) => `
                    <div class="dynamic-list-item" data-rule-id="${rule.id}">
                        <div class="type-toggle">
                            <button type="button" class="${rule.type === "allow" ? "active-allow" : ""}"
                                data-group="${gIndex}" data-rule="${rIndex}" data-set-type="allow">Allow</button>
                            <button type="button" class="${rule.type === "disallow" ? "active-disallow" : ""}"
                                data-group="${gIndex}" data-rule="${rIndex}" data-set-type="disallow">Disallow</button>
                        </div>
                        <input type="text" class="form-input" placeholder="/path/to/restrict"
                            value="${escapeHtml(rule.path)}"
                            data-group="${gIndex}" data-rule="${rIndex}" data-rule-path />
                        <button type="button" class="btn-danger-icon"
                            data-group="${gIndex}" data-remove-rule="${rIndex}" title="Remove rule">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>`
            )
            .join("");

          card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
                            User-Agent Group
                        </div>
                        ${
                          AppState.groups.length > 1
                            ? `
                        <button type="button" class="btn-danger-icon" data-remove-group="${gIndex}" title="Remove group">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                        </button>`
                            : ""
                        }
                    </div>
                    <div class="form-group">
                        <label class="form-label">User-Agent</label>
                        <input type="text" class="form-input" list="botList"
                            placeholder="* (all bots)" value="${escapeHtml(group.userAgent)}"
                            data-group="${gIndex}" data-ua-input />
                        <datalist id="botList">
                            ${COMMON_BOTS.map((b) => `<option value="${b}">`).join("")}
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Crawl-Delay (seconds, optional)</label>
                        <input type="number" class="form-input" placeholder="e.g., 10"
                            value="${escapeHtml(group.crawlDelay)}"
                            data-group="${gIndex}" data-crawl-delay min="0" />
                    </div>
                    <div class="form-group" style="margin-top: 1.25rem;">
                        <label class="form-label">Rules</label>
                        <div class="dynamic-list" id="rulesList_${gIndex}">
                            ${rulesHTML}
                        </div>
                        <button type="button" class="btn-add" data-add-rule="${gIndex}" style="margin-top: 0.5rem; padding: 0.5rem; font-size: 0.8125rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Add Rule
                        </button>
                    </div>`;

          els.agentGroupsContainer.appendChild(card);
        });

        // Bind User-Agent inputs
        els.agentGroupsContainer.querySelectorAll("[data-ua-input]").forEach((input) => {
          input.addEventListener("input", (e) => {
            AppState.groups[+e.target.dataset.group].userAgent = e.target.value;
            renderOutput();
          });
        });

        // Bind Crawl-Delay inputs
        els.agentGroupsContainer.querySelectorAll("[data-crawl-delay]").forEach((input) => {
          input.addEventListener("input", (e) => {
            AppState.groups[+e.target.dataset.group].crawlDelay = e.target.value;
            renderOutput();
          });
        });

        // Bind rule path inputs
        els.agentGroupsContainer.querySelectorAll("[data-rule-path]").forEach((input) => {
          input.addEventListener("input", (e) => {
            const g = +e.target.dataset.group;
            const r = +e.target.dataset.rule;
            AppState.groups[g].rules[r].path = e.target.value;
            renderOutput();
          });
        });

        // Bind type toggles
        els.agentGroupsContainer.querySelectorAll("[data-set-type]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const g = +e.target.dataset.group;
            const r = +e.target.dataset.rule;
            AppState.groups[g].rules[r].type = e.target.dataset.setType;
            renderAgentGroups();
            renderOutput();
          });
        });

        // Bind remove rule buttons
        els.agentGroupsContainer.querySelectorAll("[data-remove-rule]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const g = +e.currentTarget.dataset.group;
            const r = +e.currentTarget.dataset.removeRule;
            AppState.groups[g].rules.splice(r, 1);
            renderAgentGroups();
            renderOutput();
          });
        });

        // Bind add rule buttons
        els.agentGroupsContainer.querySelectorAll("[data-add-rule]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const g = +e.currentTarget.dataset.addRule;
            AppState.groups[g].rules.push({ id: generateId(), type: "disallow", path: "" });
            renderAgentGroups();
            renderOutput();
          });
        });

        // Bind remove group buttons
        els.agentGroupsContainer.querySelectorAll("[data-remove-group]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const g = +e.currentTarget.dataset.removeGroup;
            AppState.groups.splice(g, 1);
            renderAgentGroups();
            renderOutput();
          });
        });
      }

      /* ==========================================================================
           Output / Code Generation
           ========================================================================== */
      function generateRobotsTxt() {
        const lines = [];

        // Header comment
        lines.push(`# robots.txt generated by Robots.txt Generator`);
        lines.push(`# Generated: ${new Date().toUTCString()}`);
        lines.push("");

        // Global Host
        if (AppState.global.host.trim()) {
          lines.push(`Host: ${AppState.global.host.trim()}`);
          lines.push("");
        }

        // User-Agent groups
        AppState.groups.forEach((group) => {
          const ua = group.userAgent.trim() || "*";
          lines.push(`User-agent: ${ua}`);

          if (group.crawlDelay.trim()) {
            lines.push(`Crawl-delay: ${group.crawlDelay.trim()}`);
          }

          if (group.rules.length === 0) {
            lines.push(`Disallow:`);
          } else {
            group.rules.forEach((rule) => {
              const directive = rule.type === "allow" ? "Allow" : "Disallow";
              lines.push(`${directive}: ${rule.path}`);
            });
          }

          lines.push("");
        });

        // Sitemaps
        AppState.global.sitemaps.forEach((url) => {
          if (url.trim()) {
            lines.push(`Sitemap: ${url.trim()}`);
          }
        });

        return lines.join("\n").trimEnd();
      }

      function syntaxHighlight(text) {
        return text
          .split("\n")
          .map((line) => {
            if (line.startsWith("#")) {
              return `<span class="sh-comment">${escapeHtml(line)}</span>`;
            }
            const colonIdx = line.indexOf(":");
            if (colonIdx === -1) return escapeHtml(line);

            const directive = line.substring(0, colonIdx);
            const value = line.substring(colonIdx + 1);

            let directiveClass = "sh-directive";
            let valueClass = "sh-value";

            if (value.trim() === "*") valueClass = "sh-asterisk";

            return `<span class="${directiveClass}">${escapeHtml(directive)}</span>:<span class="${valueClass}">${escapeHtml(value)}</span>`;
          })
          .join("\n");
      }

      function renderOutput() {
        const raw = generateRobotsTxt();
        if (!raw.trim()) {
          els.codeOutput.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        <p style="font-family: var(--font-mono); font-size: 0.875rem;">Nothing to preview yet.</p>
                        <p style="font-size: 0.8125rem; margin-top: 0.25rem;">Add a rule or use a preset to get started.</p>
                    </div>`;
        } else {
          els.codeOutput.innerHTML = syntaxHighlight(raw);
        }
      }

      /* ==========================================================================
           Presets
           ========================================================================== */
      const PRESETS = {
        "allow-all": {
          global: { host: "", sitemaps: [] },
          groups: [{ id: generateId(), userAgent: "*", crawlDelay: "", rules: [{ id: generateId(), type: "allow", path: "/" }] }]
        },
        "disallow-all": {
          global: { host: "", sitemaps: [] },
          groups: [{ id: generateId(), userAgent: "*", crawlDelay: "", rules: [{ id: generateId(), type: "disallow", path: "/" }] }]
        },
        "seo-standard": {
          global: { host: "", sitemaps: ["https://example.com/sitemap.xml"] },
          groups: [
            {
              id: generateId(),
              userAgent: "*",
              crawlDelay: "",
              rules: [
                { id: generateId(), type: "allow", path: "/" },
                { id: generateId(), type: "disallow", path: "/admin/" },
                { id: generateId(), type: "disallow", path: "/private/" },
                { id: generateId(), type: "disallow", path: "/tmp/" }
              ]
            }
          ]
        },
        wordpress: {
          global: { host: "", sitemaps: ["https://example.com/sitemap_index.xml"] },
          groups: [
            {
              id: generateId(),
              userAgent: "*",
              crawlDelay: "",
              rules: [
                { id: generateId(), type: "allow", path: "/" },
                { id: generateId(), type: "disallow", path: "/wp-admin/" },
                { id: generateId(), type: "allow", path: "/wp-admin/admin-ajax.php" },
                { id: generateId(), type: "disallow", path: "/wp-includes/" },
                { id: generateId(), type: "disallow", path: "/wp-content/plugins/" },
                { id: generateId(), type: "disallow", path: "/wp-content/themes/" }
              ]
            }
          ]
        },
        "clear-all": {
          global: { host: "", sitemaps: [] },
          groups: [{ id: generateId(), userAgent: "*", crawlDelay: "", rules: [] }]
        }
      };

      function applyPreset(presetKey) {
        const preset = PRESETS[presetKey];
        if (!preset) return;

        AppState.global.host = preset.global.host;
        AppState.global.sitemaps = [...preset.global.sitemaps];
        AppState.groups = preset.groups.map((g) => ({
          ...g,
          id: generateId(),
          rules: g.rules.map((r) => ({ ...r, id: generateId() }))
        }));

        els.globalHost.value = AppState.global.host;
        renderSitemaps();
        renderAgentGroups();
        renderOutput();

        const labels = { "allow-all": "Allow All", "disallow-all": "Disallow All", "seo-standard": "Standard SEO", wordpress: "WordPress Base", "clear-all": "Cleared" };
        showToast(`Preset applied: ${labels[presetKey] || presetKey}`);
      }

      /* ==========================================================================
           Utility
           ========================================================================== */
      function escapeHtml(str) {
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      /* ==========================================================================
           Copy & Download
           ========================================================================== */
      function copyToClipboard() {
        const text = generateRobotsTxt();
        if (!text.trim()) {
          showToast("Nothing to copy yet.", "info");
          return;
        }
        navigator.clipboard
          .writeText(text)
          .then(() => {
            showToast("Copied to clipboard!");
          })
          .catch(() => {
            showToast("Copy failed. Please try manually.", "info");
          });
      }

      function downloadFile() {
        const text = generateRobotsTxt();
        if (!text.trim()) {
          showToast("Nothing to download yet.", "info");
          return;
        }
        const blob = new Blob([text], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "robots.txt";
        a.click();
        URL.revokeObjectURL(url);
        showToast("robots.txt downloaded!");
      }

      /* ==========================================================================
           Event Bindings
           ========================================================================== */
      function bindEvents() {
        // Global host input
        els.globalHost.addEventListener("input", (e) => {
          AppState.global.host = e.target.value;
          renderOutput();
        });

        // Add sitemap
        els.addSitemapBtn.addEventListener("click", () => {
          AppState.global.sitemaps.push("");
          renderSitemaps();
          renderOutput();
        });

        // Add agent group
        els.addAgentGroupBtn.addEventListener("click", () => {
          AppState.groups.push({
            id: generateId(),
            userAgent: "",
            crawlDelay: "",
            rules: [{ id: generateId(), type: "disallow", path: "" }]
          });
          renderAgentGroups();
          renderOutput();
        });

        // Preset badges
        els.presetBadges.forEach((badge) => {
          badge.addEventListener("click", (e) => {
            applyPreset(e.currentTarget.dataset.preset);
          });
        });

        // Copy & Download
        els.copyBtn.addEventListener("click", copyToClipboard);
        els.downloadBtn.addEventListener("click", downloadFile);
      }

      /* ==========================================================================
           App Bootstrap
           ========================================================================== */
      function init() {
        initTheme();
        bindEvents();
        renderSitemaps();
        renderAgentGroups();
        renderOutput();
      }

      init();
    </script>

    <footer style="max-width: 1200px; margin: 2rem auto 0; padding: 1rem 1.5rem; border-top: 1px solid var(--border-color); font-size: 0.8rem; color: var(--text-tertiary);">
      <p>Part of <a href="https://github.com/praveenscience/One-File-Tools" style="color: var(--accent-blue); text-decoration: none;">One File Tools</a></p>
    </footer>
  </body>
</html>
