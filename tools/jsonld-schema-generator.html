<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON-LD / Schema.org Generator — One File Tools</title>
    <style>
      /* ========================================
       Reset & Base
       ======================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 960px;
        margin: 0 auto;
        background: #fafafa;
        color: #1a1a1a;
      }

      /* ========================================
       Dark Mode
       ======================================== */
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #e5e5e5;
        }
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      header p {
        color: #666;
      }

      @media (prefers-color-scheme: dark) {
        header p {
          color: #aaa;
        }
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      .panel {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 1.5rem;
      }

      @media (prefers-color-scheme: dark) {
        .panel {
          background: #161616;
          border-color: #333;
        }
      }

      h2 {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        margin-top: 1rem;
        margin-bottom: 0.35rem;
        font-weight: 600;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #bbb;
        border-radius: 8px;
        font-size: 15px;
      }

      textarea {
        resize: vertical;
        font-family: Consolas, monospace;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: 2px solid #1d9bf0;
        outline-offset: 2px;
      }

      .buttons {
        display: flex;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      button {
        padding: 0.8rem 1.2rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #1d9bf0;
        color: white;
        font-size: 15px;
      }

      button:hover {
        opacity: 0.9;
      }

      #resetBtn {
        background: #666;
      }

      #output {
        height: 520px;
      }

      .field-group {
        margin-top: 1rem;
      }
      footer {
        margin-top: 2rem;
        text-align: center;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }

        #output {
          height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>JSON-LD / Schema.org Generator</h1>
      <p>Generate Schema.org JSON-LD structured data with live preview.</p>
    </header>

    <main>
      <div class="container">
        <!-- Left Panel -->
        <section class="panel">
          <h2>Schema Details</h2>

          <label for="schemaType">Schema Type</label>
          <select id="schemaType">
            <option value="Organization">Organization</option>
            <option value="Person">Person</option>
            <option value="Article">Article</option>
            <option value="Product">Product</option>
            <option value="Event">Event</option>
            <option value="FAQPage">FAQ Page</option>
            <option value="BreadcrumbList">Breadcrumb List</option>
          </select>

          <div id="dynamicFields"></div>
        </section>

        <!-- Right Panel -->
        <section class="panel">
          <h2>Live JSON-LD Preview</h2>

          <textarea id="output" rows="20" readonly spellcheck="false"></textarea>

          <div class="buttons">
            <button id="copyBtn">Copy JSON-LD</button>
            <button id="downloadBtn">Download JSON</button>
            <button id="resetBtn">Reset</button>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
    </footer>

    <script>
      const schemaType = document.getElementById("schemaType");
      const dynamicFields = document.getElementById("dynamicFields");

      const output = document.getElementById("output");

      const copyBtn = document.getElementById("copyBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const resetBtn = document.getElementById("resetBtn");
      const schemaFields = {
        Organization: [
          ["name", "Organization Name"],
          ["url", "Website URL"],
          ["logo", "Logo URL"],
          ["sameAs", "Social Links (comma separated)"]
        ],

        Person: [
          ["name", "Full Name"],
          ["jobTitle", "Job Title"],
          ["url", "Website"],
          ["image", "Image URL"]
        ],

        Article: [
          ["headline", "Headline"],
          ["author", "Author"],
          ["datePublished", "Publish Date"],
          ["image", "Image URL"]
        ],

        Product: [
          ["name", "Product Name"],
          ["description", "Description"],
          ["brand", "Brand"],
          ["price", "Price"],
          ["currency", "Currency"]
        ],

        Event: [
          ["name", "Event Name"],
          ["location", "Location"],
          ["startDate", "Start Date"],
          ["endDate", "End Date"]
        ],

        FAQPage: [
          ["question", "Question"],
          ["answer", "Answer"]
        ],

        BreadcrumbList: [
          ["home", "Home Page"],
          ["current", "Current Page"]
        ]
      };
      function renderFields() {
        dynamicFields.innerHTML = "";

        const fields = schemaFields[schemaType.value];

        fields.forEach(([id, label]) => {
          const wrapper = document.createElement("div");
          wrapper.className = "field-group";
          let type = "text";

          if (id === "url" || id === "logo" || id === "image") {
            type = "url";
          }

          if (id === "startDate" || id === "endDate" || id === "datePublished") {
            type = "date";
          }

          if (id === "price") {
            type = "number";
          }
          wrapper.innerHTML = `
      <label for="${id}">${label}</label>
      
      <input
        type="${type}"
        id="${id}"
        placeholder="Enter ${label.toLowerCase()}"
      >
    `;

          dynamicFields.appendChild(wrapper);
          wrapper.querySelector("input").addEventListener("input", generateJSONLD);
        });
      }
      schemaType.addEventListener("change", () => {
        renderFields();
        generateJSONLD();
      });

      function generateJSONLD() {
        let data = {
          "@context": "https://schema.org",
          "@type": schemaType.value
        };

        const inputs = dynamicFields.querySelectorAll("input");

        inputs.forEach((input) => {
          if (!input.value.trim()) return;

          if (input.id === "sameAs") {
            data.sameAs = input.value
              .split(",")
              .map((item) => item.trim())
              .filter(Boolean);
          } else {
            data[input.id] = input.value.trim();
          }
        });

        switch (schemaType.value) {
          case "Organization":
            data = {
              "@context": "https://schema.org",
              "@type": "Organization",
              name: data.name || "",
              url: data.url || "",
              logo: data.logo
                ? {
                    "@type": "ImageObject",
                    url: data.logo
                  }
                : undefined,
              sameAs: data.sameAs || []
            };
            break;

          case "Person":
            data = {
              "@context": "https://schema.org",
              "@type": "Person",
              name: data.name || "",
              jobTitle: data.jobTitle || "",
              url: data.url || "",
              image: data.image || ""
            };
            break;

          case "Article":
            data = {
              "@context": "https://schema.org",
              "@type": "Article",
              headline: data.headline || "",
              author: {
                "@type": "Person",
                name: data.author || ""
              },
              datePublished: data.datePublished || "",
              image: data.image || ""
            };
            break;

          case "Product":
            data = {
              "@context": "https://schema.org",
              "@type": "Product",
              name: data.name || "",
              description: data.description || "",
              brand: {
                "@type": "Brand",
                name: data.brand || ""
              },
              offers: {
                "@type": "Offer",
                price: data.price || "",
                priceCurrency: data.currency || "USD"
              }
            };
            break;

          case "Event":
            data = {
              "@context": "https://schema.org",
              "@type": "Event",
              name: data.name || "",
              location: {
                "@type": "Place",
                name: data.location || ""
              },
              startDate: data.startDate || "",
              endDate: data.endDate || ""
            };
            break;

          case "FAQPage":
            data = {
              "@context": "https://schema.org",
              "@type": "FAQPage",
              mainEntity: [
                {
                  "@type": "Question",
                  name: document.getElementById("question")?.value || "",
                  acceptedAnswer: {
                    "@type": "Answer",
                    text: document.getElementById("answer")?.value || ""
                  }
                }
              ]
            };
            break;

          case "BreadcrumbList":
            data = {
              "@context": "https://schema.org",
              "@type": "BreadcrumbList",
              itemListElement: [
                {
                  "@type": "ListItem",
                  position: 1,
                  name: document.getElementById("home")?.value || "Home"
                },
                {
                  "@type": "ListItem",
                  position: 2,
                  name: document.getElementById("current")?.value || "Current Page"
                }
              ]
            };
            break;
        }

        output.value = JSON.stringify(data, null, 2);
      }
      renderFields();
      generateJSONLD();
      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(output.value);

          const original = copyBtn.textContent;

          copyBtn.textContent = "Copied!";
          copyBtn.style.background = "#16a34a";

          setTimeout(() => {
            copyBtn.textContent = original;
            copyBtn.style.background = "#1d9bf0";
          }, 2000);
        } catch {
          alert("Failed to copy JSON.");
        }
      });
      downloadBtn.addEventListener("click", () => {
        const blob = new Blob([output.value], { type: "application/ld+json" });

        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);

        link.download = "schema.json";

        link.click();

        URL.revokeObjectURL(link.href);
      });
      resetBtn.addEventListener("click", () => {
        schemaType.value = "Organization";

        renderFields();

        dynamicFields.querySelectorAll("input").forEach((input) => {
          input.value = "";
        });

        generateJSONLD();
      });
    </script>
  </body>
</html>
