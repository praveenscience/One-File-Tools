<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Playground — One File Tools</title>
    <style>
      /* ========================================
         Reset & Base
         ======================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
        background: #fafafa;
        color: #1a1a1a;
      }

      header p {
        margin-top: 0.25rem;
        color: #555;
      }

      /* ========================================
         Dark Mode
         ======================================== */
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #e5e5e5;
        }
        header p {
          color: #999;
        }
        .controls {
          border-right-color: #333;
        }
        .preview {
          border-color: #444;
        }
        pre {
          background: #1a1a1a;
          color: #a5d6ff;
        }
        select,
        input[type="number"],
        input[type="range"] {
          background: #1a1a1a;
          color: #e5e5e5;
          border-color: #444;
        }
        .toast {
          background: #2a2a2a;
          color: #e5e5e5;
        }
      }

      /* ========================================
         Layout
         ======================================== */
      .main-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 2rem;
        margin-top: 2rem;
      }

      @media (max-width: 700px) {
        .main-layout {
          grid-template-columns: 1fr;
        }
        .controls {
          border-right: none !important;
          padding-right: 0 !important;
          border-bottom: 1px solid #ccc;
          padding-bottom: 1rem;
        }
      }

      /* ========================================
         Controls
         ======================================== */
      .controls {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        border-right: 1px solid #ccc;
        padding-right: 1.5rem;
      }

      .controls label {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        font-size: 0.85rem;
        font-weight: 600;
      }

      select,
      input[type="number"] {
        padding: 0.4rem;
        border-radius: 4px;
        border: 1px solid #ccc;
        font-size: 0.9rem;
      }

      input[type="range"] {
        width: 100%;
      }

      .gap-value {
        font-weight: normal;
        font-size: 0.8rem;
        color: #666;
      }

      /* ========================================
         Preview
         ======================================== */
      .preview {
        border: 2px dashed #ccc;
        border-radius: 6px;
        padding: 1rem;
        min-height: 400px;
        display: flex;
        align-items: flex-start;
        position: relative;
      }

      .item {
        background: #3498db;
        color: white;
        padding: 1rem 1.25rem;
        border-radius: 4px;
        font-weight: 600;
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .item:nth-child(2n) {
        background: #2ecc71;
      }

      .item:nth-child(3n) {
        background: #e67e22;
      }

      .item:nth-child(4n + 1) {
        padding: 1.5rem 1.25rem;
      }

      /* ========================================
         Code Output
         ======================================== */
      .code-container {
        margin-top: 1.5rem;
      }

      pre {
        background: #eee;
        padding: 1rem;
        border-radius: 4px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.85rem;
        line-height: 1.5;
        overflow-x: auto;
      }

      .btn {
        cursor: pointer;
        background: #3498db;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }

      .btn:hover {
        background: #2980b9;
      }

      /* ========================================
         Toast
         ======================================== */
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #1a1a1a;
        color: white;
        padding: 0.6rem 1.2rem;
        border-radius: 6px;
        font-size: 0.85rem;
        opacity: 0;
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
        pointer-events: none;
        z-index: 10;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* ========================================
         Footer
         ======================================== */
      footer {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid #ddd;
        font-size: 0.85rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Flexbox Playground</h1>
      <p>Experiment with Flexbox properties visually and copy the generated CSS.</p>
    </header>

    <main class="main-layout">
      <section class="controls">
        <label>
          Items
          <input type="number" id="numItems" value="4" min="1" max="20" />
        </label>

        <label>
          flex-direction
          <select id="dir">
            <option value="row">row</option>
            <option value="row-reverse">row-reverse</option>
            <option value="column">column</option>
            <option value="column-reverse">column-reverse</option>
          </select>
        </label>

        <label>
          justify-content
          <select id="justify">
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
            <option value="space-evenly">space-evenly</option>
          </select>
        </label>

        <label>
          align-items
          <select id="align">
            <option value="stretch">stretch</option>
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="baseline">baseline</option>
          </select>
        </label>

        <label>
          align-content
          <select id="alignContent">
            <option value="stretch">stretch</option>
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
          </select>
        </label>

        <label>
          flex-wrap
          <select id="wrap">
            <option value="nowrap">nowrap</option>
            <option value="wrap">wrap</option>
            <option value="wrap-reverse">wrap-reverse</option>
          </select>
        </label>

        <label>
          gap <span class="gap-value" id="gapValue">0px</span>
          <input type="range" id="gap" min="0" max="50" value="0" />
        </label>

        <div class="code-container">
          <pre id="cssCode"></pre>
          <button class="btn" id="copyBtn">Copy CSS</button>
        </div>
      </section>

      <div id="preview" class="preview"></div>
    </main>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <footer>
      <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
    </footer>

    <script>
      const els = {
        numItems: document.getElementById("numItems"),
        dir: document.getElementById("dir"),
        justify: document.getElementById("justify"),
        align: document.getElementById("align"),
        alignContent: document.getElementById("alignContent"),
        wrap: document.getElementById("wrap"),
        gap: document.getElementById("gap"),
        gapValue: document.getElementById("gapValue"),
        preview: document.getElementById("preview"),
        cssCode: document.getElementById("cssCode"),
        copyBtn: document.getElementById("copyBtn"),
        toast: document.getElementById("toast")
      };

      function update() {
        const count = Math.min(Math.max(parseInt(els.numItems.value) || 1, 1), 20);
        const dir = els.dir.value;
        const justify = els.justify.value;
        const alignItems = els.align.value;
        const alignContent = els.alignContent.value;
        const wrap = els.wrap.value;
        const gap = els.gap.value + "px";

        els.gapValue.textContent = gap;

        els.preview.replaceChildren();
        for (let i = 0; i < count; i++) {
          const div = document.createElement("div");
          div.className = "item";
          div.textContent = `Item ${i + 1}`;
          els.preview.appendChild(div);
        }

        Object.assign(els.preview.style, {
          flexDirection: dir,
          justifyContent: justify,
          alignItems: alignItems,
          alignContent: alignContent,
          flexWrap: wrap,
          gap: gap
        });

        const lines = ["display: flex;", `flex-direction: ${dir};`, `justify-content: ${justify};`, `align-items: ${alignItems};`, `align-content: ${alignContent};`, `flex-wrap: ${wrap};`, `gap: ${gap};`];
        els.cssCode.textContent = lines.join("\n");
      }

      function showToast() {
        els.toast.classList.add("show");
        setTimeout(() => els.toast.classList.remove("show"), 1500);
      }

      els.copyBtn.addEventListener("click", () => {
        const css = els.cssCode.textContent;
        navigator.clipboard.writeText(css).then(showToast);
      });

      document.querySelectorAll(".controls select, .controls input").forEach((el) => {
        el.addEventListener("input", update);
        el.addEventListener("change", update);
      });

      update();
    </script>
  </body>
</html>
