<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Playground — One File Tools</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
        background: #fafafa;
        color: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #e5e5e5;
        }
      }

      .main-layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 2rem;
        margin-top: 2rem;
      }
      .controls {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        border-right: 1px solid #ccc;
        padding-right: 1rem;
      }
      .preview {
        border: 2px dashed #ccc;
        padding: 1rem;
        min-height: 400px;
        display: flex;
        align-items: flex-start;
      }
      .item {
        background: #3498db;
        color: white;
        padding: 1rem;
        margin: 0.25rem;
        border-radius: 4px;
      }
      /* Added margin-bottom here to create the requested gap */
      .code-container {
        margin-top: 1rem;
        margin-bottom: 2rem;
      }
      pre {
        background: #eee;
        padding: 1rem;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.9rem;
      }
      @media (prefers-color-scheme: dark) {
        pre {
          background: #1a1a1a;
          color: #00ff00;
        }
      }
      select,
      input,
      button {
        padding: 0.4rem;
        border-radius: 4px;
        border: 1px solid #ccc;
      }
      button {
        cursor: pointer;
        background: #3498db;
        color: white;
        border: none;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Flexbox Playground</h1>
      <p>Configure your flex container and generate CSS.</p>
    </header>

    <main class="main-layout">
      <section class="controls">
        <label>Items: <input type="number" id="numItems" value="3" min="1" oninput="update()" /></label>
        <label
          >Direction:
          <select id="dir" onchange="update()">
            <option>row</option>
            <option>row-reverse</option>
            <option>column</option>
            <option>column-reverse</option>
          </select>
        </label>
        <label
          >Justify Content:
          <select id="justify" onchange="update()">
            <option>flex-start</option>
            <option>flex-end</option>
            <option>center</option>
            <option>space-between</option>
            <option>space-around</option>
          </select>
        </label>
        <label
          >Align Items:
          <select id="align" onchange="update()">
            <option>stretch</option>
            <option>flex-start</option>
            <option>flex-end</option>
            <option>center</option>
            <option>baseline</option>
          </select>
        </label>
        <label
          >Flex Wrap:
          <select id="wrap" onchange="update()">
            <option>nowrap</option>
            <option>wrap</option>
            <option>wrap-reverse</option>
          </select>
        </label>
        <label>Gap (px): <input type="range" id="gap" min="0" max="50" oninput="update()" /></label>

        <div class="code-container">
          <pre id="cssCode"></pre>
          <button onclick="copyCSS()">Copy CSS</button>
        </div>
      </section>

      <div id="preview" class="preview"></div>
    </main>

    <footer>
      <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
    </footer>

    <script>
      function update() {
        const preview = document.getElementById("preview");
        const count = document.getElementById("numItems").value;
        preview.innerHTML = "";
        for (let i = 0; i < count; i++) {
          const div = document.createElement("div");
          div.className = "item";
          div.innerText = `Item ${i + 1}`;
          preview.appendChild(div);
        }
        preview.style.flexDirection = document.getElementById("dir").value;
        preview.style.justifyContent = document.getElementById("justify").value;
        preview.style.alignItems = document.getElementById("align").value;
        preview.style.flexWrap = document.getElementById("wrap").value;
        preview.style.gap = document.getElementById("gap").value + "px";

        document.getElementById("cssCode").innerText = `display: flex;\nflex-direction: ${preview.style.flexDirection};\njustify-content: ${preview.style.justifyContent};\nalign-items: ${preview.style.alignItems};\nflex-wrap: ${preview.style.flexWrap};\ngap: ${preview.style.gap};`;
      }

      function copyCSS() {
        const css = document.getElementById("cssCode").innerText;
        navigator.clipboard.writeText(css).then(() => {
          alert("CSS copied to clipboard!");
        });
      }
      update();
    </script>
  </body>
</html>
