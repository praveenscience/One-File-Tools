<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neumorphism Generator — One File Tools</title>
    <style>
      :root { --bg: #e0e0e0; --text: #333; }
      @media (prefers-color-scheme: dark) { :root { --bg: #222; --text: #eee; } }
      
      body { font-family: system-ui, sans-serif; padding: 2rem; background: var(--bg); color: var(--text); }
      .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 2rem; }
      .controls { display: flex; flex-direction: column; gap: 1rem; background: rgba(0,0,0,0.05); padding: 1.5rem; border-radius: 12px; }
      
      .preview-area { display: flex; align-items: center; justify-content: center; min-height: 400px; background: var(--bg); border-radius: 20px; }
      #target { width: 200px; height: 200px; background: var(--bg); transition: all 0.2s; }
      
      .code-container { margin-top: 1rem; }
      pre { background: rgba(0,0,0,0.1); padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.9rem; }
      button { padding: 0.8rem; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; width: 100%; font-weight: bold; }
      label { display: flex; flex-direction: column; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1>Neumorphism Generator</h1>
    <main class="main-layout">
      <section class="controls">
        <label>Distance: <input type="range" id="dist" min="0" max="50" value="20" oninput="update()"></label>
        <label>Blur: <input type="range" id="blur" min="0" max="100" value="60" oninput="update()"></label>
        <label>Radius: <input type="range" id="radius" min="0" max="100" value="20" oninput="update()"></label>
        <label>Style: 
          <select id="type" onchange="update()">
            <option value="convex">Convex</option>
            <option value="concave">Concave</option>
          </select>
        </label>
        <div class="code-container">
          <pre id="cssCode"></pre>
          <button onclick="copyCSS()">Copy CSS</button>
        </div>
      </section>
      <section class="preview-area">
        <div id="target"></div>
      </section>
    </main>

    <script>
      function update() {
        const d = document.getElementById('dist').value;
        const b = document.getElementById('blur').value;
        const r = document.getElementById('radius').value;
        const type = document.getElementById('type').value;
        const target = document.getElementById('target');
        
        // Logic for shadow direction
        const shadow = type === 'convex' 
          ? `${d}px ${d}px ${b}px #bebebe, -${d}px -${d}px ${b}px #ffffff`
          : `inset ${d}px ${d}px ${b}px #bebebe, inset -${d}px -${d}px ${b}px #ffffff`;
        
        target.style.boxShadow = shadow;
        target.style.borderRadius = `${r}px`;
        document.getElementById('cssCode').innerText = `box-shadow: ${shadow};\nborder-radius: ${r}px;`;
      }
      
      function copyCSS() {
        navigator.clipboard.writeText(document.getElementById('cssCode').innerText);
        alert("CSS copied to clipboard!");
      }
      update();
    </script>
  </body>
</html>
