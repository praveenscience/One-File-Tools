<!DOCTYPE html>
<!-- aspect-ratio-calculator.html | Part of One File Tools | https://github.com/one-file-tools/one-file-tools -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aspect Ratio Calculator - One File Tools</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      /* Light mode (default) */
      :root {
        --bg: #f4f6fa;
        --grid-line: #dde3ee;
        --panel: #ffffff;
        --panel-border: #d0d8ea;
        --accent: #e85d2f;
        --cyan: #0d9488;
        --text: #111827;
        --text-muted: #4b5e7e;
        --text-dim: #8fa3c2;
        --radius-sm: 8px;
        --radius-md: 14px;
      }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1a2b;
          --grid-line: #16263d;
          --panel: #142440;
          --panel-border: #23385c;
          --accent: #ff6b35;
          --cyan: #5eead4;
          --text: #e9eff7;
          --text-muted: #8aa0c2;
          --text-dim: #4f6388;
        }
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 28px 28px;
        color: var(--text);
        padding: 48px 20px 64px;
        min-height: 100vh;
      }

      .app {
        max-width: 680px;
        margin: 0 auto;
      }

      /* ── Hero ── */
      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .wordmark {
        font-family:
          "Space Grotesk",
          -apple-system,
          sans-serif;
        font-weight: 700;
        font-size: clamp(40px, 7vw, 58px);
        line-height: 1;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        margin-top: 10px;
      }

      /* ── Studio card ── */
      .studio {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -14px rgba(0, 0, 0, 0.15);
      }

      /* ── Input row ── */
      .inputs {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .input-group {
        flex: 1;
        min-width: 140px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .input-group label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .input-group input {
        background: var(--bg);
        border: 1px solid var(--panel-border);
        color: var(--text);
        padding: 14px;
        border-radius: var(--radius-sm);
        font-size: 15px;
        outline: none;
        width: 100%;
      }

      .input-group input:focus {
        border-color: var(--cyan);
      }

      /* ── Output ── */
      .output-area {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .output-area label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .output-area textarea {
        width: 100%;
        min-height: 170px;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 20px;
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 16px;
        color: var(--cyan);
        line-height: 1.7;
        resize: none;
      }

      /* ── Controls ── */
      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      .preset-selector {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .preset-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--text-dim);
        text-transform: uppercase;
      }

      .preset-toggle {
        display: inline-flex;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: 999px;
        padding: 3px;
      }

      .preset-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        padding: 7px 16px;
        border-radius: 999px;
        cursor: pointer;
      }

      .preset-btn:hover {
        color: var(--text);
      }

      /* ── Actions ── */
      .actions {
        display: flex;
        gap: 12px;
      }

      .btn {
        border: none;
        border-radius: var(--radius-sm);
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-secondary {
        background: var(--bg);
        border: 1px solid var(--panel-border);
        color: var(--text);
      }

      /* ── Focus indicators (WCAG AA) ── */
      input:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--cyan);
        outline-offset: 2px;
      }

      /* ── Error state ── */
      .error-msg {
        font-size: 13px;
        color: var(--accent);
        min-height: 18px;
        margin-bottom: 6px;
        font-family: "JetBrains Mono", monospace;
      }

      /* ── Footer ── */
      footer {
        text-align: center;
        margin-top: 32px;
        font-size: 13px;
        color: var(--text-dim);
      }

      footer a {
        color: var(--cyan);
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      /* ── Responsive ── */
      @media (max-width: 600px) {
        .controls {
          flex-direction: column;
        }

        .actions {
          width: 100%;
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }

        .preset-selector {
          flex-wrap: wrap;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Developer Utility</div>
        <h1 class="wordmark">Aspect Ratio</h1>
        <p class="tagline">Calculate and simplify aspect ratios instantly.</p>
      </header>

      <main class="studio">
        <div class="inputs">
          <div class="input-group">
            <label for="width">Width (px)</label>
            <input type="number" id="width" name="width" placeholder="e.g. 1920" min="1" step="1" />
          </div>
          <div class="input-group">
            <label for="height">Height (px)</label>
            <input type="number" id="height" name="height" placeholder="e.g. 1080" min="1" step="1" />
          </div>
        </div>

        <p class="error-msg" id="errorMsg" role="alert" aria-live="polite"></p>

        <div class="output-area">
          <label for="output">Result</label>
          <textarea id="output" readonly aria-label="Calculated aspect ratio result"></textarea>
        </div>

        <div class="controls">
          <div class="preset-selector">
            <span class="preset-label" id="presetsLabel">Presets</span>
            <div class="preset-toggle" role="group" aria-labelledby="presetsLabel">
              <button class="preset-btn" data-w="1920" data-h="1080" aria-label="16:9 preset (1920×1080)">16:9</button>
              <button class="preset-btn" data-w="1024" data-h="768" aria-label="4:3 preset (1024×768)">4:3</button>
              <button class="preset-btn" data-w="1000" data-h="1000" aria-label="1:1 preset (1000×1000)">1:1</button>
              <button class="preset-btn" data-w="2560" data-h="1080" aria-label="21:9 preset (2560×1080)">21:9</button>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-secondary" id="copyBtn" aria-label="Copy result to clipboard">Copy</button>
          </div>
        </div>
      </main>

      <footer>
        <p>Part of <a href="https://github.com/praveenscience/One-File-Tools" target="_blank" rel="noopener">One File Tools</a></p>
      </footer>
    </div>

    <script>
      const widthInput = document.getElementById("width");
      const heightInput = document.getElementById("height");
      const output = document.getElementById("output");
      const copyBtn = document.getElementById("copyBtn");
      const errorMsg = document.getElementById("errorMsg");
      const presetBtns = document.querySelectorAll(".preset-btn");

      // Iterative GCD — avoids stack overflow and handles negative inputs safely
      function gcd(a, b) {
        a = Math.abs(a);
        b = Math.abs(b);
        while (b !== 0) {
          [a, b] = [b, a % b];
        }
        return a;
      }

      function validate(width, height) {
        if (!widthInput.value || !heightInput.value) return "Enter both width and height.";
        if (!Number.isInteger(width) || !Number.isInteger(height)) return "Width and height must be whole numbers.";
        if (width <= 0 || height <= 0) return "Width and height must be positive numbers.";
        return null;
      }

      function calculateRatio() {
        const width = Number(widthInput.value);
        const height = Number(heightInput.value);

        const error = validate(width, height);

        if (error) {
          errorMsg.textContent = error;
          output.value = "";
          return;
        }

        errorMsg.textContent = "";

        const divisor = gcd(width, height);
        const ratioW = width / divisor;
        const ratioH = height / divisor;
        const decimal = (width / height).toFixed(4);
        const pct = ((height / width) * 100).toFixed(4);

        output.value = `Width:          ${width}px
Height:         ${height}px
 
Aspect Ratio:   ${ratioW}:${ratioH}
Decimal Ratio:  ${decimal}:1
Padding-bottom: ${pct}%`;
      }

      // Real-time calculation on input
      widthInput.addEventListener("input", calculateRatio);
      heightInput.addEventListener("input", calculateRatio);

      // Preset buttons
      presetBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          widthInput.value = btn.dataset.w;
          heightInput.value = btn.dataset.h;
          calculateRatio();
          widthInput.focus();
        });
      });

      // Copy with race-condition-safe timeout
      let copyTimeout;
      copyBtn.addEventListener("click", async () => {
        if (!output.value) return;
        try {
          await navigator.clipboard.writeText(output.value);
          copyBtn.textContent = "Copied!";
        } catch {
          copyBtn.textContent = "Error";
        }
        clearTimeout(copyTimeout);
        copyTimeout = setTimeout(() => {
          copyBtn.textContent = "Copy";
        }, 2000);
      });

      // Init with a sensible default
      widthInput.value = 1920;
      heightInput.value = 1080;
      calculateRatio();
    </script>
  </body>
</html>
