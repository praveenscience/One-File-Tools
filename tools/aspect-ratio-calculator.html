<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspect Ratio Calculator - One File Tools</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0e1a2b;
  --grid-line: #16263d;
  --panel: #142440;
  --panel-border: #23385c;
  --accent: #ff6b35;
  --cyan: #5eead4;
  --text: #e9eff7;
  --text-muted: #8aa0c2;
  --text-dim: #4f6388;
  --radius-sm: 8px;
  --radius-md: 14px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Inter", sans-serif;
  background-color: var(--bg);
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 28px 28px;
  color: var(--text);
  padding: 48px 20px 64px;
  min-height: 100vh;
}

.app {
  max-width: 680px;
  margin: 0 auto;
}

.hero {
  text-align: center;
  margin-bottom: 40px;
}

.eyebrow {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.wordmark {
  font-family: "Space Grotesk", sans-serif;
  font-weight: 700;
  font-size: clamp(40px, 7vw, 58px);
  line-height: 1;
}

.tagline {
  color: var(--text-muted);
  font-size: 15px;
  margin-top: 10px;
}

.studio {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-md);
  padding: 32px;
  box-shadow: 0 24px 48px -14px rgba(0,0,0,0.5);
}

.inputs {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.inputs input {
  flex: 1;
  min-width: 140px;
  background: var(--bg);
  border: 1px solid var(--panel-border);
  color: var(--text);
  padding: 14px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  outline: none;
}

.inputs input:focus {
  border-color: var(--cyan);
}

.output-area textarea {
  width: 100%;
  min-height: 170px;
  background: var(--bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 20px;
  font-family: "JetBrains Mono", monospace;
  font-size: 16px;
  color: var(--cyan);
  line-height: 1.7;
  resize: none;
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-top: 24px;
  flex-wrap: wrap;
}

.count-selector {
  display: flex;
  align-items: center;
  gap: 12px;
}

.count-label {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.unit-toggle {
  display: inline-flex;

  border: 1px solid var(--panel-border);
  border-radius: 999px;
  padding: 3px;

.unit-btn {

.btn-secondary {

@media (max-width: 600px) {
  .controls {
    flex-direction: column;
  }

  .actions {
    width: 100%;
    flex-direction: column;
  }

  .btn {
    width: 100%;
  }

</style>
</head>

<body>

<div class="app">

  <header class="hero">
    <div class="eyebrow">Developer Utility</div>
    <h1 class="wordmark">Aspect Ratio</h1>
    <p class="tagline">
      Calculate and simplify aspect ratios instantly.
    </p>
  </header>

  <main class="studio">

    <div class="inputs">
      <input type="number" id="width" placeholder="Width">
      <input type="number" id="height" placeholder="Height">
    </div>

    <div class="output-area">
      <textarea id="output" readonly></textarea>
    </div>

    <div class="controls">

      <div class="count-selector">
        <span class="count-label">Presets</span>

        <div class="unit-toggle">
          <button class="unit-btn preset" data-w="1920" data-h="1080">16:9</button>
          <button class="unit-btn preset" data-w="1024" data-h="768">4:3</button>
          <button class="unit-btn preset" data-w="1000" data-h="1000">1:1</button>
          <button class="unit-btn preset" data-w="2560" data-h="1080">21:9</button>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" id="copyBtn">
          Copy
        </button>

        <button class="btn btn-primary" id="calcBtn">
          Calculate
        </button>
      </div>

    </div>

  </main>

</div>

<script>
const widthInput = document.getElementById("width");
const heightInput = document.getElementById("height");
const output = document.getElementById("output");
const calcBtn = document.getElementById("calcBtn");
const copyBtn = document.getElementById("copyBtn");
const presets = document.querySelectorAll(".preset");

function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

function calculateRatio() {
  const width = Number(widthInput.value);
  const height = Number(heightInput.value);

  if (!width || !height) {
    output.value = "Enter width and height";
    return;
  }

  const divisor = gcd(width, height);

  const ratioW = width / divisor;
  const ratioH = height / divisor;

  const decimal = (width / height).toFixed(2);

  output.value =
`Width: ${width}
Height: ${height}

Aspect Ratio: ${ratioW}:${ratioH}

Decimal Ratio: ${decimal}:1`;
}

calcBtn.addEventListener("click", calculateRatio);

presets.forEach(btn => {
  btn.addEventListener("click", () => {
    widthInput.value = btn.dataset.w;
    heightInput.value = btn.dataset.h;
    calculateRatio();
  });
});

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(output.value);
    copyBtn.textContent = "Copied!";
  } catch {
    copyBtn.textContent = "Error";
  }

  setTimeout(() => {
    copyBtn.textContent = "Copy";
  }, 2000);
});

widthInput.value = 1920;
heightInput.value = 1080;
calculateRatio();
</script>

</body>
</html>
