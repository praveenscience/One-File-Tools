<!--
QR Code Generator
Single-file offline QR code generator.
Built for One File Tools.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --accent-glow: rgba(59, 130, 246, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 24px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.05), transparent 25%),
          radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.05), transparent 25%),
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .app {
        width: 100%;
        max-width: 900px;
        margin-top: 20px;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(28px, 5vw, 40px);
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
      }

      .grid-layout {
        display: grid;
        grid-template-columns: 1fr 350px;
        gap: 32px;
      }

      @media (max-width: 800px) {
        .grid-layout {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--panel);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .panel-title {
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-title i {
        color: var(--accent);
      }

      /* Controls */
      .control-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .control-label {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: flex;
        justify-content: space-between;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 15px;
        line-height: 1.5;
        resize: vertical;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .color-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .color-picker-wrapper {
        display: flex;
        align-items: center;
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 8px 16px 8px 8px;
        gap: 12px;
      }

      input[type="color"] {
        -webkit-appearance: none;
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        padding: 0;
        background: transparent;
      }

      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      input[type="color"]::-webkit-color-swatch {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
      }

      .color-value {
        font-family: var(--font-mono);
        font-size: 14px;
        color: var(--text);
        flex: 1;
      }

      /* Custom Range Slider */
      input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
        height: 32px;
        margin: 0;
      }

      input[type=range]:focus {
        outline: none;
      }

      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: var(--panel-border);
        border-radius: 99px;
      }

      input[type=range]::-webkit-slider-thumb {
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        -webkit-appearance: none;
        margin-top: -7px;
        box-shadow: 0 0 10px var(--accent-glow);
        transition: transform 0.1s;
      }

      input[type=range]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
      }

      /* QR Display Panel */
      .qr-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .qr-container {
        background: #ffffff;
        padding: 24px;
        border-radius: var(--radius-sm);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .qr-container:hover {
        transform: scale(1.02);
      }

      canvas {
        max-width: 100%;
        height: auto;
      }

      .btn {
        width: 100%;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: var(--radius-sm);
        padding: 16px;
        font-family: var(--font-sans);
        font-size: 15px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.2s;
        box-shadow: 0 4px 14px var(--accent-glow);
      }

      .btn:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px var(--accent-glow);
      }

      .btn:active {
        transform: translateY(0);
      }

    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Developer Utilities</div>
        <h1 class="wordmark">QR Code Generator</h1>
        <p class="tagline">Instantly generate customizable, high-quality QR codes offline.</p>
      </header>

      <div class="grid-layout">
        <main class="panel">
          <h2 class="panel-title"><i data-feather="edit-3"></i> Content & Data</h2>
          
          <div class="control-group">
            <div class="control-label">
              <span>Text or URL</span>
              <span id="charCount">21 chars</span>
            </div>
            <textarea id="qrData" placeholder="Enter text or a URL...">https://one-file-tools.pages.dev</textarea>
          </div>

          <h2 class="panel-title" style="margin-top: 8px;"><i data-feather="sliders"></i> Appearance</h2>

          <div class="color-grid">
            <div class="control-group">
              <span class="control-label">Foreground</span>
              <div class="color-picker-wrapper">
                <input type="color" id="qrForeground" value="#000000" />
                <span class="color-value" id="qrForegroundVal">#000000</span>
              </div>
            </div>
            <div class="control-group">
              <span class="control-label">Background</span>
              <div class="color-picker-wrapper">
                <input type="color" id="qrBackground" value="#ffffff" />
                <span class="color-value" id="qrBackgroundVal">#ffffff</span>
              </div>
            </div>
          </div>

          <div class="control-group" style="margin-top: 8px;">
            <div class="control-label">
              <span>Size (px)</span>
              <span id="sizeValue">300px</span>
            </div>
            <input type="range" id="qrSize" min="100" max="1000" step="10" value="300" />
          </div>
        </main>

        <aside class="panel qr-panel">
          <div class="qr-container" id="qrContainer">
            <canvas id="qrCanvas"></canvas>
          </div>
          <button class="btn" id="btnDownload">
            <i data-feather="download" width="18" height="18"></i>
            Download PNG
          </button>
        </aside>
      </div>
    </div>

    <script>
      // Initialize Icons
      feather.replace();

      // DOM Elements
      const qrData = document.getElementById("qrData");
      const qrForeground = document.getElementById("qrForeground");
      const qrBackground = document.getElementById("qrBackground");
      const qrForegroundVal = document.getElementById("qrForegroundVal");
      const qrBackgroundVal = document.getElementById("qrBackgroundVal");
      const qrSize = document.getElementById("qrSize");
      const sizeValue = document.getElementById("sizeValue");
      const charCount = document.getElementById("charCount");
      const qrContainer = document.getElementById("qrContainer");
      const btnDownload = document.getElementById("btnDownload");
      const canvas = document.getElementById("qrCanvas");

      // Initialize QRious
      const qr = new QRious({
        element: canvas,
        value: qrData.value,
        size: 300,
        background: '#ffffff',
        foreground: '#000000',
        level: 'H' // High error correction
      });

      // Update Function
      function updateQR() {
        const text = qrData.value || " "; // QRious needs at least some value to not throw
        
        qr.set({
          value: text,
          size: parseInt(qrSize.value),
          foreground: qrForeground.value,
          background: qrBackground.value
        });

        // Update UI labels
        qrForegroundVal.textContent = qrForeground.value.toUpperCase();
        qrBackgroundVal.textContent = qrBackground.value.toUpperCase();
        sizeValue.textContent = qrSize.value + "px";
        charCount.textContent = qrData.value.length + " chars";
        
        // Sync container background to match QR background
        qrContainer.style.backgroundColor = qrBackground.value;
      }

      // Event Listeners
      qrData.addEventListener("input", updateQR);
      qrForeground.addEventListener("input", updateQR);
      qrBackground.addEventListener("input", updateQR);
      qrSize.addEventListener("input", updateQR);

      // Download functionality
      btnDownload.addEventListener("click", () => {
        const dataUrl = canvas.toDataURL("image/png");
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = "qrcode.png";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });

      // Initial render
      updateQR();
    </script>
  </body>
