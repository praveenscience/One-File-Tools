<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Shadow Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0e1a;
        --surface: #111827;
        --surface2: #161d2e;
        --surface3: #1e2a3e;
        --border: #1f2d45;
        --border2: #263650;
        --text: #e8edf5;
        --text-muted: #5a7399;
        --text-dim: #3a5278;
        --violet: #7c5cfc;
        --violet-dim: #3d2d8a;
        --violet-glow: #7c5cfc30;
        --cyan: #00d4c8;
        --cyan-dim: #004d48;
        --cyan-glow: #00d4c820;
        --pink: #f059da;
        --pink-dim: #5a1f50;
        --green: #39e58c;
        --amber: #f5a623;
        --radius: 6px;
        --radius-lg: 10px;
        --mono: "JetBrains Mono", monospace;
        --sans: "Inter", sans-serif;
      }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 36px 20px 60px;
        line-height: 1.5;
      }

      .app {
        max-width: 980px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-align: center;
    }

    header h1 {
        font-family: var(--mono);
        font-size: 32px;
        font-weight: 700;
        color: #ffffff; /* white title */
        letter-spacing: -1px;
    }

    header h1 span {
        color: #ffffff; /* make // and . also white */
    }

    .version {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--cyan);
        background: rgba(0, 212, 200, 0.08);
        border: 1px solid rgba(0, 212, 200, 0.25);
        padding: 4px 10px;
        border-radius: 999px;
    }

      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 680px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .panel-head {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-head-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--violet);
      }
      .panel-label {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .panel-body {
        padding: 16px;
      }

      .ctrl {
        margin-bottom: 16px;
      }
      .ctrl:last-child {
        margin-bottom: 0;
      }

      .ctrl-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .ctrl-name {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.05em;
      }
      .ctrl-val {
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--cyan);
        background: var(--cyan-glow);
        border: 1px solid var(--cyan-dim);
        padding: 1px 7px;
        border-radius: 4px;
        min-width: 44px;
        text-align: center;
      }

      input[type="range"] {
        width: 100%;
        appearance: none;
        height: 3px;
        background: var(--border2);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--cyan);
        cursor: pointer;
        border: 2px solid var(--bg);
        box-shadow: 0 0 0 1px var(--cyan);
      }
      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--cyan);
        cursor: pointer;
        border: 2px solid var(--bg);
      }

      input[type="color"] {
        width: 100%;
        height: 42px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface2);
        cursor: pointer;
        padding: 2px;
    }

    input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 6px;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
     padding: 0;
        }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 14px 0;
      }

      .sizing-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .sizing-opt {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: var(--radius);
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.12s;
      }
      .sizing-opt:hover {
        background: var(--surface3);
        border-color: var(--border);
      }
      .sizing-opt.active {
        background: var(--violet-glow);
        border-color: var(--violet-dim);
      }
      .sizing-opt input[type="radio"] {
        display: none;
      }
      .sizing-radio {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid var(--border2);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.12s;
      }
      .sizing-opt.active .sizing-radio {
        border-color: var(--violet);
        background: var(--violet);
        box-shadow: 0 0 6px var(--violet-glow);
      }
      .sizing-radio::after {
        content: "";
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: white;
        opacity: 0;
        transition: opacity 0.12s;
      }
      .sizing-opt.active .sizing-radio::after {
        opacity: 1;
      }
      .sizing-name {
        font-size: 12px;
        color: var(--text);
        flex: 1;
      }
      .sizing-opt.active .sizing-name {
        color: var(--text);
      }
      .sizing-code {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        background: var(--surface3);
        padding: 1px 5px;
        border-radius: 3px;
      }
      .sizing-opt.active .sizing-code {
        color: var(--violet);
        background: var(--violet-glow);
      }

      .right-col {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .preview-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .preview-head {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .preview-dots {
        display: flex;
        gap: 5px;
      }
      .preview-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .dot-r {
        background: #e24b4b;
      }
      .dot-y {
        background: #e2a24b;
      }
      .dot-g {
        background: #4be26c;
      }
      .preview-meta {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
      }
      .preview-meta span {
        color: var(--cyan);
      }

      #preview{
        min-height:280px;
        display:flex;
        justify-content:center;
        align-items:center;
        background:
            linear-gradient(var(--border) 1px, transparent 1px),
            linear-gradient(90deg,var(--border) 1px, transparent 1px);
        background-size:24px 24px;
        background-color:var(--bg);
      }

        #shadow-box{
            width:180px;
            height:180px;
            background: linear-gradient(135deg,#ffffff,#f4f7fb);
            border-radius:18px;
            border:1px solid #e6eaf0;
            transition:all .15s ease;
        }

      .css-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .css-head {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .css-fname {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-muted);
      }
      .css-lang {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        background: var(--surface3);
        padding: 1px 6px;
        border-radius: 3px;
      }

      #css-out {
        font-family: var(--mono);
        font-size: 12.5px;
        line-height: 1.9;
        padding: 16px 20px;
        color: var(--text);
        white-space: pre;
        overflow-x: auto;
        background: var(--bg);
      }

      .tok-sel {
        color: #f059da;
      }
      .tok-brace {
        color: #5a7399;
      }
      .tok-prop {
        color: #00d4c8;
      }
      .tok-colon {
        color: #5a7399;
      }
      .tok-fn {
        color: #7c5cfc;
      }
      .tok-num {
        color: #f5a623;
      }
      .tok-unit {
        color: #39e58c;
      }
      .tok-kw {
        color: #f059da;
      }
      .tok-semi {
        color: #5a7399;
      }

      .btn-row {
        display: flex;
        gap: 10px;
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        background: var(--surface2);
      }

      button {
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.12s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border2);
        background: var(--surface3);
        color: var(--text-muted);
      }
      button:hover {
        border-color: var(--border2);
        color: var(--text);
        background: var(--surface2);
      }
      button:active {
        transform: scale(0.97);
      }

      button.primary {
        background: var(--violet);
        border-color: var(--violet);
        color: #fff;
      }
      button.primary:hover {
        background: #8f6dff;
        border-color: #8f6dff;
        color: #fff;
      }
      button.success {
        background: var(--cyan-dim);
        border-color: var(--cyan);
        color: var(--cyan);
        transform: scale(1.03);
        box-shadow: 0 0 12px var(--cyan-glow);
     }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1> Box-Shadow Generator</h1>
        <span class="version">v2.0</span>
      </header>

      <div class="layout">
        <div class="panel">
          <div class="panel-head">
            <div class="panel-head-dot"></div>
            <span class="panel-label">config</span>
          </div>
          <div class="panel-body">

  <div class="ctrl">
    <div class="ctrl-top">
      <span class="ctrl-name">offset x</span>
      <span class="ctrl-val" id="x-val">10px</span>
    </div>
    <input type="range" id="offset-x" min="-100" max="100" value="10">
  </div>

  <div class="ctrl">
    <div class="ctrl-top">
      <span class="ctrl-name">offset y</span>
      <span class="ctrl-val" id="y-val">10px</span>
    </div>
    <input type="range" id="offset-y" min="-100" max="100" value="10">
  </div>

  <div class="ctrl">
    <div class="ctrl-top">
      <span class="ctrl-name">blur radius</span>
      <span class="ctrl-val" id="blur-val">20px</span>
    </div>
    <input type="range" id="blur" min="0" max="100" value="20">
  </div>

  <div class="ctrl">
    <div class="ctrl-top">
      <span class="ctrl-name">spread radius</span>
      <span class="ctrl-val" id="spread-val">0px</span>
    </div>
    <input type="range" id="spread" min="-50" max="50" value="0">
  </div>

  <div class="ctrl">
    <div class="ctrl-top">
      <span class="ctrl-name">opacity</span>
      <span class="ctrl-val" id="opacity-val">30%</span>
    </div>
    <input type="range" id="opacity" min="0" max="100" value="30">
  </div>

  <div class="divider"></div>

  <div class="ctrl">
    <div class="ctrl-top">
      <span class="ctrl-name">shadow color</span>
    </div>
    <input type="color" id="shadow-color" value="#000000">
  </div>

  <div class="divider"></div>

  <label class="sizing-opt active">
    <input type="radio" name="shadowtype" value="normal" checked>
    <div class="sizing-radio"></div>
    <span class="sizing-name">Normal Shadow</span>
  </label>

  <label class="sizing-opt">
    <input type="radio" name="shadowtype" value="inset">
    <div class="sizing-radio"></div>
    <span class="sizing-name">Inset Shadow</span>
  </label>

</div>
        </div>

        <div class="right-col">
          <div class="preview-panel">
            <div class="preview-head">
              <div class="preview-dots">
                <span class="dot-r"></span>
                <span class="dot-y"></span>
                <span class="dot-g"></span>
              </div>
              <span class="panel-label">live preview</span>
              <span class="preview-meta">
                 <span>LIVE</span> SHADOW PREVIEW
                </span>
            </div>
            <div id="preview">
                 <div id="shadow-box"></div>
            </div>
          </div>

          <div class="css-panel">
            <div class="css-head">
              <span class="css-fname">styles.css</span>
              <span class="panel-label">generated css</span>
              <span class="css-lang">CSS</span>
            </div>
            <pre id="css-out"></pre>
            <div class="btn-row">
              <button class="primary" id="copy-btn" onclick="copyCss()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" />
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                copy css
              </button>
              <button onclick="resetAll()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                  <path d="M3 3v5h5" />
                </svg>
                reset
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
        const offsetX = document.getElementById("offset-x");
        const offsetY = document.getElementById("offset-y");
        const blur = document.getElementById("blur");
        const spread = document.getElementById("spread");
        const opacity = document.getElementById("opacity");
        const color = document.getElementById("shadow-color");

        const shadowBox = document.getElementById("shadow-box");
        const cssOut = document.getElementById("css-out");

        function hexToRGBA(hex, alpha) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);

        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function update(){

        document.getElementById("x-val").textContent =
            offsetX.value + "px";

        document.getElementById("y-val").textContent =
            offsetY.value + "px";

        document.getElementById("blur-val").textContent =
            blur.value + "px";

        document.getElementById("spread-val").textContent =
            spread.value + "px";

        document.getElementById("opacity-val").textContent =
            opacity.value + "%";

        const inset =
            document.querySelector(
            'input[name="shadowtype"]:checked'
            ).value === "inset";

        const rgba = hexToRGBA(
            color.value,
            opacity.value / 100
        );

        const shadow =
             `${inset ? "inset " : ""}${offsetX.value}px ${offsetY.value}px ${blur.value}px ${spread.value}px ${rgba}`;

        shadowBox.style.boxShadow = shadow;

        const cssCode = `.shadow-box {
            box-shadow: ${shadow};
        }`;

        cssOut.textContent = cssCode;
        cssOut._raw = cssCode;

        syncRadioState();

        }

            async function copyCss() {
                const btn = document.getElementById("copy-btn");
                const oldHTML = btn.innerHTML;

                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(cssOut._raw);
                    } else {
                        const textArea = document.createElement("textarea");
                        textArea.value = cssOut._raw;

                        textArea.style.position = "fixed";
                        textArea.style.left = "-999999px";

                        document.body.appendChild(textArea);

                        textArea.focus();
                        textArea.select();

                        document.execCommand("copy");

                        textArea.remove();
                    }

                    btn.innerHTML = `
                        <svg width="13" height="13" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                        Copied!
                    `;

                    btn.classList.add("success");

                    setTimeout(() => {
                        btn.innerHTML = oldHTML;
                        btn.classList.remove("success");
                    }, 1500);

                } catch (err) {
                    console.error(err);

                    btn.textContent = "Copy Failed";

                    setTimeout(() => {
                        btn.innerHTML = oldHTML;
                    }, 1500);
                }
            }

            function syncRadioState() {
                document
                    .querySelectorAll(".sizing-opt")
                    .forEach(label => {
                    label.classList.toggle(
                        "active",
                        label.querySelector("input").checked
                    );
                    });
            }

            function resetAll(){

                offsetX.value = 10;
                offsetY.value = 10;
                blur.value = 20;
                spread.value = 0;
                opacity.value = 30;
                color.value = "#000000";

                document.querySelector(
                    'input[value="normal"]'
                ).checked = true;

                syncRadioState();
                update();
            }
            [
            offsetX,
            offsetY,
            blur,
            spread,
            opacity,
            color
            ].forEach(el =>
            el.addEventListener("input", update)
            );

            document
            .querySelectorAll(
            'input[name="shadowtype"]'
            )
            .forEach(el =>
            el.addEventListener("change", update)
            );

            update();
    </script>
  </body>
</html>
