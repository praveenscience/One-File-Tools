<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter / X Card Preview — One File Tools</title>

    <style>
      /* ========================================
       Reset & Base
       ======================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        padding: 2rem;
        max-width: 1100px;
        margin: 0 auto;
        background: #fafafa;
        color: #1a1a1a;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #e5e5e5;
        }
      }

      /* ========================================
       Layout
       ======================================== */

      h1 {
        margin-bottom: 0.4rem;
      }

      header p {
        margin-bottom: 2rem;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      .panel {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 1.2rem;
        background: white;
      }

      @media (prefers-color-scheme: dark) {
        .panel {
          background: #161616;
          border-color: #333;
        }
      }

      label {
        display: block;
        margin-top: 1rem;
        margin-bottom: 0.35rem;
        font-weight: 600;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px solid #bbb;
        font-size: 15px;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: 2px solid #1d9bf0;
        outline-offset: 2px;
      }

      textarea {
        resize: vertical;
      }

      button {
        margin-top: 1rem;
        margin-right: 0.5rem;
        padding: 0.8rem 1.2rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #1d9bf0;
        color: white;
        transition: opacity 0.2s ease;
      }

      button:hover {
        opacity: 0.9;
      }

      .preview {
        margin-top: 1rem;
        border: 1px solid #ddd;
        border-radius: 12px;
        overflow: hidden;
      }

      .preview img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        display: block;
      }

      .preview.summary {
        display: flex;
      }

      .preview.summary img {
        width: 140px;
        height: 140px;
        flex-shrink: 0;
      }

      .preview-content h3 {
        margin-bottom: 0.4rem;
      }

      .preview-content p {
        margin-bottom: 0.5rem;
      }

      .preview.summary .preview-content {
        flex: 1;
      }

      .preview.large {
        display: block;
      }

      .preview.large img {
        width: 100%;
      }

      .preview-content {
        padding: 1rem;
      }

      .preview small {
        color: gray;
      }

      #resetBtn {
        background: #6b7280;
      }

      #resetBtn:hover {
        background: #4b5563;
      }

      #metaOutput {
        margin-top: 1rem;
        height: 220px;
        font-family: monospace;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Twitter / X Card Preview</h1>
      <p>Create Twitter/X Card and preview how your link may appear before publishing.</p>
    </header>

    <main>
      <div class="container">
        <!-- Left -->

        <section class="panel">
          <label for="cardType">Card Type</label>

          <select id="cardType">
            <option value="summary">Summary</option>
            <option value="summary_large_image">Summary Large Image</option>
          </select>

          <label for="title">Title</label>

          <input id="title" type="text" placeholder="Enter page title" />

          <label for="description">Description</label>

          <textarea id="description" rows="4" placeholder="Enter description"></textarea>

          <label for="image">Image URL</label>

          <input id="image" type="url" placeholder="https://example.com/image.jpg" />

          <label for="url">Website URL</label>

          <input id="url" type="url" placeholder="https://example.com" />

          <label for="site">Twitter Username (optional)</label>

          <input id="site" type="text" placeholder="@username" />

          <button id="resetBtn">Reset</button>
        </section>

        <!-- Right -->

        <section class="panel">
          <h2>Live Preview</h2>

          <div class="preview">
            <img id="previewImage" src="https://placehold.co/1200x630?text=Twitter+Card+Preview" alt="Twitter/X Card Preview" loading="lazy" />

            <div class="preview-content">
              <h3 id="previewTitle">Your Title</h3>

              <p id="previewDescription">Enter a description to preview how your card may appear on X.</p>

              <small id="previewUrl"> example.com </small>
            </div>
          </div>
          <h2 style="margin-top: 1.5rem">Generated Meta Tags</h2>

          <textarea id="metaOutput" rows="10" readonly></textarea>

          <button id="copyBtn">Copy Meta Tags</button>
        </section>
      </div>
    </main>

    <footer style="margin-top: 2rem">
      <p>
        Part of
        <a href="https://github.com/praveenscience/One-File-Tools"> One File Tools </a>
      </p>
    </footer>

    <script>
      const titleInput = document.getElementById("title");
      const descriptionInput = document.getElementById("description");
      const imageInput = document.getElementById("image");
      const urlInput = document.getElementById("url");
      const siteInput = document.getElementById("site");
      const metaOutput = document.getElementById("metaOutput");
      const copyBtn = document.getElementById("copyBtn");
      const cardType = document.getElementById("cardType");

      const previewTitle = document.getElementById("previewTitle");
      const previewDescription = document.getElementById("previewDescription");
      const previewImage = document.getElementById("previewImage");
      const previewUrl = document.getElementById("previewUrl");

      const resetBtn = document.getElementById("resetBtn");

      const PLACEHOLDER = "https://placehold.co/1200x630?text=Twitter+Card+Preview";

      function getDomain(url) {
        try {
          return new URL(url).hostname.replace(/^www\./, "");
        } catch {
          return "example.com";
        }
      }

      function updatePreview() {
        previewTitle.textContent = titleInput.value.trim() || "Your Title";

        previewDescription.textContent = descriptionInput.value.trim() || "Enter a description to preview how your card may appear on X.";

        previewImage.src = imageInput.value.trim() || PLACEHOLDER;

        previewUrl.textContent = getDomain(urlInput.value.trim());

        const preview = document.querySelector(".preview");

        if (cardType.value === "summary") {
          preview.classList.add("summary");
          preview.classList.remove("large");
        } else {
          preview.classList.add("large");
          preview.classList.remove("summary");
        }

        const title = titleInput.value.trim() || "Your Title";
        const description = descriptionInput.value.trim() || "Enter a description to preview how your card may appear on X.";
        const image = imageInput.value.trim() || PLACEHOLDER;
        const url = urlInput.value.trim() || "https://example.com";
        const username = siteInput.value.trim();

        metaOutput.value = `<meta name="twitter:card" content="${cardType.value}">
<meta name="twitter:title" content="${title}">
<meta name="twitter:description" content="${description}">
<meta name="twitter:image" content="${image}">
<meta name="twitter:url" content="${url}">${
          username
            ? `
<meta name="twitter:site" content="${username}">
<meta name="twitter:creator" content="${username}">`
            : ""
        }`;
      }

      [titleInput, descriptionInput, imageInput, urlInput, siteInput, cardType].forEach((element) => {
        element.addEventListener("input", updatePreview);
      });

      resetBtn.addEventListener("click", () => {
        titleInput.value = "";
        descriptionInput.value = "";
        imageInput.value = "";
        urlInput.value = "";
        siteInput.value = "";
        cardType.value = "summary";

        updatePreview();
      });

      previewImage.addEventListener("error", () => {
        previewImage.src = PLACEHOLDER;
      });

      updatePreview();
      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(metaOutput.value);

          const originalText = copyBtn.textContent;
          const originalColor = copyBtn.style.backgroundColor;

          copyBtn.textContent = "Copied!";
          copyBtn.style.backgroundColor = "#16a34a";

          setTimeout(() => {
            copyBtn.textContent = originalText;
            copyBtn.style.backgroundColor = originalColor || "#1d9bf0";
          }, 2000);
        } catch (err) {
          alert("Failed to copy meta tags.");
        }
      });
    </script>
  </body>
</html>
