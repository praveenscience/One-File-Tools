<!--
HTTP Header Inspector
Single-file HTTP header inspector.
Built for One File Tools.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTTP Header Inspector - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #0b0f19;
        --grid-line: #131c2d;
        --panel: #111827;
        --panel-border: #1e293b;
        --accent: #38bdf8;
        --accent-hover: #0ea5e9;
        --accent-glow: rgba(56, 189, 248, 0.2);
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --radius-sm: 8px;
        --radius-md: 14px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 28px 28px;
        color: var(--text);
        padding: 48px 20px 64px;
        min-height: 100vh;
      }

      .app {
        max-width: 800px;
        margin: 0 auto;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(36px, 6vw, 52px);
        letter-spacing: -0.01em;
        line-height: 1.1;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 16px;
        margin-top: 12px;
      }

      .studio {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 32px;
        box-shadow: 0 24px 48px -14px rgba(0, 0, 0, 0.5);
      }

      .input-group {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }

      .input-group input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 14px 20px;
        font-family: var(--font-mono);
        font-size: 15px;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .input-group input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-glow);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-sm);
        padding: 12px 24px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--accent);
        color: #0c4a6e;
      }

      .btn-primary:hover {
        background: var(--accent-hover);
        color: white;
        transform: translateY(-1px);
      }

      .btn-primary:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .results-area {
        display: none;
        margin-top: 24px;
        animation: fadeIn 0.3s ease;
      }

      .results-area.active {
        display: block;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .status-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }

      .status-code {
        font-family: var(--font-mono);
        font-size: 24px;
        font-weight: 700;
      }

      .status-2xx { color: var(--success); }
      .status-3xx { color: var(--accent); }
      .status-4xx { color: var(--warning); }
      .status-5xx { color: var(--error); }

      .status-meta {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-muted);
        text-align: right;
      }

      .headers-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .header-item {
        display: flex;
        background: var(--bg);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        overflow: hidden;
      }

      .header-key {
        width: 30%;
        min-width: 150px;
        padding: 12px 16px;
        background: rgba(255,255,255,0.02);
        border-right: 1px solid var(--panel-border);
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
        word-break: break-word;
      }

      .header-value {
        width: 70%;
        padding: 12px 16px;
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text);
        word-break: break-word;
        white-space: pre-wrap;
      }

      .error-message {
        color: var(--error);
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        padding: 16px;
        border-radius: var(--radius-sm);
        font-family: var(--font-mono);
        font-size: 14px;
        display: none;
      }

      .error-message.active {
        display: block;
      }

      .loader {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: currentColor;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 600px) {
        .input-group {
          flex-direction: column;
        }
        .header-item {
          flex-direction: column;
        }
        .header-key {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--panel-border);
          padding: 8px 12px;
        }
        .header-value {
          width: 100%;
          padding: 10px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Browser & Network</div>
        <h1 class="wordmark">HTTP Header Inspector</h1>
        <p class="tagline">View response headers, status codes, and network times for any URL.</p>
      </header>

      <main class="studio">
        <form class="input-group" id="inspectForm">
          <input type="url" id="urlInput" placeholder="https://example.com" required autocomplete="off" spellcheck="false" />
          <button type="submit" class="btn btn-primary" id="fetchBtn">
            <span class="btn-text">Inspect URL</span>
            <div class="loader" id="loader"></div>
          </button>
        </form>

        <div class="error-message" id="errorMessage"></div>

        <div class="results-area" id="resultsArea">
          <div class="status-banner">
            <div>
              <div class="status-code" id="statusCode">200 OK</div>
            </div>
            <div class="status-meta">
              <div id="statusTime">124ms</div>
              <div id="statusType" style="margin-top: 4px; color: var(--text-dim);">Direct Request</div>
            </div>
          </div>

          <div class="headers-list" id="headersList">
            <!-- Headers will be injected here -->
          </div>
        </div>
      </main>
    </div>

    <script>
      const form = document.getElementById("inspectForm");
      const urlInput = document.getElementById("urlInput");
      const fetchBtn = document.getElementById("fetchBtn");
      const loader = document.getElementById("loader");
      const btnText = document.querySelector(".btn-text");
      const resultsArea = document.getElementById("resultsArea");
      const errorMessage = document.getElementById("errorMessage");
      
      const statusCodeEl = document.getElementById("statusCode");
      const statusTimeEl = document.getElementById("statusTime");
      const statusTypeEl = document.getElementById("statusType");
      const headersListEl = document.getElementById("headersList");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        let urlStr = urlInput.value.trim();
        if (!urlStr) return;
        
        // Auto-prepend https if missing
        if (!/^https?:\/\//i.test(urlStr)) {
          urlStr = "https://" + urlStr;
          urlInput.value = urlStr;
        }

        setLoading(true);
        hideError();
        resultsArea.classList.remove("active");

        try {
          const result = await fetchHeaders(urlStr);
          renderResults(result);
        } catch (err) {
          showError(err.message);
        } finally {
          setLoading(false);
        }
      });

      async function fetchHeaders(url) {
        // Try direct fetch first (might fail due to CORS)
        try {
          const start = Date.now();
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 8000);
          
          const response = await fetch(url, { 
            method: 'GET', 
            mode: 'cors',
            signal: controller.signal
          });
          clearTimeout(timeoutId);

          const duration = Date.now() - start;
          const headersObj = {};
          
          // Note: CORS might restrict visible headers to safe ones only.
          // If we want all headers, we need the proxy. Let's see how many we get.
          for (const [key, value] of response.headers.entries()) {
            headersObj[key] = value;
          }

          // If we got very few headers (e.g., just content-type), CORS might be hiding them.
          // In that case, we might still prefer the proxy. Let's proxy if less than 3 headers.
          if (Object.keys(headersObj).length < 3) {
            throw new Error("CORS restricted headers");
          }

          return {
            url: response.url,
            status: response.status,
            statusText: response.statusText,
            durationMs: duration,
            headers: headersObj,
            type: "Direct Request"
          };
        } catch (e) {
          // Direct fetch failed (likely CORS or network error), fallback to our proxy
          const proxyUrl = `/api/fetch-headers?url=${encodeURIComponent(url)}`;
          const proxyResponse = await fetch(proxyUrl);
          
          if (!proxyResponse.ok) {
            let errorText = "Unknown Error";
            try {
              const errJson = await proxyResponse.json();
              errorText = errJson.error || proxyResponse.statusText;
            } catch(e) {}
            throw new Error(`Proxy Error: ${errorText}`);
          }
          
          const data = await proxyResponse.json();
          if (data.error) throw new Error(data.error);
          
          return {
            ...data,
            type: "Proxied Request"
          };
        }
      }

      function renderResults(data) {
        // Render Status Code
        const statusClass = 
          data.status >= 500 ? "status-5xx" :
          data.status >= 400 ? "status-4xx" :
          data.status >= 300 ? "status-3xx" : "status-2xx";
          
        statusCodeEl.className = `status-code ${statusClass}`;
        statusCodeEl.textContent = `${data.status} ${data.statusText || ''}`;
        
        // Render Meta
        statusTimeEl.textContent = `${data.durationMs}ms`;
        statusTypeEl.textContent = data.type;

        // Render Headers List
        headersListEl.innerHTML = "";
        
        // Sort headers alphabetically
        const sortedKeys = Object.keys(data.headers).sort();
        
        if (sortedKeys.length === 0) {
          headersListEl.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text-muted); font-family: var(--font-mono);">No headers found.</div>`;
        } else {
          sortedKeys.forEach(key => {
            const item = document.createElement("div");
            item.className = "header-item";
            
            const keyEl = document.createElement("div");
            keyEl.className = "header-key";
            keyEl.textContent = key;
            
            const valEl = document.createElement("div");
            valEl.className = "header-value";
            valEl.textContent = data.headers[key];
            
            item.appendChild(keyEl);
            item.appendChild(valEl);
            headersListEl.appendChild(item);
          });
        }

        resultsArea.classList.add("active");
      }

      function setLoading(isLoading) {
        fetchBtn.disabled = isLoading;
        btnText.style.display = isLoading ? "none" : "inline";
        loader.style.display = isLoading ? "block" : "none";
      }

      function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.classList.add("active");
      }

      function hideError() {
        errorMessage.classList.remove("active");
      }
    </script>
  </body>
</html>
